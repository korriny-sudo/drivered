efensive driving involves looking for possible crashes and mistakes other drivers may make. Learning how to be aware\n\n64\n\nof everything that happens around you is essential.\n\u2022 Over half the drivers killed in two-car crashes in Utah were not at fault.\n\u2022 One in four persons will be in a crash in the next four years. There are ways to reduce your\nchances of being that person.\n\u2022 A national study revealed that driver error is a factor in 75% of all car crashes.\n\u2022 The time of day when most crashes happen is between 2 pm and 6 pm.\n\u2022 The highest rate of reported car crashes occurs in shopping and business areas.\n\u2022 Motor vehicle crashes are the leading cause of death for ages 1\u201424 years of age.\nStudies show your chances of being in a crash will be much less if you take a defensive driving\ncourse. Even a defensive driver needs to have some special skills. These skills include freeway driving, night driving, and emergency measures.\n\nB. EMERGENCIES AND AVOIDING CRASHES\nEmergencies happen. You will be less likely to panic and know what to do if you think about emergencies and plan for them before they happen. When driving, paying attention to the road and other\ncars and objects around you is important. You never know when something unexpected is going to\nhappen.\nNote: Motorists have been seriously injured or even killed when attending to vehicle malfunctions\nsuch as a flat tire, out of gas, and other equipment problems on and off the roadways.\nThe majority of these incidents are preventable to minimize death or injury follow these simple rules:\n\u2022 Ensure your vehicle, including the internal engine components, is properly maintained.\n\u2022 Maintain adequate tire pressure and tread.\n\u2022 Be sure your vehicle has a sufficient amount of fuel.\n\u2022 If you experience a vehicle malfunction, pull off the road as far as possible or exit the freeway\ncompletely. A shredded tire or bent rim is better than risking your life.\n\u2022 If you are off to the side of the road and need help, stay in your vehicle as much as possible\nand keep walking on the road to a minimum.\n\u2022 Use your mobile device to call the local dispatcher if you need assistance. If you do not have\naccess to a mobile device, leave the hood of your car up and your hazard lights on. This will\nadvise the traveling public that you need assistance.\n\u2022 Inform family members or other persons when to expect you at your destination.\n\u2022 Have an emergency kit in the trunk of your vehicle with blankets, extra food and water to sustain you and your family.\nBRAKING AND BRAKE FAILURE\nDuring an emergency, the first action for most drivers is to stop. A brake warning light tells you that\nyour brakes are not working. Do not drive if you see this warning light.\n\u2022 If your brakes stop working while driving, use the parking brake.\n\u2022 Apply the parking brake slowly to avoid locking the rear wheels.\n\u2022 Be ready to release the brake if you start to skid.\n\n65\n\n\u2022 If the parking brake fails, turn off the engine and look for a safe place to stop. Make sure the\nvehicle is well off the roadway. Do not drive without brakes.\n\u2022 Many new vehicles have ABS (Anti-lock Braking Systems.) ABS helps you stop without skidding. It helps keep steering control. Be sure to read the vehicle owner\u2019s manual on how to\nuse the ABS.\n\u2022 To use ABS, press the brake pedal as hard as possible and apply pressure. ABS\nonly works if you stay on the brake pedal. The pedal may vibrate and hear a clicking\nnoise; this is normal, and you can still steer with ABS on.\n\u2022 If your vehicle does not have ABS, refer to your vehicle\u2019s owner\u2019s manual for how to use\nthe brakes.\nBREAKDOWNS\nIf your vehicle breaks down, ensure other drivers can see it. Crashes often happen because drivers\ndo not see a disabled vehicle until it\u2019s too late to stop.\n\u2022 If you have a breakdown, get your vehicle off the roadway and away from traffic.\n\u2022 Turn on your emergency flashers, raise your hood, attach something white or orange to the\nantenna or door handle.\n\u2022 Put emergency flares or triangles 200 to 300 feet behind your vehicle, giving other drivers time\nto change lanes or slow down.\n\u2022 Call law enforcement (911) about the breakdown.\nPOWER FAILURE\nKeep a firm grip on the steering wheel if the engine shuts off while driving. The steering wheel may\nbe hard to turn, but you can turn it. Look for a safe place to pull off, brake gently, and use steady\npressure on the pedal. Slow down and pull off the road. Try to start the engine; if it doesn\u2019t start,\nraise the hood, turn on the emergency flashers, and call for help.\nSTEERING\nYou may be able to avoid a collision by steering around a hazard. This is sometimes called swerving.\nTo quickly steer around a hazard, ensure you have a good grip with both hands on the steering wheel\nand steer in the direction you want, but try to avoid other traffic. Once you have missed the hazard,\nstraighten your vehicle and slow down.\nSTUCK GAS PEDAL\nIf your vehicle is speeding out of control, shift to neutral and look for a safe place to pull off, steer\nsmoothly, brake gently, and pull off the road.\nTIRE BLOWOUT\nIf a front tire blows out, your vehicle will pull hard toward the blown tire. Do not slam on the brakes.\n\u2022 If a rear tire blows out, the vehicle will wobble, shake, and pull toward the blown tire.\n\u2022 If a tire goes flat, grip the steering wheel firmly, steer straight, slow gradually, and take your\nfoot off the gas pedal; do not brake.\nAllow the vehicle to slow down. Brake gently only if you must, and do not stop on the road. Pull off\nthe road in a safe and level spot, if possible, turn on the emergency flashers, and change the tire.\nUNEVEN SURFACES/DROP-OFFS\n\n66\n\nDrop-offs can cause crashes unless you handle them right. Don\u2019t panic if your wheels drop off the\npaved road surface. Slow down gradually and then turn back onto the roadway.\n\nC. FINANCIAL RESPONSIBILITY\nThe Financial Responsibility Act is designed to protect the public from losses due to motor vehicle\ncrashes. This law requires that you have your vehicle or yourself, as a driver, insured. Anyone who\nknowingly operates a motor vehicle or permits one to be operated without owner\u2019s security is guilty of\na class B misdemeanor, which may result in losing your driver license, motor vehicle registration, and\nlicense plates. To regain these items, you must provide proof of adequate financial security, pay the\nrequired reinstatement fees, and pay any applicable fines.\nMotor vehicle insurance is the most convenient and least expensive way to comply with this law.\nPROVIDING SECURITY AFTER A CRASH\nThere are two ways you can provide the required security after a crash in which you were the at-fault\ndriver:\n1. Depositing money with the Financial Responsibility Section in the amount of the loss\nsuffered by the other parties involved; or\n2. Showing you were covered by automobile liability insurance at the time of the crash. If\nyou were not covered by such insurance, you must file one of the following:\n\u2022 Evidence that all parties involved in the crash have released you from liability.\n\u2022 Evidence that you have agreed in writing to make payments for any damages or injuries\nsuffered by the other party or parties.\n\u2022 Evidence that you have been found not liable by a court of law.\n\u2022 Evidence that the operator complied with the operator\u2019s security requirement.\nIf your driving privilege is suspended under this act, it may be reinstated by complying with one of the\nabove-listed procedures or one year following the effective date of suspension if no civil action arising\nout of the accident has been instituted.\nUNSATISFIED JUDGMENT\nA court may render a judgment against you for damages to other injured parties. If this judgment is\nnot satisfied within 60 days after the court decision, your driving privilege will be suspended. This rule\nmay apply not only to drivers but also to those who own or maintain the vehicle. If your driving privilege is withdrawn, the suspension will be in effect until the judgment is satisfied and you have filed\n\u201cfuture proof\u201d of financial responsibility in the form of an SR22.\nSR22 INSURANCE\n\u201cFuture proof\u201d of financial responsibility is evidence that you pay for any damage to others if you are\nresponsible for a future accident. It is required if you have failed to satisfy a judgment as explained\nabove or if your driving privilege is suspended for violating the financial responsibility laws. This proof\nmust be maintained for three years following the date of the suspension or revocation or, in the case\nof an unsatisfied judgment, three years from the date of reinstatement.\nThe most common way to file \u201cfuture proof\u201d is to furnish evidence that you are covered by an SR22\nautomobile liability insurance policy.\n\n67\n\nUNINSURED MOTORIST\nIf a vehicle owner is convicted of driving without insurance, is suspended for driving without insurance, or is identified in the computer records as having no insurance, the Department of Motor Vehicles must revoke the vehicle registration unless insurance is purchased within 30 days.\nNote: The law states that any time anyone drives a motor vehicle, proof of insurance for the vehicle\nand/or the operator must be in the vehicle and shown to any peace officer asking to see it. You can\nprovide proof of insurance to a peace officer electronically using a mobile electronic device. UCA 4112a-303.2(2)(a)(i) and 41-12a-303.2(2)(d)(i)(B)\n\nD. INSURANCE COVERAGE\nBODILY INJURY AND PROPERTY DAMAGE LIABILITY\u2014mandatory coverage that provides\npayment for injuries or damages caused by your negligence to another person or property. This coverage can be used to meet the Utah Motor Vehicle Financial Responsibility Law requirements.\nUNINSURED MOTORIST\u2014covers injuries to you and your passengers if you are in a crash that is\ncaused by another driver who does not have insurance or by a \u201chit-and-run\u201d driver. Property damage\nlosses are generally not paid under this coverage.\nPERSONAL INJURY PROTECTION (ALSO KNOWN AS \u201cNO-FAULT\u201d OR \u201cPIP\u201d)\u2014mandatory\nand provides some basic benefits and coverage for bodily injury to you and others without having to\ndetermine \u201cfault\u201d in a crash.\nCOLLISION\u2014covers repairs to your vehicle for damage caused by a collision, subject to a deductible, usually when no other person is at fault. This coverage is not required by law but is generally\nrequired by a lien holder.\nCOMPREHENSIVE\u2014covers repairs to your vehicle for damage caused by reasons other than collisions, such as fire, theft, vandalism, or glass breakage. This coverage is not required by law but may\nbe required by a lien holder.\nNote: If you are convicted in a court of law of a violation for driving without insurance or driving without proof of insurance, you will be required to carry an SR22 for three years and pay a $40 reinstatement fee.\n\nE. RELEASE OF CRASH REPORT INFO\nCrash reports are protected and may be released only as provided by the law. A report may be released to persons involved in the crash, excluding witnesses; anyone they name as a representative,\nwith signed permission from the person involved in the crash; parents or legal guardian, attorney,\ninsurance company, licensed private investigator, or the media.\nInformation released to the news media is limited to name, age, sex, city of residence, vehicle make\nand model (whether or not the vehicles were insured), and the location and description of the crash.\n\n68\n\nSECTION 13: Suspensions and Your Record\nSome drivers do not meet acceptable driving standards. The Driver License Division is here to help\nthose drivers, if possible, and to take corrective action, if necessary. The division also deals with cases of license fraud and alteration.\nThe various driver control programs are designed to improve driver attitude and performance. In\nmost cases, the treatment programs are successful. However, some drivers are unable or unwilling\nto correct their bad habits. Those drivers can expect revocation, suspension, denial, or disqualification\nof their driving privileges.\n\nA. ALTERED OR FICTITIOUS LICENSE\nIt is unlawful to display a license you know has been canceled, suspended, or altered. It is also illegal\nto alter a driver license. Either of these actions could result in your license being suspended.\n\nB. DRIVING RECORD (MVR)\nThe Driver License Division maintains a computerized driving and crash record of every driver in the\nstate. It contains a record of convictions for moving traffic violations and suspensions within the past\nthree years. All alcohol/drug-related violations, suspensions, and revocations remain on the record\nfor 10 years. When a driver is convicted of a moving traffic violation, a notice of the court action is\nsent to the division for posting on the driver\u2019s record.\nIf you are a commercial driver, your driving record will be submitted to the commercial driver license\ninformation system, and a record of suspensions and revocations will be forwarded to the national\ndriver register.\n\nC. DRIVING WHILE DENIED, SUSPENDED, OR REVOKED\nIf you drive while your driver license is denied, suspended, or revoked, you may be sentenced to jail\nfor 90 days and be required to pay a fine.\nAlso, the length of time your driver license was originally denied, suspended, or revoked will be increased by the amount of the original time period. For example, your license was originally suspended for three months, an additional three months would be added to your suspension.\nIf your original suspension or revocation is based upon an alcohol-related offense, the fine may be up\nto $1000, and you may be imprisoned for up to six months. If you drive while your license is suspended or revoked for DUI, metabolite of a drug, automobile homicide, a violation of the alcohol-restricted\ndriver law, or refusal to submit to a chemical test, your vehicle may be impounded.\n\nD. LICENSE SUSPENSIONS\nYour driving privilege will result in a mandatory suspension and may be suspended for as long as two\nyears or until your 21st birthday for any of the following:\n\n69\n\n\u2022 You have been convicted of an offense for which mandatory suspension is required.\n\u2022 You have caused or contributed to a crash by reckless or unlawful conduct in which someone\nwas injured or killed or which resulted in serious property damage.\n\u2022 You have unlawfully or fraudulently used or permitted your license by someone else.\n\u2022 You have been convicted of sufficient traffic violations to be subject to the division point system.\n\u2022 You have been arrested for DUI or have been found guilty of any drug offense.\n\u2022 As a Utah driver, you failed to appear in court for a traffic violation when it occurred in Utah or\na Non-Resident Violator Compact member state, or you were unable to satisfy fees, fines, or\nrestitution to the court on any criminal charge.\n\u2022 You failed to show proof of no-fault insurance or other security as required under the Utah Automobile No-Fault Insurance Act.\n\u2022 You operated a vehicle or allowed a registered vehicle to be operated without required insurance or proof of financial responsibility.\n\u2022 You failed to pay child support.\n\u2022 You have been convicted of a texting violation and the judge has ordered the suspension of\nyour license.\n\u2022 You are under the age of 21 and have used false or improper proof of age to obtain or consume alcohol or gain admittance to a bar.\n\u2022 You have been convicted of custodial interference.\n\u2022 You have been convicted for a violation related to approaching an emergency vehicle and have\nfailed to complete a four-hour live classroom course on driving safety offered by an approved\nentity.\n\u2022 The court may order that your license be suspended for one year on the first conviction for a\ncitation with a road rage enhancement.\n\nE. LICENSE REVOCATIONS\nYour driving privilege will result in a mandatory revocation if a court finds you guilty of any of the following:\n\u2022 Manslaughter or automobile homicide while driving.\n\u2022 A second or subsequent conviction for driving or being in actual physical control of a motor vehicle or a motorboat while intoxicated or while any measurable controlled substance or metabolite of a controlled substance is in your body (including prescribed medications.)\n\u2022 Making a false statement under oath when applying for a driver license.\n\u2022 Using a motor vehicle to commit or facilitate a felony, including automobile homicide.\n\u2022 Failure to stop and give aid if you are involved in a motor vehicle crash resulting in the death of\nor personal injury to another.\n\u2022 Two reckless or impaired driving charges in one year. (The court may recommend that your\nlicense be suspended for three months on the first conviction.) Reckless driving is defined as\noperating a vehicle in a willful and/or wanton disregard for the safety of persons or property.\n\u2022 Attempting to flee or refusing to stop after receiving a visual or audible signal from a police\nofficer.\n\n70\n\n\u2022 Discharging or allowing the discharge of a firearm from a vehicle.\n\u2022 Using, allowing the use of, or causing to be used any explosive, chemical, or incendiary device\nfrom a vehicle.\n\u2022 Driving with a measurable or detectable amount of alcohol in your system when you have an\nalcohol-restricted status.\n\u2022 Driving a vehicle without an ignition interlock device installed when you have an ignition interlock restricted status.\n\u2022 You have been convicted of careless driving, and a judge has ordered the revocation of your\ndriver license. If you forfeit bail after being arrested for one of the above, your driver license\nwill be revoked/suspended as if you had appeared in court and been found guilty.\n\u2022 You have been convicted of automobile homicide using a handheld wireless communication\ndevice.\n\u2022 Refusal to submit to chemical testing as requested by law enforcement.\n\u2022 You have two citations that have been enhanced as a road rage violation in one year.\n\nF. POINT SYSTEM\nReckless Driving\nSpeeding (depending on severity)\nFailure to yield right-of-way\nFollowing to closely (tailgating)\nWrong side of road\nWrong way on one-way street\nRed light\nStop sign\nImproper lookout\nImproper passing\nTexting while driving\nOther moving violations\n\n80\n35-75\n60\n60\n60\n60\n50\n50\n50\n50\n50\n40\n\nPOINT DISTRIBUTION\nThe point system is part of Utah\u2019s Driver Improvement Program. Points are assigned for specific\ntypes of violations:\n\u2022 OVER 21 YEARS OF AGE\u2014if you acquire 200 or more points within a three year period, you\nwill be asked to appear for a hearing.\n\u2022 UNDER 21 YEARS OF AGE\u2014if you acquire 70 points or more within a three year period, you\nwill be asked to appear for a hearing.\nBased on the hearing, you may be placed on probation, requested to take the defensive driving\ncourse, or have your driving privilege denied, or suspended. The denial/suspension may be for one\nmonth to one year, depending on your driving record.\nCLEAR POINTS FROM RECORD\nBy driving safely, you can clear points from your record.\n\n71\n\n\u2022 The point system provides that half of the total points on your record will be removed when you\ndrive one full year without being convicted of a moving traffic violation.\n\u2022 If you drive two successive years without a conviction, all points will be removed from your\nrecord.\n\u2022 Points for individual convictions are automatically removed from your record three years after\nthe date of the violation.\nAs a further incentive, 50 points may be removed from your record upon completing a defensive driving course recommended by the division. This 50-point reduction will be permitted only once during\nany three year period. For more information, view the Utah Safety Council website at: utahsafetycouncil.org.\nNote: The defensive driving course required to reduce 50 points from your driving record is different\nthan the traffic school offered by some courts.\n\n72\n\nSECTION 14: Sharing the Road\nEveryone has a right to the roadway. Remember to be courteous. Communicate to let others know\nwhere you are and what you plan to do.\nVULNERABLE USERS OF THE HIGHWAY\nUtah law defines a vulnerable user of the highway as a pedestrian, including a person engaged in\nwork upon a highway or utilities facilities along a highway or providing emergency services within the\nright-of-way of a highway, a person riding an animal, and a person operating any of the following on a\nhighway: farm tractor or implement of husbandry without an enclosed shell, skateboard, roller skates,\nin-line skates, bicycle, electric-assisted bicycle, electric personal assistive mobility device, moped,\nmotor-driven cycle, motorized scooter, motorcycle, and wheelchairs.\nA person who distracts or attempts to distract a vulnerable user of a highway with the intent to cause\nviolence or injury or force a vulnerable user off the roadway may be given a traffic citation. If convicted in court, this type of traffic citation will appear on a person\u2019s driving record, and points will be\nassessed.\nPeople walking, jogging, riding bicycles, or operating pedestrian vehicles on the roadway can cause\nspecial problems for drivers. Besides being hard to see, they sometimes do the unexpected. As a\ndriver, you must always have your car under control and be ready to react to any sudden action of\nothers using the roadway.\n\nA. BICYCLES\nBicycles are considered vehicles when on roadways. Bicyclists are required and\nexpected to follow the same rules of the road as motorized vehicles. As a motorist, you should know that a bicyclist has the same rights, privileges, and responsibilities as you. Respect for each other will aid in the smooth flow of traffic.\nBicyclists may not be easily seen in traffic. You must be alert for bicyclists and be\nextra careful when approaching them. Just as motorists have different skill levels,\nbicyclists also have varying skills. A skillful bicyclist rides predictably and holds a steady line. An unskillful bicyclist may swerve unpredictably, ignore traffic signs and signals, and ride without a light at\nnight. If you see an unskillful bicyclist, be ready for any sudden movements.\nAs a driver, you must:\n\u2022 Yield to bicyclists in intersections as you would for pedestrians and other vehicles.\n\u2022 Yield right-of-way when a bicycle path or bike lane intersects a road. Do not stop, park, or\ndrive on a designated bicycle path or lane unless you are entering or leaving an alley or driveway, performing official duties directed by a police officer, or an emergency exists. Dedicated\nbicycle lanes are marked with solid white lines.\n\u2022 Allow as much space as possible and slow down when approaching or passing a bicyclist.\nYou should slow down and let the cyclist clear the intersection before turning.\n\u2022 Avoid slowing down or stopping quickly. A motor vehicle\u2019s brakes are more powerful than a\nbicycle\u2019s, and you could cause a crash.\n\u2022 Avoid sounding your horn close to the bicyclists unless there is a chance of a crash. Sounding\n\n73\n\nyour horn to alert your presence may startle bicyclists and cause them to steer into your path\nand crash.\n\u2022 Watch carefully for bicyclists entering your lane. Be especially careful if you see children riding\nbikes on the sidewalk. They may come onto the road, and they cannot see things out of the\ncorner of their eyes as well as adults can. Therefore, even though children glance toward you,\nthey may not see you before they pull out in front of you. They also have trouble judging the\nspeed and distance of oncoming cars and lack a sense of danger.\n\u2022 Avoid turning sharply in front of bicyclists, and do not force a bicyclist off the road.\n\u2022 Although bicyclists are required to ride in the direction of traffic, you should look for them riding\nanywhere on the roadway. Utah law requires a minimum of three feet of distance from any\nbicyclist or vulnerable user of the highway you are passing.\n\u2022 If a bicyclist travels at less than a reasonable speed, you may drive in a center lane, that is,\na two-way left turn lane; the center lane is on a roadway divided into three or more lanes that\nprovide for two-way movement of traffic.\n\u2022 Dim your headlights within 500 feet when approaching or overtaking bicyclists at night.\n\u2022 Be careful around bicyclists when the roadway is wet or covered with sand or gravel. These\nconditions affect bicycles much more than vehicles.\n\u2022 When parking on the street, check to the sides and rear for bicyclists before opening your vehicle door.\n\u2022 You should always check for bicyclists in your path before backing. Be especially cautious\nnear schools or residential areas where bicyclists may be present.\n\u2022 Cooperate with bicyclists. They are required to use hand signals, as shown when turning and\nstopping. However, remember bicyclists may be unable to signal if road or traffic conditions\nrequire them to keep both hands on the handlebars. Look for other clues of a bicyclist\u2019s intent,\nsuch as turning their head or looking over their shoulder before changing lane position.\nNote: When turning left, a bicyclist can use the left-turn or two-way left-turn lanes in the same manner\nrequired of motor vehicles.\nWhen overtaking and passing a bicycle or moped under Subsection (1)(c), a person operating a vehicle may not pass a bicycle or moped proceeding in the same direction if the pass cannot be made\nsafely, including under any of the following conditions:\n\u2022 When approaching or upon the crest of a grade or a curve in the highway where the operator\u2019s\nview is obstructed.\n\u2022 When approaching within 100 feet of, or traversing, any intersection or railroad grade crossing\nunless otherwise indicated by an official traffic control device.\n\u2022 When the view is obstructed upon approaching within 100 feet of any bridge, viaduct, or tunnel.\n\u2022 When the pass cannot be made in accordance with Section 41-6a-706.5 and shall move the\nvehicle to the left of the lane the vehicle is traveling in if there is at least one lane to the left of\nthe vehicle that is proceeding in the same direction and the movement can be made in accordance by UCA 41-6a-804.1.\nAs a bicyclist, you must:\n\u2022 Never attempt to ride a bicycle while impaired. Alcohol can affect your balance and judgment.\n\u2022 Keep at least one hand on the handlebars at all times. Never carry any package, bundle, or\n\n74\n\narticle, which prevents using both hands in the control and operation of the bicycle.\n\u2022 Every bicycle must have a brake or brake system that enables the rider to stop the bicycle\nwithin 25 feet from a speed of 10 mph.\n\u2022 Wearing a CPSC (Consumer Product Safety Commission) approved bicycle helmet when riding is always recommended, which dramatically improves the chances of surviving a crash.\n\u2022 You are required to have a white headlight, red taillight or reflector, and side reflectors, all visible for at least 500 feet any time you ride earlier than a half-hour before sunrise, later than a\nhalf-hour after sunset, or whenever it is otherwise difficult to make out vehicles 1000 feet away.\nThe lights may be on the bicycle or the rider.\n\u2022 Obey all traffic signs and signals and never ride against the traffic. Learn to look back over\nyour shoulder without losing balance or swerving left. Some riders use rear-view mirrors.\n\u2022 Make eye contact with drivers; you must assume they do not see you and may pull out in front\nof you.\n\u2022 Bicyclists approaching a stop sign may proceed through the intersection without stopping at\nthe stop sign if the bicyclist slows to a reasonable speed and yields the right-of-way to any\npedestrian within the intersection or an adjacent crosswalk.\n\u2022 When riding a bicycle on a sidewalk or crosswalk, bicyclists must ride slowly, yield the right-ofway to any pedestrian, and give an audible signal before overtaking and passing any pedestrian.\n\u2022 Always ride to the right side of the road or street, as it is safe and practical. On a one-way\nstreet in a city, bicyclists may ride as near as possible to either the right or left side of the street\nor roadway.\n\u2022 While cycling, never attach yourself or the bicycle to any vehicles moving on the highway.\n\u2022 You cannot have a siren or whistle on your bicycle.\n\u2022 Ride no more than two abreast and only if you would not impede traffic.\n\u2022 A bicycle may not carry more persons than the number it is designed or equipped for, except\nthat an adult rider may carry a child securely attached to their person in a backpack or sling.\n\nELECTRIC ASSISTED BICYCLE\nThis is a bicycle with an electric motor that:\n\u2022 Has fully operable pedals.\n\u2022 Has permanently affixed cranks installed at the time of the original manufacture.\n\u2022 Is fully operable as a bicycle without the use of an electric motor.\n\u2022 Is listed as one of the following:\n\u2022 CLASS 1\u2014equipped with a motor or electronics that provides assistance only when the\nrider is pedaling and ceases to assist when the bicycle reaches the speed of 20 miles\nper hour.\n\u2022 CLASS 2\u2014equipped with a motor or electronics that may be used exclusively to propel\n\n75\n\nthe bicycle and is not capable of assisting when the bicycle reaches the speed of 20\nmiles per hour.\n\u2022 CLASS 3\u2014equipped with a motor or electronics that provides assistance only when the\nrider is pedaling and ceases to assist when the bicycle reaches the speed of 28 miles\nper hour. This class is equipped with a speedometer.\n\nB. EMERGENCY VEHICLES\nWhen police cars, fire engines, ambulances, or other emergency vehicles approach using sirens,\nemergency lights, or other warning devices, you MUST YIELD the right-of-way. DRIVE AT ONCE TO\nTHE RIGHT SIDE OF THE ROAD AND STOP until the emergency vehicle has passed.\nUnless you are on official business,\ndo not follow within 500 feet of any\nfire vehicle responding to an alarm.\nYou may not drive or park on the\nsame block where the fire vehicle has\nstopped to answer an alarm.\nMOVE OVER LAW\nThe incidents of law enforcement officers, emergency medical services, and fire department personnel being struck while performing roadside duties are increasing frighteningly. Move over laws have\nbeen enacted to lessen the problem, requiring drivers to slow down and change lanes when approaching a roadside incident. Signs are posted on the highways.\nWhen approaching a stationary vehicle adjacent to a highway that is not parked in an apparent legal\nparking area that has flashing hazard lights illuminated, the driver shall reduce the speed of the vehicle, provide as much space as practical to the stationary vehicle, if practical and with due regard to\nsafety and traffic conditions, make a lane change into a lane not adjacent to the stationary vehicle.\nUpon approaching a stationary vehicle displaying amber lights, the driver of a vehicle traveling in the\nHOV lane shall, if practical, with due regard to safety and traffic conditions, make a lane change out\nof the HOV lane into a lane not adjacent to the stationary vehicle.\nIf you are convicted for NOT following the move over law, you must attend a four hour live classroom\ndefensive driving course within 90 days of conviction. If you fail to attend the defensive driving class,\nyour license will be suspended for 90 days.\n\nC. LARGE TRUCKS\nIt may sound obvious, but trucks are not large cars. To reduce the chance of a\ncrash with a large tractor-trailer, the so-called \u201c18-wheeler\u201d, motorists must be\nfamiliar with a truck\u2019s physical capabilities and common maneuvers. According\nto the National Highway and Traffic Safety Administration (NHTSA), 71% of fatal\ncrashes involving two or more vehicles, one of which is a truck, are caused by\nanother vehicle, usually a car.\nSIZE AND WEIGHT REGULATIONS\nMoving any vehicle that exceeds the legal size and weight limits on any highway is illegal except with\n\n76\n\na special permit. This section describes some of those limits. Remember, no local authority has the\npower to alter these limitations.\nWIDTH\nNo vehicle shall have a total outside width, including load, of more than 8 1/2 feet. One exception to\nthis rule is farm tractors. Their width may not exceed 9 feet. In addition, farm machinery may move\nshort distances on the highway, regardless of their size, if they are engaged in farm operations.\nHEIGHT\nNo vehicle shall exceed a height of 14 feet, including any load that may be carried.\nLENGTH\nNo single vehicle, except for fire-fighting equipment, shall exceed an overall length of 45 feet, including the front and rear bumpers. A truck tractor coupled to a semi-trailer or trailers is considered two\nvehicles.\nNote: All other combination of vehicles, with or without a load (such as a motor home pulling a boat),\nmay not exceed a total length of 65 feet, 8 feet in width, and 14 feet in height.\nPOSTING OF REGISTERED GROSS LADEN WEIGHT\nThe Utah State Tax Commission requires that every vehicle registered for 16,001 pounds or more\nhave the weight for which it is registered displayed on both the left and right sides of the vehicle. This\ncan be done with paint, stencils, or decals. The information must be in letters not less than two inches high and placed in an easily visible location.\nCLEARANCES\nAs you drive, you need to be aware of your vehicle\u2019s increased height, width, and length. Bridges,\ntunnels, and overhanging trees that were not a problem when driving your car can be a safety hazard\nwhen driving a larger vehicle. Some precautions you can take include:\n\u2022 Knowing the dimensions of your vehicle. Squeezing through a tight place is risky. When your\nclearance is under six inches, be safe and slow down. Hazards like rough roads might cause\nyou to bounce into a low ceiling or swerve into a close wall.\n\u2022 Being aware that some bridges and tunnels are not made for a car and a truck to pass through\nat the same time. If you have any doubts, let the other vehicle go through first.\n\u2022 Watch for fire escapes, low-hanging tree limbs, and filling station canopies. Be especially alert\nwhen you bring your vehicle in for a driving skills test. A few Driver License offices have canopies that are prime targets for unaware drivers.\nLOADS PROJECTING TO THE FRONT AND REAR\n\u2022 No train of vehicles or single vehicle shall carry a load\nextending more than three feet to the front nor more\nthan six feet to the rear of the vehicle\u2019s body. Requirements for placement of flags, if required, are listed later in this chapter.\nLOADS PROJECTING TO THE SIDES\n\u2022 No vehicle, including a passenger vehicle, may carry any load\nextending beyond the line of the fenders on the left side of the\nvehicle nor extending more than six inches beyond the line of\n\n77\n\nthe fenders on the right side. Requirements for lighting and flagging loads that project beyond\nthe sides or ends of a vehicle are discussed later in this section.\nMANEUVERABILITY\nTrucks are designed to carry products to and from towns and cities; they are not designed to be as\nmaneuverable as cars. Trucks have longer stopping and accelerating distances, wider turning areas,\nand weigh more. On multi-lane highways, tractor-trailers stay in the center lane to help with local\ntraffic flow on and off the highway. Staying in the middle lane also increases a truck driver\u2019s options if\nthey switch lanes to avoid a dangerous situation or a crash.\nListed below are common mistakes motorists must avoid when driving around trucks:\n\u2022 Cutting off a truck in traffic or on the highway to reach your exit or turn. Cutting into the open\nspace in front of a truck removes the truck driver\u2019s cushion of safety. Trying to beat a truck to a\nsingle-lane construction zone is particularly dangerous. Take a moment to slow down and exit\nbehind a truck\u2014it takes only a few extra seconds and can avoid causing a crash.\n\u2022 Don\u2019t linger alongside a truck when passing. Always pass a tractor-trailer completely and\nalways on the left side. If you linger when passing, your position makes it impossible for the\ntrucker to take evasive action if an obstacle appears in the road ahead.\n\u2022 Following too close or tailgating. When following behind a truck, if you can\u2019t see the truck\ndriver\u2019s rear view mirrors, there is no way the truck driver can see you. Tailgating a truck or\ncar is dangerous because you take away your safety cushion if the vehicle in front of you stops\nsuddenly. If the vehicle you are following hits something in the road, you will have no time to\nreact before it hits your car.\n\u2022 Never underestimate the size and speed of an approaching tractor-trailer. Because of its large\nsize, a tractor-trailer often appears to be traveling slower than it is. A substantial number of\ncar-truck collisions occur at intersections because the driver of the car does not realize how\nclose the truck is or how quickly it is approaching.\nBRAKING\nTractor-trailers take longer to stop than a car traveling at the same speed. The average passenger\ncar traveling at 55 mph can stop in about 130-140 feet, less than half the length of a football field. A\nfully loaded tractor-trailer may take more than 400 feet to come to a complete stop or one-third more\nthan the length of a football field.\nTURNING AND ONCOMING LARGE VEHICLES\nWatch for large vehicles\u2019 turn signals and give them lots of room. Large vehicles sometimes swing\nwide to the left to clear a curb on a right turn. Avoid a crash by not turning until the vehicle has finished its turn. Avoid wind blasts when you meet a truck by moving as far as you can to the right side\nof the road. Stop lines at intersections are designed to give larger vehicles more turning space. Always stop behind the stop lines. Do not cut in front of a truck in traffic. Do not try to beat a truck into\na single-lane construction zone. Trying to save a few seconds could cost your life.\nTURNING\nWith any turning vehicle, the rear wheels follow a shorter path than the front wheels. The longer the\nvehicle, the greater the difference. That\u2019s why the drivers of tractor-trailers must often swing out to\nthe left as the first step in making a right turn. When following a tractor-trailer, observe its turn signals\nbefore trying to pass. If it appears to be starting a left turn, wait a moment to check and see which\nway the driver will turn before passing on the right.\n\n78\n\nA TRUCKER\u2019S BLIND SPOT\nIt is important to be seen whenever you are driving. Many motorists falsely assume that truckers can see the road better because they sit twice as high as the\ndriver of a car. While truckers do enjoy a better forward view and have bigger\nmirrors, they still have SERIOUS BLIND SPOTS into which a car can disappear\nfrom view \u2014 UP TO 20 FEET IN FRONT OF THE CAB, ON EITHER SIDE OF\nTHE TRACTOR-TRAILER, PARTICULARLY ALONGSIDE THE CAB, AND UP TO\n200 FEET IN THE REAR.\nMotorists lingering in blind spots on the sides or at the rear of large trucks hamper the truckers\u2019 ability\nto take evasive action to avoid dangerous situations, thus increasing the possibility of a crash. An\nexcellent rule of thumb for motorists sharing the road with a tractor-trailer is, \u201cif you can\u2019t see the truck\ndriver in their side mirror, they can\u2019t see you.\u201d\nTHE NO-ZONE\nThe no-zone is the area around large vehicles in the driver\u2019s blind spots. These blind spots are on\nthe sides, rear, and front.\nSIDE NO-ZONE\nLarge trucks and buses have big no-zones on both sides. A\ntruck\u2019s largest blind spot is on the right side. It starts behind\nthe cab and goes the length of the truck. If you cannot see a\ndriver\u2019s face in the side view mirror, they cannot see you. Do\nnot drive alongside a large vehicle any longer than you have\nto. If the driver needs to swerve or change lanes, you could\ncollide.\nFRONT NO-ZONE\nBecause they are so big and heavy, large vehicles take longer to stop than cars. A\nloaded truck at 55 mph takes at least 335 feet to stop. That\u2019s more than 1.5 times\nthe distance a car takes. Never pull out in front of a large vehicle or change lanes\nin front of them. When passing, make sure you can see the whole front of the\nvehicle in your rear-view mirror before pulling back into the lane.\nREAR NO-ZONE\nLarge vehicles have huge blind spots up to 200 feet behind them. If you are too close, the driver\ncannot see your vehicle, and you cannot see what is ahead of you. Do not follow too closely. Place\nyourself so the driver can see you in their side mirrors. When stopped behind a large vehicle on a\nhill, be aware the vehicle may stall or roll backward colliding with your vehicle.\n\nD. MOBILITY VEHICLES\nA mobility vehicle is used by a person with a physical disability that meets the specifications outlined\nby the division and can be driven on a public roadway, within appropriate restrictions, and by an individual who holds a valid mobility vehicle permit. This permit issued by the division grants authority\nand specifies the conditions for a person with a physical disability to operate a mobility vehicle on a\npublic highway.\nNote: Pedestrian and mobility vehicles may be used on the highways and are exempt from regis-\n\n79\n\ntration, inspection, and the usual operator license requirements. The commissioner of Public Safety\ngoverns the authority to operate pedestrian vehicles.\n\nE. MOTOR-ASSISTED SCOOTERS\nFollow the same rules as a bicycle, moped, or motorcycle. A person under the age of 15 may not\noperate a motor-assisted scooter unless the person is under the direct supervision of the person\u2019s\nparent or guardian. A person may not operate a motor-assisted scooter:\n\u2022 In a public parking structure.\n\u2022 On public property posted as an area prohibiting skateboards.\n\u2022 On a highway with four or more lanes.\n\u2022 On a highway with a posted speed limit greater than 25 mph.\n\nF. MOTORCYCLES\nTo operate a motorcycle on Utah highways, your driver license must have a motorcycle endorsement.\nThe requirements for this endorsement are the same as for obtaining an operator driver license, except that the tests are different. If you have not previously been licensed to operate a motorcycle, you\nmay be issued a motorcycle learner permit. You can apply for a motorcycle learner permit by scheduling a duplicate license appointment at dld.utah.gov.\nFor further information on the motorcycle learner permit, refer to the motorcycle operator manual.\nThe division may waive the rider skills portion of the test upon completing a division-approved motorcycle education course. Any motorcycle operator or passenger who is under 21 years of age must\nwear an approved DOT helmet. Also, all motorcycles licensed for street use must have liability insurance coverage. The signature of a parent or guardian is required for motorcycle applicants under 18\nyears of age.\nMotorcyclists have the same rights and responsibilities as other drivers. There are things you need to\nknow to share the roadway with motorcycles safely:\n\u2022 Give motorcycles an entire lane. Do not share the lane. Motorcycles need space to react to\nother traffic.\n\u2022 Motorcycles are small and can be challenging to see. Always check your mirrors and blind\nspots for them.\n\u2022 Before turning left, be alert for motorcycles. Look carefully at the front and sides.\n\u2022 Do not believe a motorcycle is turning when it has a turn signal flashing. Many motorcycle turn\nsignals do not self-cancel. The rider may have forgotten to cancel the signal.\n\u2022 When following a motorcycle, stay at least two seconds back. When it is wet on the roadway\nincrease this distance. Riders may suddenly change speed or lane position to avoid potholes,\ngravel, wet, or slick places. They may also change speed or direction because of pavement\nseams, railroad crossings, and grooved paving. All of these can be deadly to a motorcyclist.\n\u2022 Remember that scooters and mopeds travel at a much lower speed than motorcycles.\nLANE FILTERING\nMotorcycle operators may pass another vehicle stopped in the same direction of travel in the same\nlane when the following conditions exist:\n\n80\n\n\u2022 The individual is on a roadway, or an off-ramp, divided into two or more\nadjacent traffic lanes in the same direction of travel.\n\u2022 The individual is on a roadway with a speed limit of 45 miles per hour or\nless or an off-ramp. Lane filtering is not permitted on an on-ramp.\n\u2022 The motorcycle is traveling at a speed of 15 miles per hour or less.\n\u2022 The vehicle being overtaken in the same lane is stopped.\n\u2022 The movement may be made safely.\n\u2022 For more information on lane filtering, visit: dld.utah.gov/motorcycle/\nNote: An operator of a motorcycle, moped, or bicycle who is 16 years of age or older may, after bringing the vehicle to a complete stop at the intersection or stop line and determines that the traffic-control signal has not detected the operator\u2019s presence by waiting a reasonable period of time and not\nless than 90 seconds at the intersection or stop line may proceed across the roadway if there is no\nother vehicles or pedestrians near the intersection.\n\nG. PEDESTRIANS\nA driver must yield to all pedestrians, even if they are not in a marked or unmarked crosswalk. Be aware of pedestrians crossing at mid-block crosswalks.\nThey may not be marked by warning signs and road markings. Always yield to\nthe visually impaired. When a pedestrian is crossing a street with a guide dog\nor carrying a white cane, you must come to a complete stop. If the traffic light\nis green, you must yield to pedestrians. Watch for pedestrians when driving\nnext to parked or stopped vehicles and check for pedestrians before backing up.\nSlow down near playgrounds and in residential areas. Children can run out from\nbetween parked vehicles, be ready to stop quickly. Children are present when lights are flashing in\na school zone; you must obey a slower speed limit. Stop and yield as signaled at school crossings\nwhere there is a traffic patrol.\nPedestrians should remember\u2014if there are sidewalks, you must use them. If there are no sidewalks,\nwalk or jog on the left shoulder as far away as possible from the edge of the roadway. Where neither\na sidewalk nor a shoulder is available, walk as near as possible to the outside edge of the roadway.\nAlways walk or jog facing traffic on the left side of the shoulder or roadway.\nSLOW DOWN, BE AWARE, AND ALERT\nDrivers are vital in keeping pedestrians and bicyclists safe on our roads. Pedestrians and bicyclists\nare much more vulnerable than people in vehicles.\nDrive like you would want people to drive around you and your family. Slow down when you see\npedestrians or bicyclists or when visibility is reduced, such as in bad weather or when it\u2019s dark. Understand that higher speeds lead to greater injuries to pedestrians and bicyclists. Recognize that you\nare driving through our community, and your choices can significantly impact other people\u2019s lives.\nWhen you are driving:\n\u2022 Look out for pedestrians everywhere, at all times. Safety is a shared responsibility.\n\u2022 Take extra care when turning, and look twice for pedestrians.\n\u2022 Many pedestrian-motor vehicle crashes happen when vehicles are turning.\n\n81\n\n\u2022 Use extra caution when driving in hard-to-see conditions, such as nighttime, early morning, or\nbad weather.\n\u2022 Slow down and be prepared to stop when turning or otherwise entering a crosswalk.\n\u2022 Always follow all traffic laws, including speed limits.\n\u2022 Yield to pedestrians in crosswalks and stop before the crosswalk to allow other vehicles to see\nthe crossing pedestrians so they stop, too.\n\u2022 Be extra cautious when backing up; pedestrians can move into your path.\n\u2022 Never pass vehicles stopped at a crosswalk; there may be people crossing that you can\u2019t see.\n\u2022 Never assume the right of way.\n\u2022 Never drive under the influence of alcohol and/or drugs.\nIMPORTANT PEDESTRIAN STATS\nThe Highway Safety Office reported that in 2024, there were a total of 45 pedestrian fatalities.\nOver 10 years (2014-2024), the months with the most pedestrian deaths were:\n\u2022 October (61)\n\u2022 December (58)\n\u2022 January (45)\n\u2022 July (44)\n\u2022 September (41)\nOver 10 years (2014-2024), the hours with the most pedestrian deaths were:\n\u2022 9 p.m. (52)\n\u2022 10 p.m. (41)\n\u2022 6 p.m. (40)\n\u2022 7 p.m. (40)\n\u2022 8 p.m. (38)\nThe leading pedestrian contributing factors in deaths in 2024 were:\n\u2022 Entering the roadway or crossing the road\n\u2022 Walking/cycling on roadway/sidewalk\nThe leading driver contributing factors in pedestrian deaths in 2024 were:\n\u2022 Failing to yield right-of-way\n\u2022 Improper turning\n\nH. PEDESTRIAN VEHICLES\nA pedestrian-vehicle is designed and manufactured for the use of the disabled. It must be less than\n48 inches wide, have an engine displacement of less than 300 cubic centimeters and less than 12\nbrake horsepower, and not be capable of exceeding 30 mph.\n\nI. POLICE/TRAFFIC STOPS\n82\n\nIf the police pull you over, move to the right side of the road (even when traveling in the HOV lane)\nand make sure you are in a safe spot to stop:\n\u2022 Put your vehicle in park and turn off your engine.\n\u2022 Stay in the vehicle unless asked to get out.\n\u2022 Roll down your window so that you and the officer can talk.\n\u2022 Remain calm and keep your safety belt fastened. Ask your passenger(s) to do the same.\n\u2022 Keep your hands on the steering wheel.\nThe officer may ask for documentation\u2014keep one hand on the wheel and reach slowly for the documents. Answer the officer\u2019s questions and never try to run from the law; many fatal crashes result\nfrom police chases.\n\nJ. SLOW MOVING VEHICLES\nWatch for slow-moving vehicles, especially in rural areas. A fluorescent or reflective orange and red\ntriangle displayed on the rear means the vehicle is moving less than 25 mph. Use caution when you\nsee them, and be sure it is safe before you pass.\nFARM MACHINERY\nWatch for farm equipment moving across the road or driving on state highways in rural areas. Pass\nwith care. Remember, the driver cannot hear your vehicle.\nGOLF CART\nLocal municipalities may pass ordinances to allow golf carts to be operated on designated public\nroads. Golf cart operators must check local ordinances before operating a golf cart on a public highway.\nGolf cart operators are responsible for safely operating a golf cart and shall comply with the same\nrules as a bicycle.\nGolf cart operators are prohibited from consuming alcohol while operating a golf cart.\nANIMAL-DRAWN VEHICLES AND HORSEBACK RIDERS\nYou may share the road with horse-drawn vehicles or horseback riders.\nThey have the same right to the road as a motor vehicle. They must follow the same\nrules you do. Pass with care. Do not use your horn or \u201crev\u201d the engine. This may\nscare the horse and cause a crash. Watch out for left turns into fields and driveways.\nWarning signs may be posted in areas where you are likely to find horse-drawn vehicles and horseback riders. Be alert.\n\nK. STREET LEGAL ALL-TERRAIN\nIt is possible to register an all-terrain type 1 vehicle (ATV), a utility vehicle (UTV), or a full-size all-terrain (FSV) vehicle as a street-legal all-terrain vehicle when certain conditions are met.\nATV\u2014TYPE 1\nAny motor vehicle 52 inches or less in width, having an unladen dry weight of 1,500 pounds or less,\n\n83\n\ntraveling on three or more low-pressure tires, having a seat designed to be straddled by the operator\nand designed for, or capable of traveling over unimproved terrain.\nATV\u2014TYPE 2\nAny motor vehicle 80 inches or less in width, traveling on four or more low-pressure tires, having a\nsteering wheel, non-straddle seating, a rollover protection system, and designed for or capable of\ntravel over unimproved terrain, and is an electric-powered vehicle; or a vehicle powered by an internal\ncombustion engine and has an unladen dry weight of 3,500 pounds or less. \u201cAll-terrain type II vehicle\u201d does not include golf carts; any vehicle designed to carry a person with a disability; any vehicle\nnot specifically designed for recreational use, or farm tractors as defined under Section 41-1a-102.\nUTV\u2014UTILITY-TYPE VEHICLE\nAny recreational vehicle designed for and capable of traveling over unimproved terrain. Traveling on\nfour or more tires and having a width that, when measured at the widest point of the vehicle, is not\nless than 30 inches and does not exceed 70 inches. An unladen dry weight of 2,200 pounds or less.\nHaving a seat height of 25 to 40 inches when measured at the forward edge of the seat bottom. Having side-by-side seating with a steering wheel for control.\nFSV\u2014FULL-SIZE ALL-TERRAIN VEHICLE\nAny recreation vehicle designed for and capable of traveling over unimproved terrain. Traveling on\nfour or more tires and having a width that, when measured at the widest point of the vehicle, is not\nless than 55 inches and does not exceed 92 inches. Having an unladen dry weight of 6,500 pounds\nor less, a maximum seat height of 50 inches when measured at the forward edge of the seat bottom,\nand a steering wheel for control.\nREGISTRATION\nA street-legal all-terrain type 1, utility-type, and full-size vehicle must comply with county motor vehicle emissions inspections and maintenance programs.\nLICENSING\nThe street-legal ATV/UTV and FSV shall comply with the same requirements as a motorcycle in terms\nof following traffic rules, registering, titling, odometer statement, vehicle identification, license plates,\nand registration fees.\nNote: If you have a Class D or CDL, you are licensed to drive a street-legal ATV/UTV or FSV.\nHIGHWAY USE\nAll-terrain type I, a UTV or an FSV that meets the requirements may be operated as a street-legal\nATV/UTV or a FSV on a street or highway that is a highway with one lane in each direction.\nThe street-legal ATV/UTV or FSV operating on a highway may not exceed the lesser of the posted\nspeed limit or 50 miles per hour. If operating on a highway with a posted speed higher than 50 miles\nper hour, the operator shall operate the street-legal ATV/UTV or an FSV on the extreme right-hand\nside of the roadway and shall equip the street-legal ATV/UTV with a reflector or reflective tape.\nA street-legal ATV/UTV or FSV shall be equipped with one or more headlamps, one or more tail\nlamps, either a tail lamp or a separate lamp to illuminate the rear license plate with a white light, one\nor more red reflectors on the rear, one or more stop lamps on the rear, amber or red electric turn signals on each side front and rear, a braking system other than a parking brake, a horn or other warning\ndevice, a muffler and emission control system which complies with Utah requirements, rearview mir-\n\n84\n\nrors on the left side of the driver, a windshield (unless the operator wears eye protection while operating the vehicle), a speedometer illuminated for nighttime operation and tires no larger than the tires\nthe ATV manufacturer made available for the ATV and have at least 2/32 inches or greater tire tread.\nAnyone younger than 21 years of age is required to wear a DOT-approved helmet.\nFor information regarding the usage of or to register for the youth training courses, contact the Department of Natural Resources State Parks and Recreation at 801.538.7220 or recreation.utah.gov/\noff-highway-vehicles/.\n\nL. TRAINS AND RAILROAD CROSSINGS\nAs the number of drivers increase, more and more people die at railroad crossings. In a car-train collision, the odds that those in the car will live are not very good. Learn what to do at railroad crossings\nso that you do not have a collision:\n\u2022 Use extreme caution at all railroad crossings, and always slow down.\n\u2022 Never pass a car that is going your direction at a railroad crossing.\n\u2022 Do not park closer than 50 feet from a railroad crossing unless signs indicate that you may or it\nis allowed by local law.\n\u2022 When you stop at a railroad crossing, you must be between 15 and 50 feet from the nearest\nrail.\n\u2022 Trains sound their horns as they approach a crossing; therefore, turning down the car radio is\na good safety measure.\nEvery railroad crossing should be taken seriously:\n\u2022 Do not assume that a train is not coming at night just because you do not see any lights.\n\u2022 Slow down or stop and look before crossing the tracks.\n\u2022 If lights are flashing, you must come to a complete stop. You may not proceed while the lights\nare flashing.\n\u2022 After coming to a complete stop, if you suspect the flashing lights are not working properly, you\nmay drive through the railroad crossing only if you have a clear line of sight of at least one mile\ndown the tracks in both directions, there is not evidence of an approaching train, and you can\ncross the tracks safely.\n\u2022 You may not drive through, around, or under any crossing gate or barrier at a railroad crossing\nwhile they are down or being opened or closed.\nPublic railroad crossings have been marked with warning devices for your safety by highway departments and railroad companies. Learn what the warning devices are and watch for them. With these\nwarning devices and caution on your part, railroad-crossing crashes may never happen.\nADVANCE WARNING SIGNS\nAdvance warning signs are posted before you reach the crossing and tell you to slow\ndown, look, listen, and be prepared to stop at the crossing ahead.\n\n85\n\nPAVEMENT MARKINGS\nA stop line, an \u201cX\u201d and the letters \u201cRR\u201d may be painted on the pavement in front of railroad crossings. These markings warn you to be aware of the crossing ahead and to pay\nparticular attention to the possible approach of a train.\nRAILROAD CROSSBUCK SIGNS\nCrossbuck signs are found at all public crossings. If there is more than one set of tracks,\na sign below the crossbuck indicates the number of tracks. Be prepared to stop at the\ntracks if a train is coming. You must yield to train traffic.\nFLASHING LIGHTS\nFlashing lights and bells are used with crossbuck signs at many railroad crossings. Always STOP when lights begin to flash, or bells begin to ring, which means a train is coming. If there is more than one set of tracks, ensure all tracks are clear before crossing.\nGATES\n\nGates are used with flashing light signals at some railroad crossings. Stop when\nthe lights flash and before the gates begin to lower across your traffic lane. Remain stopped until the gates are raised and the lights stop flashing. DO NOT DRIVE\nAROUND THE GATES.\n\nMOTORCYCLES AND BICYCLES\nRiders should approach a railroad crossing with caution. Do not swerve to get a better angle for\ncrossing.\nSCHOOL BUSES\nDrivers are required to stop at all railroad crossings. The driver must check both directions and listen\nto approaching trains, proceed only when safe, and never shift gears on the crossing.\nTRUCKS CARRYING HAZARDOUS MATERIALS\nDrivers are required to stop at all railroad crossings. Drivers should make a safe, gradual stop to\nminimize the possibility of causing a crash. Do not shift gears when crossing the tracks. When possible, reroute from railroad crossings or use a crossing that utilizes flashing red lights and/or gates.\nGENERAL RAILROAD SAFETY INFORMATION\nExpect a train on any track at any time. Freight trains do not travel on a predictable schedule.\nSchedules for passenger trains change.\nTrain tracks are private property, no matter which railroad owns them. Trains have the right-of-way\n100% of the time\u2014over ambulances, fire engines, cars, the police, and pedestrians.\nIf there are rails on the railroad ties, assume that the track is in use, even if there are weeds or the\ntrack looks rusty.\nA typical locomotive weighs approximately 400,000 pounds or 200 tons. When 100 railcars are added to the locomotive, the train can weigh approximately 6,000 tons. The weight ratio of an automobile to a train is proportional to a soda can and an automobile.\n\n86\n\nA train may extend three feet or more outside the steel rail, making the safety zone for pedestrians\nwell beyond the rails.\nTrains cannot stop quickly. It is a simple law of physics: the considerable weight and size of the train\nand the speed of the train dictate how quickly it can stop under ideal conditions. Once the train is\nset into emergency braking, a 100-car freight train traveling at 55 mph will need more than a mile to\nstop\u2014that\u2019s approximately 18 football fields.\nThere are roughly 200,000 miles of railroad tracks in the United States. Trains can move in either\ndirection at any time. Trains are sometimes pushed by locomotives instead of being pulled. This is\nespecially true in commuter and light rail passenger service.\nModern trains are quieter than ever, with no telltale \u201cclackety-clack.\u201d Also, the train approaching will\nalways be closer and moving faster than you think.\nCross tracks only at designated pedestrian or roadway crossings. Observe and obey all warning\nsigns and signals.\nNever walk down a train track; it\u2019s illegal and dangerous. By the time the locomotive engineer can\nsee a trespasser or a vehicle on the tracks, it is too late. The train cannot stop quickly enough to\navoid a collision.\nIf your vehicle stalls on a crossing, immediately get everyone out of the car and off the tracks. Notify local authorities immediately. If a train is coming, stay clear of the tracks and run toward the approaching train at an angle away from the train. Moving toward the approaching train, will make you\nless likely to be hit by flying debris. If no train is in sight, post lookouts and try to start or move the\nvehicle.\nTRAX LIGHT RAIL AND STREETCARS\nUtah Transit Authority operates a light rail system throughout the Salt Lake Valley. The system has\nover 45 miles of track and 67 actively used grade crossings.\nOverheard electrical lines power light rail cars. Each car is 88 feet long and weighs approximately\n88,000 pounds. Trains size can vary from one to four cars in length. It is important to know that light\nrail vehicles accelerate quickly and reach speeds up to 65 mph within 21 seconds. Never try to beat\na light rail train through a railroad crossing.\nLight rail grade crossings must be treated in the same manner as all train crossings. Motorists must\nwait until the gates have entirely raised and the red lights have stopped flashing before entering the\ncrossing. It is also important to ensure there is enough room to completely clear the tracks before\nentering the crossing. Never stop on the tracks.\nThere are many areas where light rail trains operate through the same intersections and streets as\nautomobiles. When driving in these areas, extra attention must be paid to traffic signals and posted\nsigns.\nAt some locations in the system, an overhead sign will flash the logo of a train. This means a train\nis approaching the area; you should pay extra attention to obey traffic signals at these intersections.\nThe flashing train logo is not an indication to stop but merely an additional warning device.\n\n87\n\nSECTON 15: Vehicle Equipment\nThe following list will serve as a handy guide to Utah\u2019s equipment regulations.\nADVANCED DRIVER ASSISTANCE SYSTEMS (ADAS) SAFETY FEATURES\u2014Many newer\nvehicles on the road today have driver assistance safety features designed to save lives and prevent\ninjuries, if used properly. Some driver-assist safety features sense and monitor conditions, identify\npresent and potential dangers, and may help you avoid a possible crash. These safety features may\nprovide alerts, such as sounds or vibrations, or may take control of the vehicle, such as adjusting the\nbraking or steering. Safety features include but are not limited to blind spot warning, backup camera,\nforward collision warning, automatic emergency braking, lane keeping assistance, and active parking\nassist.\nWhen taking your driving skills test, you cannot use certain safety features, such as parking assist\nand cruise control.\nSafety features are meant to assist you in driving; they are not there to drive the vehicle. You must\nremain engaged and focused on the driving task at all times. You are responsible for being aware of\neverything around you by performing head checks and using mirrors and cameras to observe traffic and other roadway users. You are responsible for the safe operation of your vehicle at all times.\nDo not rely on safety features alone. It is important to follow the tips below when driving vehicles\nequipped with safety features:\n\u2022 It is your responsibility always to stay focused when driving.\n\u2022 Read your vehicle owner\u2019s manual to learn how your vehicle\u2019s safety features operate.\n\u2022 Know the limitations of your vehicle\u2019s safety features.\n\u2022 Safety features may not work correctly in rain, snow, ice, fog, hills, and curves.\n\u2022 Always keep vehicle sensors clean and damage-free.\n\u2022 Always keep software technology current (if applicable) and follow your vehicle manufacturer\u2019s\nrecommendations.\nADAS safety features provide many benefits and have great potential to assist drivers in reducing\ncrashes, injuries, and fatalities when appropriately used.\nFor additional information, visit:\nhttps://mycardoeswhat.org/\nwww.trafficsafetyeducationfoundation.org\nwww.nhtsa.gov\nBRAKES\u2014All motor vehicles must have brakes that meet federal standards on all wheels. An exception to the law is any truck or truck tractor with three or more axles, which must have brakes on all\nwheels except the front wheels.\nNote: If your vehicle is equipped with ABS brakes, it is unnecessary to pump them when braking in a\nslippery situation; apply constant and firm pressure, and your vehicle will make a smooth, safe stop.\nConsult the Utah Highway Patrol or the U.S. Department of Transportation Federal Highway Administration for brake requirements on trailers.\n\n88\n\nCLEARANCE LIGHTS\u2014Buses, RVs, and trailers 80 inches or more in width must have two amber\nlights on the front and one on each side. Two red lights are required on the rear and one on each\nside at the rear. Lights must be visible from 500 feet at night.\nFIRE EXTINGUISHER\u2014Although fire extinguishers are not required for all vehicles, it is recommended that all drivers carry at least one. Stopping a fire in its early stages can avoid expensive\nproperty loss and prevent an extremely hazardous condition. Fire extinguishers; however, are not\neffective unless appropriately handled.\nFLAGS AND LIGHTS FOR EXTENDING LOADS\u2014Each vehicle that carries a load extending four\nfeet or more beyond the bed or body of the vehicle must display two flags or lights located on the rear\nof the load.\nThe flags may be used only during the daytime and must be at least 12 inches square. Lights are\nfor use during nighttime and must be visible for at least 500 feet. Some loads may also require red\nreflectors in addition to the lights.\nFLARES, REFLECTORS, ELECTRIC LIGHTS, AND FLAGS\u2014Trucks, truck tractors, and buses\nmust have three flares, portable red emergency reflectors, or red electric lights, and two red flags with\nstandards.\nEmergency flares, reflectors, and lights must be capable of being seen and distinguished at a distance of not less than 600 feet. Flares must be capable of burning for 12 hours. Fuses must meet\nthe New York Bureau of Explosives Standards and burn for at least 15 minutes. Vehicles transporting\nexplosive or flammable materials may not use flares or fuses.\nHEADLIGHTS\u2014All vehicles, except motorcycles, must have at least two operational headlights (one\non each side), that are white in color and can shine 350 feet on high and 100 feet on low beams. All\nvehicles must have a high-beam indicator light.\nHORN\u2014All motor vehicles must have one functioning horn which must be heard under normal conditions from a distance of no less than 200 feet.\nLICENSE PLATE LIGHT\u2014All vehicles will have one white light mounted on the rear of the vehicle\nso that the license number may be read at a distance of at least 50 feet. This light may be part of the\ntail lamp assembly.\nMUD FLAPS OR GUARDS\u2014Any vehicle with a gross vehicle weight rating of 10,500 pounds or\nmore, any vehicle with altered suspension or tire size, or any trailer with an unladed weight of 750\npounds or more shall be equipped with wheel covers, mudguards, flaps, or splash aprons behind\nthe rearmost wheels. The flaps or guards must be at least as wide as the tires and made of metal or\nflexible material, which will prevent most road materials from being thrown into the windshield of any\nfollowing vehicle. The ground clearance must not be more than 50% of the wheel\u2019s diameter on the\nrearmost axle, no more than one-fifth the distance from the center of the diameter of the rearmost\naxle to the flaps.\nPARKING BRAKE\u2014All vehicles, except motorcycles, must have one functional parking brake.\nPARKING LIGHTS\u2014One or more white or amber-colored lights are to be mounted on the front of\neach vehicle.\n\n89\n\nPOLLUTION CONTROL DEVICES\u2014Owners of vehicles equipped by the manufacturer with pollution control devices are required to keep and maintain the equipment as effective as the original\nequipment.\nNote: This law does not apply to propane vehicles if the emissions meet all existing standards.\nRED OR BLUE LIGHTS VISIBLE FROM THE FRONT\u2014Red or blue lights visible from the front of\na vehicle may not be used except by emergency, school, snow removal, or other authorized vehicles.\nREFLECTORS\u2014Vehicles must have one amber reflector on each side of the vehicle located at or\nnear the front and one red reflector on each side at or near the rear. The reflectors must be visible\nfrom 500 feet at night and placed not less than 15 inches or more than 60 inches above the ground.\nIf the highest part of the permanent structure is less than 15 inches, the reflectors must be mounted\nas high as possible.\nVehicles with an overall length of 30 feet or more must have one amber reflector on each side of\nthe vehicle located at or near the center of each side. The visibility and height requirements are the\nsame.\nSAFETY CHAINS OR CABLES\u2014All towed vehicles and regular hitches or couplings must have\none chain or cable strong enough to prevent the vehicles from separating.\nSIDE MARK LIGHTS\u2014Buses, recreational vehicles, and trailers 80 inches or more in width must\nhave two side markers on each side (amber in front and red at the rear.) The lights must be visible at\nnight from 500 feet to the side.\nSIRENS, WHISTLES, AND BELLS\u2014Only authorized emergency vehicles may be equipped with\nsirens, whistles, or bells.\nTAIL AND STOP LIGHTS\u2014Vehicles must have two red tail/stop lights mounted on the rear. The\nlights must be visible from 500 feet to the rear in regular sunlight. One tail/stop light is permissible on\nmotorcycles and certain vehicles manufactured before 1956.\nTURN SIGNALS\u2014Two red, yellow, or amber lights must be mounted on the rear of the vehicle, and\ntwo white, yellow, or amber lights must be mounted on the front of each vehicle. These lights must\nbe visible from 100 feet in normal sunlight. Turn signals are not required on vehicles manufactured\nbefore 1953, if the vehicle is less than 80 inches wide.\nWINDSHIELD\u2014A windshield is required on all vehicles except motorcycles. Your windshield must\nbe clean of dirt, frost, or anything else that might obstruct your vision while driving (such as something\nhanging from the rearview mirror.)\nWINDSHIELD WIPER\u2014All vehicles with windshields must have at least one wiper to clean rain,\nsnow, or other moisture from the windshield. If your vehicle was originally equipped with two windshield wipers, both must function properly. A wiper system with two or more speeds is required on all\nvehicles manufactured after 1967.\n\n90\n\nSECTION 16: Towing\nOn occasion, you may be called upon to tow another vehicle. In this situation, there are only three\nrules to remember:\n\u2022 The drawbar or other connections between any tow vehicles may not exceed 15 feet in length from one vehicle\nto the other.\n\u2022 When a connection consists of a chain, rope, or cable,\na red flag or other signal shall be attached to the connecting device. The flag shall be no smaller than 12\ninches square (one-foot square.)\n\u2022 No person shall operate a train of vehicles when any trailer or other vehicle being towed whips\nor swerves dangerously or unreasonably from side to side.\nPLACEMENT OF WARNING DEVICES\nYour vehicle may break down on the road at some point. It is important to know when and how to\nplace the flares, flags, lights, etc.. Warning devices must be displayed whenever your vehicle is at\nleast 80 inches wide or 30 feet long and is disabled or stopped along the road for more than 10 minutes. The warning devices are not required if you are:\n\u2022 Legally parked in an urban district.\n\u2022 Lawfully picking up or letting off passengers.\n\u2022 Stopped to avoid conflict with other traffic.\n\u2022 Complying with directions from a police officer or an official traffic control device.\nTwo simple steps for placing warning devices in emergencies are:\n\u2022 Immediately place a flare, lighted fuse, electric lantern, or emergency reflector to the side of\nthe vehicle (in the direction of the nearest oncoming traffic.)\n\u2022 Next, place flares, electric lights, or reflectors 100 feet to the front and rear of the vehicle. Also,\nplace a warning device on the traffic side of, and not less than 10 feet from, the rear of your\nvehicle.\nREMEMBER, FLARES AND FUSES MAY NOT BE CARRIED IN VEHICLES TRANSPORTING EXPLOSIVES, FLAMMABLE LIQUIDS OR COMPRESSED GAS.\nListed below are a few additional points you need to know about the placement of warning devices:\n\u2022 On a one-way street, the rear flag should be placed 200 feet to the rear.\n\u2022 Warning devices need not be displayed if sufficient light reveals persons or vehicles from 1,000\nfeet.\n\u2022 If your vehicle breaks down within 500 feet of a curve, hilltop, or something else that obstructs\na clear view, the warning device in that direction shall be placed far enough to give ample\nwarning to approaching motorists. The warning device; however, may not be placed more than\n500 feet away from the vehicle no closer than 100 feet to the vehicle.\nNote: All warning devices must be placed in the center of the lane in which your vehicle is stopped.\nIf your vehicle is entirely off the road, place the devices on the shoulder of the road as close as possible to the road surface.\n\n91\n\nSAFE USE OF FLARES AND FUSES\nWarning devices such as flares and fuses are meant as safety aids. Do not let them become a safety\nliability. Careful and safe use of these devices involves:\n\u2022 Keep the lighted end well away from your face and eyes. Fuses, especially, can cause nasty\nburns.\n\u2022 Do not attach any flare or fuse to your vehicle. Not only is this a hazardous action, but it is\nalso illegal.\n\u2022 Keeping the burning flares or fuses away from fuel leakages and spills.\nTIRE FIRES\nTire fires can be a serious problem for drivers. The best way to avoid this problem is to prevent it in\nthe first place. The following are a few things you can do to decrease the chance of having a tire fire:\n\u2022 Check tires and brakes frequently for unusual heat. If any tires are soft or flat, change them.\n\u2022 Never drive for an extended period of time on a soft or flat tire or with a brake that is dragging.\nThese situations can result in heat buildup and cause a tire fire.\n\u2022 Never ignore a hot tire. Either stay with the vehicle until the tire is cool or change it.\n\u2022 Remember to always release your parking brake before moving the vehicle.\n\u2022 Remain alert for potential problems from dragging or overheating brakes, leaking oil seals that\nmay splash oil on a hot tire, or dual tires that are partially deflated. When this condition exists,\nyour odds for a fire are very high.\nIf a tire fire does occur, these actions will help:\n\u2022 An ample water supply is probably the best remedy for a tire fire. If possible, get to a fire station for assistance.\n\u2022 Fire extinguishers are usually not very practical for this type of fire. Shoveling dirt on the tire\ncan sometimes retard the fire enough for you to get the tire off.\n\u2022 If you cannot get the tire off, try driving until the tire burns off the rim or until you reach a good\nwater source. This alternative is certainly better than just waiting. If you just sit and wait, your\nvehicle will probably burn up.\nAs a last resort, drop your trailer. By doing that, you will at least save one of the units.\nGENERAL FIRE INFORMATION\nNot all fires will be tire fires, and you need to be prepared for them when they occur. Some general\nhints include:\n\u2022 Do not waste the contents of your fire extinguisher. The contents are limited, so carefully aim\nto make every burst count.\n\u2022 Fight fires with the wind at your back. If you are using an extinguisher, your efforts will be more\neffective and you will avoid having poisonous or caustic gases blown into your face.\n\u2022 Be familiar with different types of fires. For example, fighting a gasoline or oil fire with water\nwill only spread the fire.\n\n92\n\nAPPENDIX A: Optional Information\nA. ORGAN DONATION\nYou have the power to save lives by becoming an organ and tissue donor.\nPeople who become organ and tissue donors see it as a way to make a difference.\nThey say it feels good to know they can help others. As of 2022, more than 100,000\npatients in the U.S. are waiting for life-saving organ transplants. That\u2019s more people\nthan most football or baseball stadiums can seat, and the list continues to grow.\nWhen applying for or renewing your driver license or state ID, you can register your\nwish to be an organ, eye or tissue donor. You will then be registered on the Yes Utah Donor Registry.\nIf you do not wish to be an organ, eye, or tissue donor, nothing further needs to be done.\nOne organ donor can potentially save the lives of eight people. Someone who donates tissues can\nhelp over 75 people. An open casket funeral is still possible, and there is NO charge to the donor\u2019s\nfamily for the recovery of organs and tissues.\nIt is also important to tell your family and significant others that you wish to be a donor so they can\nserve as your advocate and speak on your behalf at your time of death. In addition, it is helpful to\ncover all your bases by carrying a donor card in your wallet and telling your physician, faith leader,\nand attorney of your intent.\nYou may have more questions about organ and tissue donation. To get the facts, contact:\n\u2022 DonorConnect 866.937.8824 or yesutah.org.\n\u2022 Donate Life America at 1.800.355.7427 or donatelife.net.\n\u2022 US
