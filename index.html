Department of Health and Human Services at organdonor.gov.\n\nB. VOLUNTARY CONTRIBUTIONS\nThe following opportunities have been made available for Utah residents to voluntarily contribute to\none or more organizations. The voluntary contributions are not part of the driver license, driving privilege card, identification card, or vehicle registration fees.\nFRIENDS FOR SIGHT\nUtah residents may make a voluntary contribution of $2.00 for vision screening when applying for a\nvehicle registration, a driver license, a driving privilege card, an identification card, or a renewal of any\nof the four. The contribution will be forwarded to Friends For Sight.\nFor more information, please visit friendsforsight.org.\nORGAN DONATION\nUtah residents may contribute $2.00 to the Organ Donation Contribution Fund when applying for a\nvehicle registration, a driver license, a driving privilege card, or an identification card, or renewal of\nany of the four. The funds will be administered by the Department of Health and dispersed to organizations that promote and support organ donation, assist in maintaining and operating a statewide\n\n93\n\norgan donation registry, and provide donor awareness education. For more information, please visit\nyesutah.org.\nMOBILITY ASSISTANCE\nUtah residents may make a voluntary contribution of $1.00 to the \u201cOut and About\u201d Homebound Transportation Assistance Fund when applying for a driver license or identification card, or a renewal of\neither. The funds will be administered by the Department of Human Services, Division of Aging and\nAdult Services, and will be used for public transportation assistance for seniors or people with disabilities. For more information, please visit dspd.utah.gov.\n\nC. EMERGENCY CONTACT DATABASE\nA Utah license certificate holder or identification card holder may provide the division with information\nfor two individuals who may be contacted by law enforcement in the event of a motor vehicle crash\nor other emergency situation if the certificate holder is unable to communicate with the contact person(s).\nThe license holder may provide this information to the division by completing a form at any Utah Driver License Office or at dld.utah.gov.\n\n94\n\nAPPENDIX B: Identity Fraud and\nDetection\nThe issue of preventing identity fraud has always been a critical concern for the division. Nationally\nand locally, the cases of identity fraud reported to the Federal Trade Commission ID Theft Database\nshow an alarming trend. The Federal Trade Commission estimates that as many as 9 million Americans have their identities stolen each year.\nUtah law states a person is guilty of identity fraud when that person knowingly or intentionally \u201cobtains\npersonal identifying information of another person and uses, or attempts to use, that information with\nfraudulent intent, including obtaining, or attempting to obtain credit, goods, services, any other thing\nof value, or medical information.\u201d\nIdentity fraud is a felony.\nThe Driver License Division has an ongoing program to train its employees\nto identify fraudulent documents. Technological advances are being utilized\nto identify fraudulent documents and safeguard the documents issued by the\ndivision. The Driver License Division cooperates fully with all local, state,\nand federal law enforcement agencies in identifying and prosecuting cases of\nidentity fraud.\nKeep your personal identification documents, such as birth certificates, social security cards, and\nmarriage certificates, in a secure location to protect yourself. Carry with you only the information and\nbank cards that you need. Guard your mail and trash from theft. Don\u2019t give out personal information over the phone, mail, or internet unless you have initiated the contact or are sure you know with\nwhom you are dealing. Before giving out any personal information, ask how that information will be\nused and secured. Annually review your credit report and closely examine all your financial statements. Stay informed.\nThe Federal Trade Commission has a great deal of information available in print and on the internet,\nvisit consumer.ftc.gov.\n\n95\n\nAPPENDIX C: Vehicle Registration\nIn Utah, the Division of Motor Vehicles (DMV) handles vehicle, vessel, and aircraft registration, while driver license and identification\ncards are handled through the Driver License Division (DLD).\nWHAT VEHICLES MUST BE REGISTERED\nCars, watercraft, trucks, off-highway vehicles, trailers, snowmobiles, campers, aircraft, motorcycles, low-speed electric vehicles,\nand street-legal ATVs.\nTrailers weighing less than 750 pounds when empty and not used for commercial purposes are not\nrequired to be registered. However, any trailer may be registered for the resident\u2019s convenience.\nWHO MUST REGISTER THEIR VEHICLES\nUtah residents must register any of the above vehicles for use.\nNon-residents using their watercraft in Utah for more than 60 days per year must register in Utah.\nNon-residents using their off-highway vehicle or snowmobile in Utah pay an annual user fee to the Division of Parks and Recreation. Upon payment of the fee, a user receives a decal for display on the\noff-highway vehicle or snowmobile. Decals are available from Parks and Recreation or their authorized agents.\nExceptions: Non-resident students who pay non-resident tuition, certain military personnel, temporary\nworkers, and individuals temporarily in Utah engaged in public or charitable service may be exempt\nfrom registering vehicles in Utah.\nWHEN REGISTERING VEHICLES IN UTAH\nContact the Department of Motor Vehicles (DMV) at 801.297.7780 or their website at dmv.utah.gov\nfor more information on vehicle registration and emissions.\n\n96\n\nAPPENDIX D: Your Car and Clean Air\nThe U.S. Environmental Protection Agency has prepared this fact\nsheet to answer some of the most common questions about reducing emissions from private vehicles. This is a significant concern, as\ncars are a primary source of air pollution in the United States. Vehicle emissions contribute to health and environmental problems like\nurban smog, air toxics, and global warming. Yet individual driving\nhabits make a big difference in car pollution.\nThree easy things you can do to help keep emissions as low as possible are to avoid unnecessary\ndriving, maintain your car properly, and drive your car wisely.\nBy combining these strategies, you can reduce the amount your car pollutes. There are additional\nbenefits: your vehicle will last longer, and you will save money.\nHELPFUL HABITS TO REDUCE POLLUTION\nEven a perfectly maintained car will pollute more than necessary if driven carelessly. Your car\u2019s emissions will be lower if you apply common sense to your driving and follow the basic rules of the road.\nDriving situations likely to increase pollution include:\nIDLING\u2014you will save gas by turning the engine off and restarting it again if you expect to idle for\nmore than 30 seconds. You will also prevent pollution by avoiding long idles. Try parking your car\nand going into restaurants, banks, etc. instead of idling in drive-up lanes.\nSTOP AND GO DRIVING\u2014driving in traffic is not always avoidable. But whenever possible, plan\ntrips outside rush hour and peak traffic periods. Try to \u201csmooth\u201d your driving by accelerating and decelerating gradually, anticipating stops and starts for traffic lights, changing traffic speeds, etc.\nAIR CONDITIONING\u2014using a vehicle air conditioner increases the load on the engine. This can\nincrease emissions and decrease fuel economy. Try opening the window or the fresh air vent to cool\nthe inside of your vehicle\u2014also, park in the shade to prevent your vehicle from heating up in the sun.\nBesides keeping the interior temperature of your car more comfortable, you will lessen the pollution\nand waste that occurs when gasoline evaporates from the engine and gas tank.\nHIGH ENGINE LOADS\u2014your car burns more gas and emits more pollution when the engine is\noperating under high load, especially when working hard. Extra load is created by running the air\nconditioner, quick accelerations, high-speed driving, climbing grades, revving the engine, and carrying\nextra weight.\nCOLD TEMPERATURES\u2014emission control systems take longer to warm up and fully operational in\ncold weather. However, idling will not help. Modern vehicles need little warm-up; they\u2019re most efficient when being driven. Idling for long periods in cold weather can cause excessive engine wear.\nREFUELING\u2014spilled gasoline pollutes the air when it evaporates. Watch what you do at the gas\nstation to prevent spills and overfills. It\u2019s best to avoid \u201ctopping off,\u201d especially in hot weather. Apply the same precautions against sloppy handling when refueling outdoor power equipment such as\nlawnmowers and outboard motors.\n\n97\n\nFor more information, visit the United States Environmental Protection Agency at epa.gov or locally at\nUtah Department of Environmental Quality at deq.utah.gov.\nAVOID UNNECESSARY DRIVING\nThe most effective way to reduce vehicle emissions is to use it less. Vehicle travel in this country\nis doubling every 20 years. Several options are available to help you reduce the amount you drive.\nThese include:\n\u2022 Consolidating trips.\n\u2022 Telecommuting.\n\u2022 Carpooling.\n\u2022 Using public transit.\n\u2022 Choosing clean transportation alternatives such as biking or walking.\nYou will get the most out of your time behind the wheel by planning errands. For example:\n\u2022 Call ahead to confirm that the product you need is in stock before you drive to the store.\n\u2022 Plan to do several tasks when you go somewhere.\n\u2022 Drive to a central location and park.\n\u2022 Walk between nearby destinations.\n\u2022 Ridesharing can be an ideal way to reduce your contribution to pollution.\n\u2022 Every time you share a ride and eliminate a trip, you help the environment.\n\u2022 Try pairing up for trips to work or social events; even an occasional carpool or ride on public\ntransportation will make a difference.\nBiking or walking to your destination creates no pollution at all. And you\u2019ll increase your fitness level\nat the same time.\nMAINTAIN YOUR VEHICLE PROPERLY\nYou will reduce your vehicle\u2019s emissions and enhance performance if you follow the manufacturer\u2019s\nrecommended maintenance guidelines. Taking proper care of your vehicle, will extend its life, increase its resale value, and optimize its \u201cgas mileage\u201d or fuel economy. The owner\u2019s manual with\nyour car contains a wealth of information.\nEvery car has some items that need to be checked regularly and others that need to be replaced periodically. These include the air filter, vacuum and coolant hoses, oil, oil filter, fluids, belts, etc.\nIt\u2019s also important to keep the tires inflated to the recommended pressure. This will minimize tire\nwear and help your car get the best possible fuel economy.\nBe sure to have your car serviced by a skilled technician who understands modern emission control\nsystems. The simple adjustments that once occurred during tune-ups will no longer correct the problem.\nFinally, be aware that pollution will increase dramatically if you tamper with your car\u2019s emission control system or use leaded gasoline in a vehicle designed for unleaded gasoline. These activities are\nillegal\u2014for individual vehicle owners, fleet operators, and auto technicians. Fortunately, such fuel-switching practices are becoming increasingly rare as leaded gasoline becomes harder to find. It is\n\n98\n\nnow illegal to manufacture or sell new vehicles requiring leaded gasoline. Sale of motor vehicle gasoline containing lead or lead additives was prohibited in the United States beginning January 1, 1996.\nMany drivers ask about use of \u201cpremium\u201d or \u201csuper\u201d grade gasoline\u2019s. These fuels contain additives\nto increase octane. Octane is a measure of how much a fuel can be compressed in an engine before\nit spontaneously combusts. It is not a measure of fuel power or quality.\n\n99\n\nSAMPLE TEST QUESTIONS\n\nSECTION 3\n\na. Banana method\n\n1. If you are 19 years of age or older and\nb. Zipper method\nnever had a driver license, you do not have\nc. Exchange method\nto take a driver education course. True or SECTION 9\nFalse\n1. What color line markings on\n2. If you are 17 years of age or younger you\nthe roadway indicate vehicles\nneed to hold a learner permit for 6 months.\nare traveling in one direction?\nTrue or False\na. White\nb. Yellow\n\nSECTION 4\n1. If you are applying for a regular driver\nlicense to drive a \u201cregular\u201d car, which class\nof license are you applying for?\na. Class A\n\nc. Black\n2. What color line markings on\nthe roadway indicate vehicles\nare traveling in two directions?\n\nb. Class B\n\na. White\n\nc. Class C\n\nb. Yellow\n\nd. Class D\n\nc. Black\n\n2. If you want to drive a motorcyce you have\nto have an M endorsement on your license. SECTION 10\n1. If you are under 21 and driving\nTrue or False\nwith any measurable amount\nof alcohol in your body, your\nSECTION 6\ndriving privileges will be denied\n1. When taking the driving skills test at the\nfor?\nDriver License Division I have to bring my\nown car. True or False\n\n2. Third-party testers are available to administer?\na. Written knowledge tests\nb. Driving skills tests\nc. Both tests\nSECTION 7\n\na. 90 days\n\nb. 6 months\nc. 1 year\n2. If you are under 21 and convicted of a first DUI, you are automatically restricted to driving\na vehicle with an ignition interlock device for?\n\n1. Everyone in your vehicle must have a fastened seat belt or child seat. True or False\n\na. 1 year\n\n2. Children 12 and under should ride buckled up in the front passenger seat. True or\nFalse\n\nc. 3 years\n\nb. 2 years\n\nANSWERS:\nSection 3\u20141.True 2. True\nSection 4\u2 function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function filtered() {
  return state.topic === "All Topics" ? QUESTIONS : QUESTIONS.filter(q => q.t === state.topic);
}

function countFor(t) { return QUESTIONS.filter(q=>q.t===t).length; }

function startStudy() {
  setState({mode:"study", questions:shuffle(filtered()), cur:0, sel:null, showFeedback:false, answers:[], explain:null, explaining:false});
}

function startTest() {
  const q = shuffle(filtered()).slice(0, Math.min(20, filtered().length));
  setState({mode:"test", questions:q, cur:0, sel:null, testAnswers:{}, explain:null});
}

function pickStudy(idx) {
  if (state.sel !== null) return;
  const correct = idx === state.questions[state.cur].a;
  setState({sel:idx, showFeedback:true, answers:[...state.answers, {ok:correct}]});
}

function nextStudy() {
  if (state.cur + 1 >= state.questions.length) {
    setState({mode:"results"});
  } else {
    setState({cur:state.cur+1, sel:null, showFeedback:false, explain:null, explaining:false});
  }
}

function pickTest(idx) {
  setState({testAnswers:{...state.testAnswers, [state.cur]:idx}});
}

function submitTest() {
  const ans = state.questions.map((q,i) => ({ok: state.testAnswers[i]===q.a, sel: state.testAnswers[i]??-1}));
  setState({answers:ans, mode:"results"});
}

async function explainQuestion() {
  if (state.explaining || state.explain) return;
  setState({explaining:true});
  const q = state.questions[state.cur];
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:400,
        system:`You are a friendly Utah driver's license exam tutor. Explain the concept behind a test question in plain simple English — like talking to a nervous friend. Short sentences. No jargon. Give a real-world analogy if it helps. Do NOT give away the answer. Just explain the rule or law so they can figure out the answer themselves. Under 120 words.\n\nHandbook:\n${state.handbookText}`,
        messages:[{role:"user", content:`Help me understand this so I can answer it:\n\n"${q.q}"\n\nOptions: ${q.o.join(", ")}`}]
      })
    });
    const d = await res.json();
    const text = d.content?.find(b=>b.type==="text")?.text || "Couldn't load — try again.";
    setState({explain:text, explaining:false});
  } catch(e) {
    setState({explain:"Connection error. Try again.", explaining:false});
  }
}

async function sendAsk(question) {
  if (!question.trim() || state.askBusy) return;
  const msgs = [...state.askMsgs, {r:"u", t:question.trim()}];
  setState({askMsgs:msgs, askInput:"", askBusy:true});
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        system:`You are a Utah driver's license exam tutor. Answer ONLY from the handbook excerpt below. Be clear and concise. If the topic isn't covered say so and suggest checking dld.utah.gov. Highlight key numbers and rules.\n\nUTAH DRIVER HANDBOOK EXCERPT:\n${state.handbookText}`,
        messages:[{role:"user", content:question.trim()}]
      })
    });
    const d = await res.json();
    const answer = d.content?.find(b=>b.type==="text")?.text || "Something went wrong — try again.";
    setState({askMsgs:[...msgs, {r:"a",t:answer}], askBusy:false});
  } catch(e) {
    setState({askMsgs:[...msgs, {r:"a",t:"Connection error. Please try again."}], askBusy:false});
  }
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k === "className") e.className = v;
    else if (k.startsWith("on")) e[k.toLowerCase()] = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else e.setAttribute(k, v);
  }
  for (const child of children.flat()) {
    if (child == null) continue;
    if (typeof child === "string" || typeof child === "number") e.appendChild(document.createTextNode(child));
    else e.appendChild(child);
  }
  return e;
}

function div(cls, ...children) { return el("div", {className:cls}, ...children); }
function span(cls, text) { return el("span", {className:cls}, text); }
function btn(cls, text, onClick) { return el("button", {className:cls, onClick}, text); }

function header(eyebrow, title, exitFn) {
  return div("hdr",
    div("eyebrow", eyebrow),
    div("hdr-row",
      div("page-title", title),
      exitFn ? btn("btn-exit", "✕ Exit", exitFn) : el("span",{})
    )
  );
}

function typingDots() {
  const wrap = div("typing-wrap");
  [0,1,2].forEach(i => {
    const d = div("typing-dot");
    d.style.animationDelay = `${i*0.2}s`;
    wrap.appendChild(d);
  });
  return wrap;
}

  topicCard.appendChild(chipRow);
  topicCard.appendChild(el("div", {style:{fontSize:"12px",color:"#6a7f94",marginBottom:"11px"}}, `${filt.length} questions ${state.topic!=="All Topics"?`on ${state.topic}`:"across all topics"}`));
  const btns = div("btn-row");
  btns.appendChild(btn("btn-yellow", "📖 Study Mode", startStudy));
  btns.appendChild(btn("btn-ghost", `📝 Mock Test (${Math.min(20,filt.length)} Qs)`, startTest));
  topicCard.appendChild(btns);

  // Coverage card
  const covCard = div("card card-dark");
  covCard.appendChild(el("div", {style:{fontSize:"11px",color:"#6a7f94",marginBottom:"13px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "What's Covered"));
  [["🏍","Motorcycles","Endorsements, helmets, lane filtering"],
   ["🚨","DUI & Chemical Testing","Implied consent, BAC, IID, suspensions"],
   ["📊","Point System","Violation points, thresholds, clearing"]
  ].forEach(([icon,label,desc]) => {
    const row = el("div", {style:{display:"flex",gap:"12px",marginBottom:"13px",paddingBottom:"13px",borderBottom:"1px solid #1c2a38"}},
      el("div", {style:{fontSize:"20px"}}, icon),
      el("div", {},
        el("div", {style:{fontWeight:"700",fontSize:"14px"}}, label),
        el("div", {style:{fontSize:"12px",color:"#5a7090",marginTop:"2px"}}, `${countFor(label)} questions · ${desc}`)
      )
    );
    covCard.appendChild(row);
  });

  return [askCard, topicCard, covCard];
}

function renderStudy() {
  const q = state.questions[state.cur];
  const tc = TC[q.t];
  const pct = state.cur / state.questions.length * 100;
  const correct = state.answers.filter(a=>a.ok).length;

  // Progress bar
  const prog = div("progress-bar");
  const track = div("progress-track");
  const fill = div("progress-fill");
  fill.style.width = pct + "%";
  track.appendChild(fill);
  prog.appendChild(track);
  prog.appendChild(el("div", {className:"progress-labels"},
    el("span",{}, `✓ ${correct} correct`),
    el("span",{}, `${state.questions.length - state.cur} left`)
  ));

  // Card
  const card = div("card");

  // Badge
  const badge = div("badge");
  badge.style.background = tc.badge;
  badge.style.color = tc.bt;
  badge.textContent = q.t;
  card.appendChild(badge);

  // Question
  card.appendChild(el("div", {className:"q-text"}, q.q));

  // Explain section (only before answering)
  if (state.sel === null) {
    if (!state.explain && !state.explaining) {
      const xBtn = el("button", {className:"explain-btn", onClick: explainQuestion},
        el("span", {}, "💡"), " Explain this to me first"
      );
      card.appendChild(xBtn);
    }
    if (state.explaining) {
      const xLoad = div("explain-loading");
      const dots = div("", ...([0,1,2].map(i => {
        const d = div("typing-dot"); d.style.animationDelay=`${i*0.2}s`; return d;
      })));
      dots.style.display = "flex"; dots.style.gap = "4px";
      xLoad.appendChild(dots);
      xLoad.appendChild(el("span", {style:{fontSize:"13px",color:"#7ab5f5"}}, "Getting explanation..."));
      card.appendChild(xLoad);
    }
    if (state.explain && !state.explaining) {
      const xBox = div("explain-box");
      xBox.appendChild(el("div", {className:"explain-label"}, "💡 Here's what you need to know"));
      xBox.appendChild(el("div", {className:"explain-text"}, state.explain));
      xBox.appendChild(el("div", {className:"explain-hint"}, "Now pick your answer below ↓"));
      card.appendChild(xBox);
    }
  }

  // Options
  q.o.forEach((opt, idx) => {
    let cls = "option-btn";
    if (state.sel !== null) {
      if (idx === q.a) cls += " option-correct";
      else if (idx === state.sel) cls += " option-wrong";
      else cls += " option-dim";
    }
    const b = el("button", {className:cls, onClick:()=>pickStudy(idx)},
      el("span", {className:"opt-letter"}, LETTERS[idx]),
      el("span", {}, opt)
    );
    if (state.sel !== null) b.disabled = true;
    card.appendChild(b);
  });

  // Feedback
  if (state.showFeedback) {
    const isCorrect = state.sel === q.a;
    const fb = div(`feedback-box ${isCorrect?"feedback-correct":"feedback-wrong"}`);
    fb.appendChild(el("div", {className:"feedback-label", style:{color:isCorrect?"#5cb85c":"#e05c5c"}}, isCorrect ? "✓ Correct!" : "✗ Incorrect"));
    fb.appendChild(el("div", {className:"feedback-text"}, q.e));
    card.appendChild(fb);

    const nextBtn = btn("btn-yellow", state.cur+1>=state.questions.length ? "See Results →" : "Next Question →", nextStudy);
    nextBtn.style.marginTop = "14px";
    nextBtn.style.width = "100%";
    card.appendChild(nextBtn);
  }

  return [prog, card];
}

function renderTest() {
  const q = state.questions[state.cur];
  const tc = TC[q.t];
  const allDone = Object.keys(state.testAnswers).length === state.questions.length;

  // Dot nav
  const dots = div("dot-nav");
  state.questions.forEach((_,i) => {
    let cls = "dot ";
    if (i === state.cur) cls += "dot-active";
    else if (state.testAnswers[i] !== undefined) cls += "dot-done";
    else cls += "dot-empty";
    const d = el("button", {className:cls, onClick:()=>setState({cur:i})}, String(i+1));
    dots.appendChild(d);
  });

  const card = div("card");
  const badge = div("badge");
  badge.style.background = tc.badge; badge.style.color = tc.bt;
  badge.textContent = q.t;
  card.appendChild(badge);
  card.appendChild(el("div", {className:"q-text"}, q.q));

  q.o.forEach((opt,idx) => {
    const isSel = state.testAnswers[state.cur] === idx;
    const b = el("button", {
      className:"option-btn" + (isSel?" option-selected":""),
      onClick:()=>pickTest(idx)
    }, el("span",{className:"opt-letter"}, LETTERS[idx]), el("span",{},opt));
    card.appendChild(b);
  });

  const btnRow = div("btn-row");
  btnRow.style.marginTop = "6px";
  if (state.cur > 0) btnRow.appendChild(btn("btn-ghost","← Back",()=>setState({cur:state.cur-1})));
  if (state.cur < state.questions.length-1) {
    btnRow.appendChild(btn("btn-yellow","Next →",()=>setState({cur:state.cur+1})));
  } else {
    const sub = btn("btn-yellow", allDone?"Submit Test →":`${state.questions.length-Object.keys(state.testAnswers).length} unanswered`, allDone?submitTest:null);
    if (!allDone) sub.style.opacity = "0.45";
    btnRow.appendChild(sub);
  }
  card.appendChild(btnRow);

  return [dots, card];
}

function renderResults() {
  const score = state.answers.filter(a=>a.ok).length;
  const pct = Math.round(score/state.questions.length*100);
  const passed = pct >= 80;

  const byT = {};
  state.questions.forEach((q,i) => {
    if (!byT[q.t]) byT[q.t]={c:0,n:0};
    byT[q.t].n++;
    if (state.answers[i]?.ok) byT[q.t].c++;
  });

  // Score card
  const scoreCard = div("card");
  scoreCard.style.textAlign = "center";
  const big = el("div", {className:`score-big ${passed?"score-pass":"score-fail"}`}, `${pct}%`);
  scoreCard.appendChild(big);
  scoreCard.appendChild(el("div",{style:{fontSize:"14px",color:"#6a7f94",marginTop:"4px"}}, `${score} of ${state.questions.length} correct`));
  scoreCard.appendChild(el("div",{style:{marginTop:"9px",fontSize:"13px",color:passed?"#5cb85c":"#e05c5c",fontWeight:"700"}}, passed?"✓ Passing score (80%+)":"✗ Need 80% to pass"));
  const rb = div("btn-row btn-row-center");
  rb.style.marginTop = "16px";
  rb.appendChild(btn("btn-yellow","Study Again",startStudy));
  rb.appendChild(btn("btn-ghost","Retake Test",startTest));
  rb.appendChild(btn("btn-muted","Home",()=>setState({mode:"home"})));
  scoreCard.appendChild(rb);

  // Topic bars
  const topicCard = div("card");
  topicCard.appendChild(el("div",{style:{fontSize:"11px",color:"#6a7f94",marginBottom:"13px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "Score by Topic"));
  Object.entries(byT).forEach(([t,d]) => {
    const tp = Math.round(d.c/d.n*100);
    const bar = div("topic-bar");
    bar.appendChild(el("div",{className:"topic-bar-row"},
      el("span",{style:{fontWeight:"600",fontSize:"13px"}},t),
      el("span",{style:{fontSize:"13px",color:tp>=80?"#5cb85c":"#e05c5c",fontWeight:"700"}},`${d.c}/${d.n} (${tp}%)`)
    ));
    const track = div("topic-bar-track");
    const fill = div("topic-bar-fill");
    fill.style.background = tp>=80?"#5cb85c":"#e05c5c";
    fill.style.width = tp+"%";
    track.appendChild(fill);
    bar.appendChild(track);
    topicCard.appendChild(bar);
  });

  const nodes = [scoreCard, topicCard];

  // Missed questions
  const missed = state.questions.filter((_,i)=>!state.answers[i]?.ok);
  if (missed.length > 0) {
    const missCard = div("card");
    missCard.appendChild(el("div",{style:{fontSize:"11px",color:"#6a7f94",marginBottom:"13px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "Missed Questions"));
    state.questions.forEach((q,i) => {
      if (state.answers[i]?.ok) return;
      const s = state.answers[i]?.sel;
      const item = div("missed-item");
      item.appendChild(div("missed-topic", q.t));
      item.appendChild(div("missed-q", q.q));
      if (s !== undefined && s !== -1) item.appendChild(div("missed-wrong", `✗ You answered: ${q.o[s]}`));
      item.appendChild(div("missed-right", `✓ Correct: ${q.o[q.a]}`));
      item.appendChild(div("missed-exp", q.e));
      missCard.appendChild(item);
    });
    nodes.push(missCard);
  }

  return nodes;
}

function renderAsk() {
  const wrap = div("ask-wrap");

  // Header
  const hdr = div("hdr");
  hdr.appendChild(div("eyebrow", "Handbook Assistant"));
  hdr.appendChild(el("div",{className:"hdr-row"},
    div("page-title","Ask the Handbook"),
    btn("btn-exit","← Back",()=>setState({mode:"home"}))
  ));
  hdr.appendChild(el("div",{style:{fontSize:"12px",color:"#5a7090",marginTop:"3px"}}, state.handbookLoaded ? "Answers from your 2025–2026 Utah Driver Handbook" : "Loading handbook..."));
  wrap.appendChild(hdr);

  // Suggested chips (only when no messages)
  if (state.askMsgs.length === 0) {
    const chipLabel = el("div",{style:{fontSize:"11px",color:"#5a7090",marginBottom:"9px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "Try asking:");
    wrap.appendChild(chipLabel);
    const chips = div("chip-row");
    SUGGESTED.forEach(s => {
      const c = el("button",{className:"suggest-chip", onClick:()=>sendAsk(s)}, s);
      chips.appendChild(c);
    });
    wrap.appendChild(chips);
  }

  // Messages
  const msgs = div("msgs");
  if (state.askMsgs.length === 0) {
    const empty = div("msgs-empty");
    empty.innerHTML = "<div style='font-size:36px;margin-bottom:8px'>📖</div><div style='font-size:14px'>Ask anything about Utah driving rules</div>";
    msgs.appendChild(empty);
  }
  state.askMsgs.forEach(m => {
    const bubble = div(m.r==="u"?"msg-user":"msg-ai", m.t);
    msgs.appendChild(bubble);
  });
  if (state.askBusy) msgs.appendChild(typingDots());
  wrap.appendChild(msgs);

  // Scroll to bottom after render
  setTimeout(()=>{ msgs.scrollTop = msgs.scrollHeight; }, 50);

  // Input row
  const inputRow = div("input-row");
  const input = el("input", {className:"ask-input", placeholder:"Ask about Utah driving rules...", value:state.askInput});
  input.oninput = e => { state.askInput = e.target.value; };
  input.onkeydown = e => { if(e.key==="Enter") sendAsk(state.askInput); };
  if (state.askBusy) input.disabled = true;

  const askBtn = el("button", {
    className: "btn-yellow",
    onClick: ()=>sendAsk(state.askInput)
  }, "Ask");
  if (state.askBusy || !state.askInput.trim()) { askBtn.style.opacity="0.4"; askBtn.disabled=true; }

  inputRow.appendChild(input);
  inputRow.appendChild(askBtn);
  wrap.appendChild(inputRow);

  return [wrap];
}

// ── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";

  // Add blink keyframe if not already
  if (!document.getElementById("blink-style")) {
    const s = document.createElement("style");
    s.id = "blink-style";
    s.textContent = "@keyframes blink{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}";
    document.head.appendChild(s);
  }

  let nodes = [];

  if (state.mode === "ask") {
    nodes = renderAsk();
  } else {
    // Add shared header for non-ask pages
    const eyebrows = {home:"Utah Driver License", study:"Study Mode", test:"Mock Test", results:"Results"};
    const titles = {
      home:"Test Prep — Study Guide & Mock Test",
      study:`Question ${state.cur+1} of ${state.questions.length}`,
      test:`Question ${state.cur+1} of ${state.questions.length}`,
      results: (()=>{const p=Math.round(state.answers.filter(a=>a.ok).length/state.questions.length*100)>=80; return p?"Great job! 🎉":"Keep at it — you've got this!";})()
    };
    const exitFns = {
      study:()=>setState({mode:"home"}),
      test:()=>setState({mode:"home"})
    };
    root.appendChild(header(eyebrows[state.mode], titles[state.mode], exitFns[state.mode]));

    if (state.mode === "home") nodes = renderHome();
    else if (state.mode === "study") nodes = renderStudy();
    else if (state.mode === "test") nodes = renderTest();
    else if (state.mode === "results") nodes = renderResults();
  }

  nodes.forEach(n => root.appendChild(n));
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadHandbook();
render();
</script>
</body>
