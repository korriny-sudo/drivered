<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utah Driver's Test Prep</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1923; color: #f0f0f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  #root { display: flex; flex-direction: column; align-items: center; padding: 0 16px 48px; }

  .hdr { width: 100%; max-width: 720px; padding: 22px 0 10px; border-bottom: 3px solid #f5c518; margin-bottom: 22px; }
  .eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #f5c518; font-weight: 700; margin-bottom: 3px; }
  .page-title { font-size: 22px; font-weight: 800; color: #fff; }
  .hdr-row { display: flex; justify-content: space-between; align-items: center; }

  .card { background: #1c2a38; border-radius: 12px; padding: 22px 18px; width: 100%; max-width: 720px; margin-bottom: 13px; }
  .card-dark { background: #131f2c; }
  .card-darker { background: #111e2b; border: 1px solid rgba(245,197,24,0.16); cursor: pointer; }

  .btn-yellow { background: #f5c518; color: #0f1923; border: none; border-radius: 8px; padding: 11px 24px; font-size: 14px; font-weight: 800; cursor: pointer; }
  .btn-ghost { background: transparent; color: #f5c518; border: 2px solid #f5c518; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-exit { background: none; border: none; color: #6a7f94; cursor: pointer; font-size: 13px; }
  .btn-muted { background: transparent; color: #6a7f94; border: 2px solid #3a5060; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 700; cursor: pointer; }

  .topic-chip { padding: 7px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
  .chip-active { background: #f5c518; color: #0f1923; }
  .chip-inactive { background: #263545; color: #8a9bb0; }

  .badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 9px; border-radius: 4px; margin-bottom: 13px; }

  .progress-bar { width: 100%; max-width: 720px; margin-bottom: 14px; }
  .progress-track { background: #263545; border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: #f5c518; border-radius: 4px; transition: width 0.3s; }
  .progress-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 12px; color: #5a7090; }

  .q-text { font-size: 16px; font-weight: 700; line-height: 1.5; margin-bottom: 14px; color: #fff; }

  .option-btn { width: 100%; background: #263545; border: 2px solid #263545; border-radius: 8px; padding: 11px 13px; text-align: left; cursor: pointer; color: #c0d0e0; font-weight: 400; font-size: 14px; line-height: 1.4; display: flex; gap: 9px; margin-bottom: 8px; font-family: inherit; }
  .option-btn:hover:not(:disabled) { border-color: #4a6070; }
  .option-correct { background: #172917 !important; border-color: #5cb85c !important; color: #7ee87e !important; font-weight: 700 !important; }
  .option-wrong { background: #291717 !important; border-color: #e05c5c !important; color: #e87e7e !important; font-weight: 700 !important; }
  .option-dim { color: #3a5060 !important; }
  .option-selected { background: #162640 !important; border-color: #f5c518 !important; color: #f5c518 !important; font-weight: 700 !important; }

  .opt-letter { min-width: 18px; font-weight: 800; opacity: 0.5; }

  .explain-btn { background: #1a2f4a; border: 2px solid #4a7ab5; border-radius: 8px; padding: 9px 16px; color: #7ab5f5; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 7px; font-family: inherit; margin-bottom: 14px; }
  .explain-loading { background: #1a2f4a; border-radius: 8px; padding: 12px 14px; border: 2px solid #4a7ab5; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .explain-box { background: #111e2b; border-radius: 8px; padding: 13px 15px; border: 2px solid #4a7ab5; border-left: 4px solid #f5c518; margin-bottom: 14px; }
  .explain-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #f5c518; margin-bottom: 7px; }
  .explain-text { font-size: 14px; color: #c0d8f0; line-height: 1.7; }
  .explain-hint { margin-top: 10px; font-size: 12px; color: #5a7090; font-style: italic; }

  .feedback-box { margin-top: 16px; border-radius: 8px; padding: 11px 13px; }
  .feedback-correct { background: #132013; border-left: 3px solid #5cb85c; }
  .feedback-wrong { background: #201313; border-left: 3px solid #e05c5c; }
  .feedback-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .feedback-text { font-size: 13px; color: #a0b4c8; line-height: 1.6; }

  .dot-nav { width: 100%; max-width: 720px; display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 13px; }
  .dot { width: 27px; height: 27px; border-radius: 5px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; }
  .dot-active { background: #f5c518; color: #0f1923; }
  .dot-done { background: #1e3d1e; color: #5cb85c; }
  .dot-empty { background: #1c2a38; color: #5a7090; }

  .score-big { font-size: 64px; font-weight: 900; line-height: 1; }
  .score-pass { color: #5cb85c; }
  .score-fail { color: #e05c5c; }

  .topic-bar { margin-bottom: 13px; }
  .topic-bar-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .topic-bar-track { background: #263545; border-radius: 4px; height: 5px; }
  .topic-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

  .missed-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #1c2a38; }
  .missed-topic { font-size: 10px; color: #5a7090; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .missed-q { font-weight: 700; font-size: 14px; margin-bottom: 7px; color: #e0eaf4; }
  .missed-wrong { font-size: 12px; color: #e05c5c; margin-bottom: 3px; }
  .missed-right { font-size: 12px; color: #5cb85c; margin-bottom: 6px; }
  .missed-exp { font-size: 12px; color: #8a9bb0; line-height: 1.6; background: #111e2b; padding: 8px 11px; border-radius: 6px; }

  /* Ask page */
  .ask-wrap { width: 100%; max-width: 720px; }
  .msg-user { align-self: flex-end; background: #f5c518; color: #0f1923; border-radius: 16px 16px 4px 16px; padding: 11px 15px; max-width: 85%; font-size: 14px; font-weight: 600; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .msg-ai { align-self: flex-start; background: #1c2a38; color: #d0e4f4; border-radius: 4px 16px 16px 16px; padding: 11px 15px; max-width: 85%; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .msgs { display: flex; flex-direction: column; gap: 11px; min-height: 180px; margin-bottom: 14px; }
  .msgs-empty { text-align: center; padding: 36px 0; color: #3a5060; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #f5c518; animation: blink 1.2s infinite; }
  .typing-wrap { align-self: flex-start; background: #1c2a38; border-radius: 4px 16px 16px 16px; padding: 13px 16px; display: flex; gap: 5px; }

  .input-row { display: flex; gap: 9px; border-top: 1px solid #1c2a38; padding-top: 13px; }
  .ask-input { flex: 1; background: #1c2a38; border: 2px solid #2f3f52; border-radius: 9px; padding: 10px 13px; color: #e0eaf4; font-size: 14px; outline: none; font-family: inherit; }
  .ask-input:focus { border-color: #4a7ab5; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .suggest-chip { background: #1c2a38; border: 1px solid #2f3f52; border-radius: 20px; padding: 6px 13px; font-size: 12px; color: #8a9bb0; cursor: pointer; font-family: inherit; }
  .suggest-chip:hover { border-color: #4a7ab5; color: #7ab5f5; }

  .btn-row { display: flex; gap: 9px; flex-wrap: wrap; }
  .btn-row-center { justify-content: center; }

  @keyframes blink { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
</style>
</head>

entification.\nHB 308 Driving by Minors Amendments\nAllows an individual with a learner permit younger than 18 years old to drive with an adult other than\na parent; if the parent or legal guardian is not a licensed driver. The individual occupying the seat beside the applicant must have in their immediate possession evidence that the individual is authorized\nby the parent or legal guardian.\nSB59 Commercial Driver License Revisions\nAmends provisions relating to disqualification of a CDL and requires DLD to utilize the Drug and Alcohol Clearinghouse as required by Federal law.\nSB260 Individual Digital Identity Amendments\nEstablishes guiding principles for the implementation of a state-endorsed digital identity program.\nEffective January 1, 2026\nHB 437 Interdicted Person Amendments\nThis bill:\n\u2022 A person convicted of DUI, the court may designate as an interdicted person who will be prohibited from purchasing alcohol for a certain time period. A person shall be designated as an\ninterdicted person when convicted for an extreme DUI.\n\u2022 The court may designate a person convicted of a DUI as an interdicted person. This would\nrequired the person to surrender their license or identification card to the court and apply for an\ninterdicted license or ID card.\n\u2022 An interdicted DL/IDC will have a red banner at the top of the card stating \u201cNO ALCOHOL\nSALE.\u201d\nHB 190 Motorcycle Amendments\nThis bill:\n\u2022 Requires DLD to suspend an individual\u2019s motorcycle endorsement or driver license based on\nconviction of certain violations.\n\u2022 Failure to properly display license plate;\n\u2022 Performing a wheelie; or\n\u2022 Lane splitting.\n\nDRIVER LICENSE HISTORY\n\u2022 The Bureau of Driver License Services was created on January 1, 1934, when Utah officially\nadopted the \u201cUniform Operator\u2019s and Chauffeurs\u2019 License Act.\u201d (Prior to this, the State of Utah\nhad no driver license law.)\n\u2022 This act required that \u201cevery operator of a motor vehicle shall not drive any motor vehicle upon\na highway in this state unless such person was licensed to do so.\u201d\n\u2022 Originally, the Bureau of Driver License Services was an agency within the State Tax Commission.\n\u2022 The first license in Utah was issued on December 5, 1933. It cost 25\u00a2 and was good until revoked. It was printed in blue on white paper.\n\u2022 The application card was 6\u201d x 3\u00bd\u201d and only asked for name, address, brief description, a few\nquestions and a signature.\n\u2022 No examination was given until January 1935, when the eye test, written knowledge test, and\nan occasional driving skills test was given.\n\u2022 The \u201cgood-until-revoked\u201d licenses were issued until December 31, 1935.\n\u2022 Beginning January 1, 1936, the law was changed to have the driver license expire three years\nafter issuance (not on the birthdate.) The fee was still 25\u00a2.\n\u2022 One of the biggest changes came in 1951 when the Bureau of Driver License Services moved\nfrom the State Tax Commission and became an agency within the Department of Public Safety.\n\u2022 In 1980, the state decided to reward \u201cgood drivers\u201d by developing a system for the applicant to\nrenew their driver license through the mail.\n\u2022 The Driver License Division began issuing a commercial driver license in 1989.\n\u2022 The Driver License Division began offering more online services including MVRs and appointments in 2005.\n\u2022 January 2010, the citizens of Utah started a 5-year process that required all Utah drivers to\nbring in their identification documents once again. This process was a beginning step to meet\nthe licensing practices for the Federal REAL ID Act.\n\u2022 January 2010, the renewal-by-mail program was suspended.\n\u2022 February 13, 2013, the Driver License Division was notified by the Department of Homeland\nSecurity that Utah meets the licensing practices of the Federal REAL ID Act.\n\u2022 April 2013, the renewal-by-mail program was reinstated and renewal-by-internet was a new\nservice.\n\u2022 May 2015, the Driver License Division began offering online CDL MVR services to authorized\ndrivers and employers.\n\u2022 In 2016, the Driver License Division stopped conducting driving skills test on an enclosed\nrange. All driving skills tests are performed on public roads.\n\u2022 March 2017, tablets were implemented to score driving skills tests rather than paper.\n\u2022 December 2018, Utah is the first state in the country to have a blood alcohol concentrate of\n.05.\n\u2022 January 2020, driver license renewals extend from a 5-year renewal to an 8-year renewal.\n\u2022 July 2020, the division transitioned to an appointment based system. Until then appointments\n\nwere available but walk-in customers were the primary process when customers visited our\noffices.\n\u2022 October 2021, the division transitioned from a paper application for driver license/ID card to an\nelectronic application. This new process reduces repetitive input of data and decreases customer wait time.\n\u2022 December 2023 marks 90 years since the first Utah driver license was issued.\nDid you know the Driver License Division is not part of the DMV?\nOur friends at the DMV (Department of Motor Vehicles, under the Utah State Tax Commission) can\nassist you at 801.297.7780 or dmv.utah.gov with all of your vehicle (e.g., plate and title) needs.\n\nTHE TOP FIVE LEADING CAUSES OF ALL CRASHES ON UTAH HIGHWAYS\n1. Failed to Keep in Proper Lane 28%\n2. Failed to Yield Right-of-Way 12%\n3. Ran Off The Road 7%\n4. Too Fast for Conditions 7%\n5. Over-Correcting/Over-Steering 6%\nTHE TOP FIVE LEADING CAUSES OF DEATH ON UTAH HIGHWAYS\n1. Failed to Keep in Proper Lane 28%\n2. Failed to Yield Right-of-Way 12%\n3. Ran Off The Road 7%\n4. Too Fast for Conditions 7%\n5. Over-Correcting/Over-Steering 6%\nTHE TOP FIVE LEADING CAUSE OF CRASHES ON UTAH HIGHWAYS (TEENAGERS 15-19)\n1. Failed to Keep in Proper rash Report Info....................................................................................68\n\nSection 13. Suspensions and Your Record\nA. Altered or Fictitious License.......................................................................................70\nB. Driving Record (MVR)................................................................................................70\nC. Driving While Denied, Suspended, or Revoked.........................................................70\nD. License Suspensions.................................................................................................71\nE. License Revocations..................................................................................................71\nF. Point System..............................................................................................................72\nSection 14. Sharing the Road\nA. Bicycles......................................................................................................................74\nB. Emergency Vehicles..................................................................................................77\nC. Large Trucks..............................................................................................................78\nD. Mobility Vehicles........................................................................................................81\nE. Motor-Assisted Scooters............................................................................................81\nF. Motorcycles................................................................................................................81\nG. Pedestrains................................................................................................................83\nH. Pedestrain Vehicles...................................................................................................84\nI. Police/Traffic Stops................................................... assume the obligation.\nBicycle\u2014a wheeled vehicle propelled by human power by feet or hands acting upon pedals or\ncranks, with a seat or saddle designed to be operated on the ground. Wheels are not less than 14\ninches in diameter. The bicycle includes an electric-assisted bicycle.\nBlind Spots\u2014the area of roadway that can\u2019t be seen with mirrors while operating a vehicle.\nCancellation\u2014termination of a driver license issued through error, fraud, or upon application for a\nstate-issued driver license or ID card, or for which necessary consent has been withdrawn.\nCareless Driving\u2014a person operating a motor vehicle is guilty of careless driving if the person commits two or more moving traffic violations within a single continuous period of driving or commits a\nmoving traffic violation while being distracted by one or more activities taking place within the vehicle\nthat are not related to the operation of a motor vehicle, including searching for an item in the vehicle\nor attending to personal hygiene, or grooming.\nCommercial Driver License (CDL)\u2014a license that allows the holder to drive a vehicle with a GVWR\nof 26,001 lbs. or more, or designed to transport 16 or more passengers, hazardous materials, doubles/triples, bulk liquids (tankers), or school buses.\nDenied\u2014withdrawal of driving privilege.\nDependent\u2014a spouse and any unmarried children under the age of 21.\nDisqualification\u2014a temporary or permanent withdrawal of a commercial driver license.\nDivision\u2014the Driver License Division of the Department of Public Safety.\nDriving Privilege Card\u2014the evidence of the privilege to drive a motor vehicle in Utah obtained without providing proof of lawful presence in the United States.\nFarm Tractor\u2014every self-propelled vehicle designed and used primarily as a farm implement of husbandry.\nHead Checks\u2014checking your blind spot by turning your head and looking over your shoulder in the\ndirection you plan on moving.\nHighway\u2014the entire width between property lines of every way or place as a matter of right for vehicular travel.\nLicense\u2014the privilege to drive a motor vehicle.\n\n1\n\nLicense Certificate\u2014the evidence of the privilege to drive a motor vehicle.\nLimited-Term CDL\u2014the evidence of the privilege to drive a commercial motor vehicle which was\nobtained by providing proof of lawful presence in the United States by an individual who is not a U.S.\nCitizen, a U.S. National, or a Legal Permanent Resident Alien.\nLimited-Term Driver License\u2014the evidence of the privilege to drive a motor vehicle which was\nobtained by providing proof of lawful presence in the United States by an individual who is not a U.S.\nCitizen, a U.S. National, or a Legal Permanent Resident Alien.\nLimited-Term Identification Card\u2014an identification card issued to a person who provided proof of\nlawful presence in the United States by an individual who is not a U.S. Citizen, a U.S. National, or a\nLegal Permanent Resident Alien.\nLow-Speed Vehicle\u2014a four-wheeled electric motor vehicle designed to be operated at speeds of not\nmore than 25 miles per hour and that has a capacity of not more than four passengers, including the\ndriver. \u201cLow-Speed Vehicle\u201d does not include a golf cart or off-highway vehicle.\nMobility Vehicle\u2014a vehicle used by a person with a physical disability which meets the specifications outlined by the division and can be operated on a public roadway, within appropriate restrictions\nand by an individual who holds a valid mobility vehicle permit.\nMobility Vehicle Permit\u2014a permit issued by the division that grants authority and specifies the conditions for a person with a physical disability to drive a mobility vehicle on a public highway.\nMotor Vehicle\u2014every self-propelled vehicle, except motorized wheelchairs, electric personal assistive mobility devices and vehicles moved solely by human power.\nMotorcycle\u2014a motor vehicle, except farm tractors, that has a saddle for the rider and is designed to\ntravel with not more than three wheels in contact with the ground.\nOperator\u2014a person in actual physical control of a motor vehicle.\nPedestrian Vehicle\u2014any self-propelled conveyance designed, manufactured, and intended for persons with a physical disability. The vehicle must not exceed 48 inches in width, have an engine over\n300 cubic centimeters (or 12 brake horsepower), or be capable of exceeding 30 m.p.h.\nPersonal Motorized Mobility Device\u2014a self-propelled device with two non-tandem wheels in contact with the ground, a system of steering and stopping the unit under typical operating conditions,\na motor not exceeding one horsepower of 750 watts, and a deck design for a person to stand while\noperating the device.\nPrivate Passenger Carrier\u2014any motor vehicle for hire designed to transport 15 or fewer passengers, including the driver, and operated to transport an employee of the person that hires the motor\nvehicle.\nProvisional License\u2014a Utah license issued to any person under 21 years of age.\nRegular CDL\u2014the evidence of the privilege to drive a commercial motor vehicle issued to a U.S.\nCitizen, a U.S. National, or a Legal Permanent Resident Alien.\n\n2\n\nRegular Identification Card\u2014an identification card issued to a U.S. Citizen, a U.S. National, or a\nLegal Permanent Resident Alien.\nRegular License Certificate\u2014the evidence of the privilege to drive a motor vehicle issued to a U.S.\nCitizen, a U.S. National, or a Legal Permanent Resident Alien.\nRevocation\u2014termination of the privilege to drive a motor vehicle.\nRoundabout\u2014a traffic roundabout is a circular intersection that flows counterclockwise.\nSchool Bus\u2014commercial motor vehicle used to transport pre-primary, primary, or secondary school\nstudents to and from home and school or to and from school-sponsored events.\nStreet-Legal All-Terrain\u2014an all-terrain type I or utility-type vehicle modified to operate on highways.\nSuspension\u2014temporary withdrawal of the privilege to drive.\nTaxicab\u2014a Class D motor vehicle transporting any number of passengers for hire and which is subject to state or federal regulations as a taxi.\nTemporary Driver License\u2014a temporary license allowing driving privileges up to six months, not\navailable for driving privilege card (DPC) holders.\nTraffic Check\u2014a defensive driving scan for other traffic, pedestrians, or any other obstacles you may\nencounter while driving.\nVehicle\u2014a device by which any person or property may be transported upon a highway except devices used exclusively on stationary rails or tracks.\n\n3\n\nSECTION 2: Licensing Requirments\nEvery resident of Utah who drives a motor vehicle on the highways (any public roadway) must have a\nvalid Utah driver license, learner permit, or temporary driver license.\n\nA. RESIDENTS\nPERSONS BECOME RESIDENTS IF THEY:\n\u2022 Enter the state to make Utah home.\n\u2022 Remain in the state for six months or more during any calendar year.\n\u2022 Obtain a driver license or register a motor vehicle in Utah.\n\u2022 Obtain privileges not extended to non-residents, including school tuition.\n\u2022 Are gainfully employed in Utah (this does not apply if you are on a temporary assignment in\nthe state.)\nPERSONS WHO DO NOT NEED A UTAH DRIVER LICENSE:\n\u2022 Non-residents licensed by another state or country may drive in Utah if they are at least 16\nyears of age.\n\u2022 Non-residents licensed by another state or country temporarily assigned by an employer, religious or private organization, or governmental entity.\n\u2022 Non-resident military service personnel and dependents temporarily assigned in Utah may\ndrive with a valid out-of-state or out-of-country driver license.\nPERSONS WHO MAY NOT HAVE A UTAH DRIVER LICENSE:\n\u2022 If you are under the required age of 16.\n\u2022 If your driving privilege is denied, suspended, revoked, or disqualified in Utah or any other\nstate.\n\u2022 If you are physically or mentally unable to drive safely.\n\u2022 If you have not passed the required examinations.\n\u2022 If you have a traffic citation or other warrant that has not been settled.\n\u2022 If you are not a resident of the state.\n\u2022 If you are under 18 years of age, have not held a learner permit for six months, and completed\na driver education course.\nPersons are not required to obtain a driver license to drive road rollers, road machinery, or farm tractors on Utah highways if the person is driving the vehicle in conjunction with a construction or agricultural activity.\nVisitors with a valid out-of-state or out-of-country driver license may drive in Utah for up to six months.\nBy law, you may not possess more than one REAL ID-compliant certificate at a time (e.g., a Utah driver license and a Colorado ID.)\n\n4\n\nB. DRIVER LICENSE COMPACT\nUtah is a member of the Driver License Compact (DLC) and the Non-Resident Violator Compact\n(NRVC). The DLC provides guidelines for greater cooperation among members in driver license\nmatters. Member jurisdictions exchange driver records and forward convictions for traffic offenses to\nthe driver\u2019s home state. There are 45 states, plus the District of Columbia (Washington D.C.) that are\nmembers of the DLC. States that are NOT members of the DLC are Georgia, Massachusetts, Wisconsin, Michigan, and Tennessee.\nThe NRVC allows members to forward notices from their courts when an out-of-state driver still needs\nto comply with the terms of a traffic citation.\nThe driver\u2019s home state will suspend the driver\u2019s privilege to drive until satisfactory evidence is received that the driver has complied with the terms of the citation in the member\u2019s state.\nThis compact also facilitates the release of out-of-state drivers cited by law enforcement instead of\nincarcerating them or requiring the posting of bonds. Forty-four states, plus the District of Columbia\n(Washington D.C.), are members of the NRVC. States NOT members of the NRVC are Alaska, California, Michigan, Montana, Oregon, and Wisconsin.\n\n5\n\nSECTION 3: Driver Education/Permits\nA. DRIVER EDUCATION\nThe State Office of Education approves all Utah high school driver education courses. The Driver\nLicense Division approves all private/commercial driver education courses in Utah.\nREQUIRED DRIVER EDUCATION HOURS:\n\u2022 27 hours of high school classroom instruction, or 18 hours of commercial/private school, or 30\nhours of Utah-approved online/home study; and\n\u2022 6 hours behind the wheel instruction; and\n\u2022 6 hours of observation by a licensed instructor (may be required by school.)\nOUT-OF-STATE DRIVER EDUCATION\nOut-of-state driver education course completion certificates must meet Utah\u2019s required hours, and\nthe DLD200 form must be completed. You may make up the remaining hours at an approved Utah\ndriving school if additional training is needed. Out-of-state online or home study course certificates\nwill not be accepted.\nCOMPLETION OF DRIVER EDUCATION FOR AGES 15-18\nApplicants 15-18 must complete an approved driver education course before being licensed in Utah.\nLocal school districts may allow a student to complete the classroom instruction portion of driver education in public schools; through a home study program; or electronic high school; and they may allow\nthe student to complete the behind-the-wheel portion of driver education with a private provider. A\nstudent must also complete 40 hours of driving (10 hours after sunset) with a parent or legal guardian.\nCOMPLETION OF DRIVER EDUCATION AGE 19+\nApplicants 19 years of age or older who have never been licensed to drive a motor vehicle may be\nlicensed without completing a driver education course if they hold a learner permit for 90 days and\ncomplete at least 40 hours of driving (10 hours after sunset.) OR applicants may complete an approved driver education course and waive the 90-day learner permit requirement.\n\nB. LEARNER PERMIT\nENTRY-LEVEL LEARNER PERMIT\nAll applicants applying for an entry-level learner permit (the permit will allow the applicant to participate in a driver education course and to practice driving until they are eligible to apply for a driver\nlicense) must schedule a learner permit appointment by visiting our website at dld.utah.gov, provide\nrequired documentation, pay the applicable fee, successfully pass the written knowledge test and an\neye test.\nThe written knowledge test scores for an entry-level learner permit are valid for 18 months. If you\nrenew or let your permit expire, you must retake the written knowledge test.\n\n6\n\nThe entry-level learner permit is valid for 18 months and entitles you to drive a regular motor vehicle\nif:\n\u2022 You have reached a minimum age of 15.\n\u2022 The person sitting next to you is a licensed parent, legal guardian, approved driving instructor,\nor responsible adult who signed for financial responsibility (passengers may be in the vehicle.)\n\u2022 Learner permit must be in your immediate possession.\n6-MONTH LEARNER PERMIT (RENEWAL PERMIT):\n\u2022 You have reached a minimum age of 16.\n\u2022 The person sitting next to you is a licensed parent, legal guardian, approved driving instructor,\nor responsible adult who signed for financial responsibility (passengers may be in the vehicle.)\n\u2022 You have completed driver education and held a learner permit for at least six months if you\nare 16 or 17 years of age. If you are 19 years or older, you must hold the learner permit for 90\ndays.\n\u2022 Learner permit must be in your immediate possession.\n\u2022 The written knowledge test scores for a learner permit are valid for 12 months.\nLEARNER PERMIT HOLDING PERIODS\nDepending on your age, a learner permit must be held for a period of time to be eligible to obtain a\nfirst-time regular Class D driver license:\n\u2022 Age 16 and 17\u20146 months\n\u2022 Age 18\u2014no holding period, but applicant must complete an approved driver education course\n\u2022 Age 19+\u201490 days (unless applicant completes an approved driver education course)\n\n7\n\nAge\n\nDRIVING BY MINORS\u2014YOUTHFUL DRIVER RESTRICTIONS\nNighttime\nrestrictions\n\nException to\nnighttime driving\nrestrictions\n\nFront seat passenger restrictions with a\nlearner permit\n\nOther passenger\nrestrictions\n\nExceptions\nto other\npassenger\nrestrictions\n\n15\n\nNone\n\nN/A\n\nFront seat passenger must be a\nparent, guardian,\ndriving instructor, or\nlicensed adult 21 or\nover with evidence\nof authorization\nfrom a parent or\nlegal guardian\n\nNone\n\nN/A\n\n16\n\nIf you have a\ndriver license\n(not permit) 12\nam - 5 am\n\nAccompanied by a\nlicensed driver 21\nyears of age in the\nfront seat, on agricultural assignment,\ndriving to and from\nwork, driving to and\nfrom a school sponsored activity, emergency situations\n\nFront seat passenger must be a\nparent, guardian,\ndriving instructor, or\nlicensed adult 21 or\nover with evidence\nof authorization\nfrom a parent or\nlegal guardian\n\nIf you have a\ndriver license\n(not permit)\nimmediate family members\nonly in vehicle\nuntil six months\nfrom issue date\n\nAccompanied\nby a licensed\ndriver 21 years\nof age in the\nfront seat, on\nagricultural\nassignment,\nemergency\nsituations\n\n17\n\nNone\n\nN/A\n\nFront seat passenger must be a\nparent, guardian,\ndriving instructor, or\nlicensed adult 21 or\nover with evidence\nof authorization\nfrom a parent or\nlegal guardian\n\nNone\n\nN/A\n\n18\n\nNone\n\nN/A\n\nAccompanied by a\nlicensed driver 21\nyears of age in the\nfront seat\n\nNone\n\nN/A\n\n19+\n\nNone\n\nN/A\n\nAccompanied by a\nlicensed driver 21\nyears of age in the\nfront seat\n\nNone\n\nN/A\n\n8\n\nC. DRIVER LICENSE FEES\nProvisional Class D $39.00\nlicense (under 21)\n\nExtension of license\nby mail\n\n$42.00\n\nCDL knowledge test $52.00\n\nRegular Class D\n$52.00\nLicense (21 & over)\n\nExtension of license\nby mail (65+)\n\n$22.00\n\nCDL skills test\n\n$78.00\n\nLearner permit\n\n$19.00\n\nDuplicate\n\n$23.00\n\nCDL endorsement\n\n$9.00\n\nRenewal\n\n$52.00\n\nID card\n\n$23.00\n\nReinstatement\n\n$40.00\n\nRenewal (65+)\n\n$27.00\n\nDisability ID card\n\n$17.00\n\nAlcohol/Drug reinstatement\n\n$85.00\n\nDPC Renewal\n\n$23.00\n\nTaxi endorsement\n\n$14.00\n\nAdministrative fee\nfor alcohol/drug\nreinstatement\n\n$255.00\n\nLimited-Term original and renewal\n\n$32.00\n\nMotorcycle endorsement\n\n$18.00\n\nMVR (driving record)\n\n$8.00\n\n9\n\nSECTION 4: Driver License Types, ID Card,\nRequired Documentation\nA. LICENSE TYPES\nREGULAR CLASS D DRIVER LICENSE\nTo obtain an original regular Class D license, you must be at least 16 years of age. If you are younger than 19, you must have completed an approved driver education course or have proof of a license\nfrom another state or country. This driver license allows you to drive all personal vehicles (up to\n26,000 pounds.) Applicants younger than the age of 21 are issued a provisional Class D regular driver license for the purpose of using a separate point system.\nLIMITED-TERM DRIVER LICENSE\nA limited-term driver license is issued to a non-U.S. Citizen in the United States with a lawful status\nthat has been verified and qualifies for a REAL ID certificate.\nDRIVING PRIVILEGE CARD (DPC)\nA DPC may be issued to a person who is legally allowed to be in the United States as a parolee or\nanother legal status that is not eligible for REAL ID, or if you are an undocumented immigrant in the\nUnited States. The DPC may be used for driving purposes only; it is not valid identification or age\nverification. The DPC expires each year on the applicant\u2019s birthday. Except as provided by law, the\nsame provisions, requirements, classes, endorsements, fees, restrictions, and sanctions apply to the\nDPC, as apply to the regular Class D driver license.\nNote: Utah state law does not allow for the issuance of a temporary driver license for a DPC. Therefore, no drive time will be permitted until the plastic card is received by mail.\nUTAH\u2019S COMMERCIAL DRIVER LICENSE (CDL)\nTo view the CDL manual, visit our website.\n\n10\n\nUtah\u2019s Classified License System\nClass A\n\nClass B\n\nClass C\n\nClass D\n\nCombined vehicle GWR\n26,001 lbs. or more\n\nSingle or combined vehicle over 26,001 lbs.\n\nAll vehicles NOT defined as:\n\nTowed unit over 10,001\nlbs.\n\nTowed unit over 10,001\nlbs.\n\nSingle vehicle under\n26,001 lbs. if used to\ntransport:\n\nIntrastate restriction for\nindividuals 18-20 years\nof age\n\nIntrastate restriction for\nindividuals 18-20 years\nof age\n\n16+ occupants, including the driver\nPlacarded amounts of\nhazardous materials\n\nClass A, B, C, or motorcycle\nMinimuim age requirement: 16 years of age\n\nMinimum age requirement: 21 years of age\n\n11\n\nB. ENDORSEMENTS and RESTRICTIONS\nENDORSEMENT CODES\nH - Hazardous Materials\nM - Motorcycle\nN - Tanker\nP - Passenger\nS - School Bus\nT - Doubles or Triple Trailer\nX - Hazmat and Tanker\nZ - Taxicab\nRESTRICTIONS\n2 - Restricted to operating a motorcycle with 249cc or less\n3 - Restricted to operating a motorcycle with 649 cc or less\n4 - Restricted to operating a street legal ATV\n5 - Restricted to operating a motorcycle with 90 cc or less\n6 - Restricted to operating a motor vehicle on roads with a posted speed of 40 mph or less\n7 - Restricted to operating a motor vehicle with an automatic transmission\nA - No restrictions\nB - Driver must wear corrective lenses\nC - Mechanical aid or compensatory device required while driving\nD - Prosthetic aid must be used while driving\nE - Restricted from driving a commercial motor vehicle with a manual transmission\nF - Restricted to driving a vehicle with outside rearview mirrors\nG - Restricted to driving during daylight hours only\nJ - Restricts the driver for any other restrictions deemed necessary by DLD\nK - Restricted to intrastate operation of commercial vehicles\nL - Restricted to vehicles with no air brakes\nM - Restricts driver from transporting passengers using a Class A bus\nN - Restricts driver from transporting passengers using a Class A or Class B bus\nO - Restricts driver from driving a commercial motor vehicle equipped with tractor trailer\nP - Restricts CDL driver with a school bus or passenger endorsement from having passengers in\ncommercial motor vehicle\nU - Restricted to operating only three-wheeled motorcycles\nV - Indicates that the driver has been issued a variance by the Federal Motor Carrier Safety Administration in reference to the driver\u2019s medical certification status\nZ - Restricts driver from driving a commercial motor vehicle with non-fully equipped air brakes\n\nC. OBTAINING A DRIVER LICENSE\nIt is always unfortunate when people spend time and gas coming to one of our offices only to find\nout they cannot be helped for some reason. To best assist you at the Driver License Division and to\nensure your visit is as fast and efficient as possible, please do the following:\n\u2022 Go to dld.utah.gov and click on Driver License Services and then the license type that best de-\n\n12\n\nscribes the service you need. Read the full page of requirements and select the yellow button\nto fill out the ONLINE APPLICATION and schedule an appointment. Using the online application and appointment scheduler will result in faster service, as those who have appointments\nwill be served before walk-in applicants.\n\u2022 Double-check you have all the correct documentation before visiting a driver license office,\nincluding your confirmation number for your scheduled appointment.\n\u2022 All documents must be original or certified copies by the issuing agency. Faxed or photocopied documents will NOT be accepted.\n\u2022 All documents are subject to department review and approval. Additional information may be\nrequired; in some cases, document approval may NOT occur on the same day and may require a further visit.\n\u2022 Any name variation from your identity document must be accompanied by legal authorizing\ndocumentation. These include state-certified marriage certificate, divorce decree, updated\npassport, amended birth certificate, adoption paperwork, citizenship/naturalization certificate,\nor court documents indicating the name change sealed by the court.\n\u2022 All documents provided to the division will be imaged and stored in a secure database and\nimmediately returned to the applicant.\n\u2022 Arrive on time for your appointment to complete processing, including taking a written knowledge test. A driving skills test may require an additional appointment. We cannot guarantee\nthe completion of the necessary processing after closing time.\n\u2022 Driving skills tests will not be provided when conditions exist that could create unsafe driving.\nThose conditions include inclement weather and vehicles that are not registered or are unsafe\n(i.e., broken windshield or no safety belts.)\n\u2022 Although you may pay for your driver license by check, credit card, or cash, there are a few\nthings you should know. Checks must be made payable to the Department of Public Safety\nin the correct amount. We cannot cash payroll or two-party checks. If the bank returns your\ncheck, you must pay a $20 service charge to keep your driving privilege.\nFor additional information on acceptable documentation, please visit dld.utah.gov/required-documents.\nNote: If you schedule an appointment outside of the correct service, for example, a driving skills test\nscheduled under renewal, your scheduled appointment may not be fulfilled, and you may have to\nreschedule under the correct service.\n\nD. DRIVER LICENSE (CERTIFICATE)\nOBTAINING A DRIVER LICENSE CERTIFICATE REQUIRES:\n\u2022 Driver education completion certificate, or have a \u201cclear\u201d license status from another state or\ncountry.\n\u2022 Assumption of financial liability.\n\u2022 Acceptable proof of identity and lawful presence in the United States.\n\u2022 Two acceptable documents as evidence of your Utah residence address.\n\u2022 Acceptable proof of your full social security number or proof of ineligibility to obtain a social\nsecurity number as a result of lawful presence status.\n\n13\n\n\u2022 Payment of applicable fees.\n\u2022 Completion of driver license application.\n\u2022 Eye examination.\n\u2022 Written knowledge/driving skills test.\n\u2022 Photo.\n\nE. IDENTITY AND RESIDENCY REQUIREMENTS\nEvery applicant will need to provide acceptable proof of their identity.\nAn individuals lawful status will determine what type of driving certificate or identification card the\napplicant is eligible to obtain.\nU.S. Citizens, U.S. Nationals, and Legal Permanent Resident Aliens can apply for a regular Class D\ndriver license, regular CDL, or a regular identification card.\nApplicants not U.S. Citizens, U.S. Nationals, or Legal Permanent Resident Aliens who have proof of\nlawful presence in the United States can apply for a limited-term driver license, limited-term CDL, or a\nlimited-term identification card.\nApplicants who do not meet the lawful presence requirements to obtain a regular or limited-term driver license may be eligible to apply for a driving privilege card (DPC).\nNote: When changing a name, a legal document granting the name change must be furnished. Examples: government-issued marriage certificate, divorce decree, or court order.\nTo protect an applicant\u2019s identity, the division has adopted stringent guidelines for accepting identity documents. Additionally, the division seeks prosecution and sanctions against anyone submitting fraudulent documents or committing a fraud in the application process. The division seeks\nthe best-documented evidence to establish credible identification of the applicant by requesting a\nstate-certified birth certificate (hospital-issued, miniature, laminated, or photocopied certificates are\nnot acceptable.)\n\nREGULAR CLASS D DRIVER LICENSE AND IDENTIFICATION CARD (ID)\n\nAcceptable documents for a regular Class D driver license or identification card. Identity and lawful\nstatus verification (must provide one):\n\u2022 Valid, unexpired U.S. passport or passport card.\n\u2022 Certified copy of a birth certificate filed with the State Office of Vital Statistics or equivalent\nagency in your state of birth (small laminated birth certificates or hospital certificates are not\naccepted.)\n\u2022 Consular Report of Birth Abroad (CRBA) issued by the U.S. Department of State, form FS-240,\nDS-1350, or FS-545.\n\u2022 Valid, unexpired Permanent Resident Card, Conditional Permanent Resident Card, form I-551.\n\u2022 Certificate of Naturalization issued by DHS, form N-550 or form N-570.\n\u2022 Certificate of Citizenship issued by DHS, form N-560 or form N-561.\n\n14\n\n~AND~\nSocial security verification (must provide one):\n\u2022 Social security card issued by the U.S. government that has been signed (stub will not be accepted.)\n\u2022 If the social security card is not available, you may present one of the following documents that\nincludes your name and full social security number:\n\u2022 W-2 form\n\u2022 SSA-1099 form\n\u2022 Non SSA-1099 form\n\u2022 Pay stub\n\u2022 Letter from the Social Security Administration indicating ineligibility to obtain a social security\nnumber as a result of lawful presence status.\n~AND~\nUtah residency and mailing address verification (must provide two), and it must display your name;\naddress, and be dated within 90 days:\n\u2022 Bank statement\n\u2022 Court documents\n\u2022 Current mortgage or rental contract\n\u2022 Major credit card bill\n\u2022 Property tax notice\n\u2022 School transcript\n\u2022 Utility bill\n\u2022 Vehicle title\n~AND~\nProof of driving experience required for first Utah driver license (not required when obtaining a learner\npermit or an identification card):\n\u2022 Evidence of completion of a course in driver education if under the age of 19, or\n\u2022 Evidence of a driving privilege issued in another state or country.\n\nLIMITED-TERM DRIVER LICENSE\n\nAcceptable documents for a limited-term driving certificate or identification card. Identity and lawful\nstatus verification (must provide one):\n\u2022 Unexpired Employment Authorization Document (EAD) issued by DHS, form I-766 or form\nI-688B; verified by the Systematic Alien Verification for Entitlements system (SAVE).\n\u2022 Unexpired foreign passport with a valid visa and I-94 verified through SAVE.\n\n15\n\n~AND~\nA document issued by the U.S. Federal Government that establishes proof of one of the below statuses providing evidence of lawful entrance into the United States of America verified through SAVE:\n\u2022 Unexpired immigrant or nonimmigrant visa status for admission into the United States issued\nby the U.S. Federal Government.\n\u2022 Pending or approved application for asylum in the United States.\n\u2022 Admission into the United States as a refugee.\n\u2022 Pending or approved application for temporary protected status in the United States.\n\u2022 Approved deferred action status.\n\u2022 Pending application for adjustment of status to legal permanent resident.\n\u2022 Covered humanitarian parolee.\n~AND~\nSocial security verification (must provide one):\n\u2022 Social security card issued by the U.S. government that has been signed (stub will not be accepted.)\n\u2022 If the social security card is not available, the applicant may present one of the following documents which contains the applicant\u2019s name and full social security number:\n\u2022 W-2 form\n\u2022 SSA-1099 form\n\u2022 Non SSA-1099 form\n\u2022 Pay stub\n\u2022 Letter from the Social Security Administration indicating ineligibility to obtain a social security\nnumber as a result of lawful presence status.\n~AND~\nUtah residency and mailing address verification (must provide two), and it must display your name;\naddress, and be dated within 90 days:\n\u2022 Bank statement\n\u2022 Court documents\n\u2022 Current mortgage or rental contract\n\u2022 Major credit card bill\n\u2022 Property tax notice\n\u2022 School transcript\n\u2022 Utility bill\n\u2022 Vehicle title\n~AND~\n\n16\n\nProof of driving experience required for original Utah driver license (not required when obtaining a\nlearner permit):\n\u2022 Evidence of completion of a course in driver education if under the age of 19; or\n\u2022 Evidence of a driving privilege issued in another state or country.\n\nDRIVING PRIVILEGE CARD (DPC)\n\nAcceptable documents for a driving privilege card (DPC)\nIdentity and lawful status verification (must provide one):\n\u2022 Foreign birth certificate or unexpired foreign passport, including a certified translation if the\ndocument is not in English.\n\u2022 Unexpired Employment Authorization (EAD) issued by DHS.\n~AND ONE OF THE FOLLOWING~\n\u2022 Church records\n\u2022 Court records\n\u2022 Driver license\n\u2022 Employee ID\n\u2022 Insurance ID card\n\u2022 Matricular consular card (issued in Utah)\n\u2022 Mexican voter registration card\n\u2022 School records\n\u2022 Utah Driving Privilege Card (DPC)\n~AND~\nSocial security verification or individual tax identification number (must provide one):\n\u2022 Social security card issued by the U.S. government that has been signed (stub will not be accepted.)\n\u2022 If the social security card is not available, you may present one of the following documents that\nincludes your name and full social security number:\n\u2022 W-2 form\n\u2022 SSA-1099 form\n\u2022 Non SSA-1099 form\n\u2022 Pay stub\n\u2022 Individual tax identification number (ITIN) issued by the Internal Revenue Service.\n\u2022 Document or letter from the IRS verifying the ITIN.\n~AND~\nUtah residency and mailing address verification (must provide two), and it must display your name;\naddress, and be dated within 90 days:\n\n17\n\n\u2022 Bank statement\n\u2022 Court documents\n\u2022 Current mortgage or rental contract\n\u2022 Major credit card bill\n\u2022 Property tax notice\n\u2022 School transcript\n\u2022 Utility bill\n\u2022 Vehicle title\n~AND~\nFingerprint card and photo (additional fee required.) It must be obtained and placed in a sealed\nenvelope at the Bureau of Criminal Identification (BCI), a participating law enforcement agency, or an\napproved fingerprint vendor. It is only required for an original application.\n~AND~\nProof of driving experience required for first Utah driver license (not required when obtaining a learner\npermit):\n\u2022 Evidence of completion of a course in driver education if under the age of 19; or\n\u2022 Evidence of a driving privilege issued in another state or country.\n\nF. OUT-OF-STATE DRIVER LICENSE\nDrivers who have never been licensed in Utah, first-time drivers, and drivers who change from one\nlicense classification to another will be issued an original driver license. The driver license will expire\non the applicant\u2019s birthday eight years after issue when over 21. Provisional licenses (licenses issued\nto an applicant under 21 years of age) will expire on the applicant\u2019s birthday five years after issue.\nNote: Your out-of-state driver license must be surrendered upon application for a Utah driver license.\nVisitors with a valid out-of-state or out-of-country license may drive in Utah for up to six months.\nDrivers with an out-of-state learner permit may NOT drive in Utah. To apply for a Utah driver license,\nplease visit our website at dld.utah.gov and schedule an appointment.\n\nG. RENEWAL, REPLACEMENT, LAPSED/EXPIRED\nRENEWAL\nTo renew your regular Utah driver license, schedule a renewal appointment by visiting our website at\ndld.utah.gov. You may renew your driver license up to six months before the expiration of the license.\nAfter paying the fee and passing the required tests (if any), you will be issued a new driver license\nthat will expire on your birthday eight years after issue.\nMilitary personnel and dependents who reside with them who had a valid Utah driver license at the\ntime of entry into the service may continue to use that driver license up to 90 days after discharge or\ntermination of orders (this provision applies only to members and their dependents who are stationed/\n\n18\n\nresiding outside of Utah.)\nA civilian employee of the United States Department of Defense or State Department and their dependents working outside the United States may continue using their Utah driver license up to 90\ndays after the assignment has been terminated or changed.\nLimited-term driver license holder must present acceptable proof of lawful presence documents when\nrenewing.\nREPLACEMENT\nIf you have lost your Utah driver license, you can schedule a duplicate license appointment by visiting our website at dld.utah.gov. Limited-term driver license holder must present acceptable proof of\nlawful presence documents. In addition, an eye exam must be passed and a new photograph taken.\nThe expiration date of a replacement driver license will be the same date as the license it replaces.\nAll drivers wanting to change their address must provide two approved forms of address change verification to receive the replacement and pay the applicable fee.\nLAPSED/EXPIRED\nIf your driver license has expired, schedule a renewal appointment on our website dld.utah.gov. You\nmay have to complete the written knowledge and driving skills tests again, depending on the length of\nexpiration.\nUTAH\u2019S GOOD DRIVER PROGRAM EXTENSIONS AND RENEWALS BY INTERNET FOR\nREGULAR DRIVER LICENSE HOLDERS\nIf you have NOT received more than six reportable violations in the past eight years, and your driver\nlicense status is currently valid, you are eligible for Utah\u2019s good driver program. You will receive an\nextension (online renewal) notice by mail approximately 90 days before your birthday, if the division\nhas record of your current address.\n\nH. ADDRESS CHANGE\nIf you have a change of address, you are required by law to notify the division of the new address\nwithin 10 DAYS of moving. This may be done online. This is important because the post office will\nnot forward mail from the Driver License Division. If you would like your new address on your driver license, you will need to schedule an appointment for a replacement driver license by visiting our\nwebsite at dld.utah.gov.\n\nI. IDENTIFICATION CARD\nOnly a Utah resident may obtain a Utah identification card.\nUtah law does NOT allow an individual to have a driver license certificate and an identification card at\nthe same time. To apply, schedule an identification card appointment on our website at dld.utah.gov.\n\n19\n\nSECTION 5: Vision and Health\nDriving is one of the most dangerous things that you will ever do. Being in good health when you\ndrive and making good choices is essential. Here are ways to be a safer driver.\n\nA. EYE (VISION) TEST\nThe division requires 20/40 vision and peripheral fields (side vision) of 90\u00b0 in at least one eye to pass\nthe vision test. If you fail to meet this standard with or without glasses, you must get a statement\nfrom your eye doctor. The statement must be presented before your application can be completed. It\nshould indicate specific vision conditions and suggested restrictions, if any. A vision test is required\non all applications processed in a field office. Everyone age 65 and older is required to pass a vision\ntest with every license application.\n\nB. HEALTH CONDITIONS AND DRIVING SAFETY\nIn 1979, the Utah State Legislature made provisions for increasing highway safety while allowing\nmany people with health concerns to drive within appropriate safety limits.\nThe law states that individuals are personally responsible for ensuring they are in reasonably good\nhealth when driving. If a person has a health condition that may affect their ability to drive a vehicle\nsafely, they are responsible for reporting it to the Driver License Division and are expected to seek\ncompetent medical evaluation and advice. Their physicians are responsible for advising them about\ntheir health related to driving safety. A physician does not have the authority to restrict anyone\u2019s driving but is responsible for reporting accurately about a patient\u2019s health status. This report may permit\na license with restrictions or, in some cases, a denial of your license for safety reasons.\nThe legislature also set up a Driver License Medical Advisory Board to advise physicians and the\nDriver License Division. The board emphasizes the functional ability to drive a vehicle safely rather\nthan stressing impairments. It developed a form, \u201cFunctional Ability Evaluation Medical Report,\u201d or\n\u201cGuidelines\u201d to help physicians advise their patients and simplify reporting.\nThe guidelines include possible health concerns in the following 11 categories:\n\u2022 (A) Diabetes and metabolic conditions\n\u2022 (B) Cardiovascular (heart)\n\u2022 (C) Pulmonary (lung)\n\u2022 (D) Neurologic (nervous system)\n\u2022 (E) Seizures and other episodic conditions\n\u2022 (F) Learning, memory, and communication disorders\n\u2022 (G) Mental health\n\u2022 (H) Alcohol and other drugs\n\u2022 (I) Visual disorders\n\u2022 (J) Musculoskeletal abnormality or chronic debility\n\u2022 (K) Alertness or sleep disorders\n\n20\n\nIn some circumstances, it might be appropriate for the Medical Advisory Board to review a case to\nhelp determine driving eligibility.\nYou will be asked to answer health-related questions when applying for your Utah driver license. If\nthere is a health concern, you will be given a Functional Ability Evaluation form to take to your healthcare provider, who will complete a Functional Ability Safety Assessment.\nThe form is then returned to the Driver License Division, and if appropriate, a license to drive will be\nissued based on previously determined levels of driving risk. For example, if there is a vision concern and you cannot read highway signs at a distance, you may be considered unsafe to drive, and a\nrestricted license could be issued.\nIf you have a health condition, ask your physician how it might affect your driving. Many medications\nmay cause drowsiness or other difficulties; therefore, a physician may advise against driving until a\nsuitable dosage schedule has been worked out that will not impair driving. Abuse or excessive use\nof prescription drugs has caused many serious accidents and should be avoided. You have the final\nresponsibility for knowing your abilities and for driving safely.\nThe guidelines require higher standards of fitness for drivers of commercial motor vehicles than for\nprivate vehicles, but the principles are the same.\nMENTAL AND HEALTH CONDITIONS\nMental and health conditions are just as important as physical health concerns. If your mind is not\non your driving, you are probably not driving safely. Some forms of behavior that often provide hints\nabout our mental health are:\n\u2022 Finding that you are always mad at other drivers and sometimes try to \u201cget even.\u201d\n\u2022 Tending to be excessively confused or frustrated when traffic becomes heavy.\n\u2022 Being so depressed and worried about things that your attention is not always on the road.\n\u2022 You are frequently getting traffic citations.\n\u2022 Having trouble adjusting to an emotional shock such as the loss of a loved one.\nIf you are angry or excited, give yourself time to cool off. Take a walk or talk to a friend. Do anything,\nbut stay off the road until you have cooled down.\nIf you are worried about something, do something that will allow you to concentrate on driving. Listen\nto the radio or sing to yourself.\nIf you are impatient, give yourself extra time. If you leave a few minutes early, you will not feel the\nneed to speed, beat traffic signals, or do other things that can get you a traffic citation or cause a\ncrash.\n\nC. REVIEW EXAMINATION\nSometimes, the division will request that a driver appear for a review examination. The request for an\nevaluation may be based upon a request from:\n\u2022 Medical professional.\n\u2022 Confidential reporting.\n\n21\n\n\u2022 A law enforcement officer observed a driving situation that questioned the driver\u2019s ability to\noperate a motor vehicle safely.\n\u2022 Another individual or agency indicates a driver may be impaired.\n\u2022 Having a medical condition that requires assessing the functional ability to drive.\nA review examination does not necessarily lead to withdrawing the driving privilege. In most cases,\nupon completion of the review process, a driver is allowed to drive under applicable restrictions if\ndeemed safe by the division. The driving privilege will be withdrawn if an individual does not complete a required review examination.\nAfter the review examination has been completed, a hearing officer will discuss the results with the\ndriver and will review the medical evaluation. The hearing officer will take into account:\n\u2022 The driving needs of the individual.\n\u2022 The type of roads or highways used.\n\u2022 The traffic conditions usually experienced, etc.\nThe hearing officer will also refer to guidelines established by the Driver License Medical Advisory\nBoard as they relate to the medical form provided by the driver. The hearing officer will then decide\nwhether any restrictions need to be placed on the license. Only when the division determines that a\ndriver cannot operate a vehicle safely under any conditions is the driver license withdrawn. Often no\nrestrictions are required, but when they are, one or more restrictions are specified on the license.\n\n22\n\nSECTION 6: Examinations\nA. WRITTEN KNOWLEDGE TEST\nThe primary purpose of a written knowledge test is to ensure you have the information needed to\ndrive safely. The written knowledge test measures a sample of what you know, but it shows you have\na basic understanding of Utah laws and safe driving practices. The questions are based on the information provided in this handbook. The written knowledge test is not timed, but it generally takes 30 to\n45 minutes to finish, and you must pass with a score of 80% or better.\nYou can take two written knowledge tests per day, provided the division can facilitate the testing. If\nyou need to return to the office after a failed attempt, a written retest appointment will need to be\nscheduled.\nThe fee allows for not more than three attempts to pass the written knowledge test within 12 months.\nAfter three failed attempts at the written knowledge test, you may pay another fee for three more attempts to pass the written knowledge test.\n\nB. TRAFFIC SAFETY AND TRENDS EXAM\nAll first-time driver license applicants will be required to pass an additional test and receive 100% to\nobtain their first-time regular Class D driver license. This exam is only offered on the Driver License\nDivision website and may be taken as often as necessary before licensing. 50% of the questions will\nrelate to significant causes of traffic-related deaths as identified in statistics published by the Utah\nHighway Safety Office.\n\nC. DRIVING SKILLS TEST\nYou will be required to demonstrate your driving ability and provide the vehicle for the driving skills\ntest. The vehicle must be properly registered and comply with vehicle safety laws, including functioning safety belts. The vehicle may be rejected if its condition could cause harm to the examiner\u2019s\nperson or clothes. You must:\n\u2022 Be at least 16 years of age to take a driving skills test at the DLD. If you arrive for a scheduled\ntest and have not met the requirements, you will need to reschedule your test.\n\u2022 Be at least 15 years of age to take a driving skills test with a Third-Party Tester or high school.\nThe applicant and the examiner are the only occupants allowed in the vehicle during the driving skills\ntest. In addition to road rules and regulations, you will be scored on:\n\u2022 General behavior and attitude.\n\u2022 The use of proper driving techniques.\n\u2022 Driving posture and adequate use of lanes.\n\u2022 Left, right, and three-point turns.\n\u2022 Starting and stopping.\n\u2022 Parking on hills, between cars, and parallel parking.\n\u2022 Observance of traffic signs and signals, backing, U-turns, and steering coordination.\n\u2022 Attention at intersections.\n\n23\n\n\u2022 Overall ability to operate the vehicle safely and appropriately.\nDuring the driving skills test, you will be asked to complete multiple lane changes. The driver license\nexaminer will instruct you through the test. You will be asked to follow the directions of the examiner,\nwho will be scoring you on specific driving maneuvers. You will not be asked to do anything unsafe or\nillegal.\nIf you fail the driving skills test, you will be expected to practice before taking another test. You may\nonly take one driving skills test daily and may have to wait several days or weeks before attempting\nadditional tests. The failure to pass the driving skills test in three attempts will result in paying another\nfee. All tests must be completed within six months from the day you pay your fee.\nAny person may be asked to complete additional testing if the examiner feels the applicant\u2019s driving\nability may be questionable.\nYou can expect to be treated with respect, fairness, and courtesy during the examination process. At\nthe end of the driving skills test, the examiner will discuss the test results and provide recommendations for possible improvement.\nYour driving skills test will last about 20 minutes and will consist of the basic maneuvers mentioned\nabove.\nIf you have any questions, please ask the examiner before your driving skills test begins. During the\ntest, the examiner will ask questions or give you directions, but will not engage in general conversation.\nWe want you to pass your driving skills test. Study this handbook, relax, and do your best!\nNote: Driving skills tests (including motorcycle skills tests) are given by appointment only. Schedule\non our website at dld.utah.gov.\nPREPARE FOR YOUR DRIVING SKILLS TEST\nTo succeed on your driving skills test, you should practice with a parent/guardian or friend who is\nproperly licensed and over the age of 21. Practice driving in low-traveled, residential areas until you\nare confident you can drive in other traffic situations, such as urban areas and expressways. It is also\na good idea to watch a video demonstration on the required maneuvers to become familiar with how\nto properly perform the maneuver. There are links available with each maneuver later in this book.\nBefore taking the driving skills test, you should have made an appointment. When arriving at the\noffice for your scheduled time:\n\u2022 Present your learner permit or license certificate.\n\u2022 Valid vehicle registration.\n\u2022 Valid insurance.\n\u2022 Valid driver license of the person who is at least 21 years of age or a parent, guardian or\nspouse who is at least 18 years of age, accompanying you to the Driver License Office.\nTEST VEHICLE REQUIREMENTS\nYou must provide the vehicle for your driving skills test. The vehicle must be registered, clean, and\nfree of unnecessary debris and odor, and safe to drive. To avoid having to reschedule your driving\n\n24\n\nskills test, please ensure that your vehicle has:\n\u2022 The rear plate must show current registration (front plate not required after January 1, 2025.)\n\u2022 Both front and back turn signal lights and working brake lights.\n\u2022 A working horn designed for the vehicle.\n\u2022 Tires with no bald spots.\n\u2022 Adequate brake pressure (you may be asked to step on the brake pedal to see if it works properly.)\n\u2022 A driver\u2019s side window that rolls down.\n\u2022 A windshield that allows an entire unobstructed field of vision.\n\u2022 Two rear view mirrors (one must be on the outside, to the driver\u2019s left.)\n\u2022 Driver and front passenger doors that open from both the inside and outside.\n\u2022 A passenger seat is permanently attached to the vehicle.\n\u2022 Working safety belts.\n\u2022 Working emergency/parking brake.\nLearning to drive safely does not end with your driving skills test. Your driver license means you have\nmet the driving test requirements. However, in everyday driving, you will have to deal with many situations you did not encounter on the test. The best way to deal with unexpected situations is always\nto use safe driving habits and the responsible and courteous attitude you demonstrated on your test.\nGood luck!\nTHIRD-PARTY TESTERS\nThird-party testers are certified and licensed as commercial driver education instructors by the division and can administer the driving skills test. A separate fee for testing will be required by the\nthird-party tester, which is not part of the licensing fees collected by the division. For a current list of\ncertified third-party testers, visit dld.utah.gov/driving-test/.\nADDITIONAL TESTING REQUIREMENTS\nYou may be required to complete additional written knowledge or driving skills testing:\n\u2022 If you have an expired learner permit.\n\u2022 If you have not completed the application process within six months of applying.\n\u2022 If your previous testing has expired.\nDANGEROUS ACTIONS/AUTOMATIC FAILURES\nIf any of the following errors occur during the driving skills test, automatic failure will result:\n\u2022 If you receive a traffic citation for a moving violation, disobey signs or signals, speed, roll\nthrough stops, or ignore traffic laws.\n\u2022 If you do not yield to pedestrians or other roadway users.\n\u2022 If you are involved in an avoidable crash or if your vehicle has physical contact with other vehicles, objects, or pedestrians.\n\u2022 If you commit, any unsafe act or another driver is forced to take evasive action in order to prevent a crash.\n\u2022 If you put the vehicle over sidewalks or curbs unnecessarily.\n\n25\n\n\u2022 If the examiner has to take control of the vehicle.\n\u2022 If you drive too fast or too slow.\nSAFE DRIVING TIPS\nPractice these tips to improve your driving skills:\n\u2022 Steer smoothly at all times with both hands on the outside of the wheel. You may use the\nhand-over-hand or push-and-pull method.\n\u2022 Accelerate smoothly. Don\u2019t race the engine or make it stall.\n\u2022 Stop the vehicle gently. Start braking well ahead of where you must stop to avoid sudden\njerks. Know where to stop. Be aware of crosswalks. If your view is blocked at a crosswalk,\nmove forward carefully and look both ways before entering the intersection.\n\u2022 Be sure your vehicle is in the correct gear. Don\u2019t grind the gears. Don\u2019t coast to a stop.\n\u2022 Always obey the posted speed limits. If needed, reduce your speed to adjust for weather,\nroad, and other traffic conditions.\n\u2022 Follow at a safe distance. Use the two-second rule. Increase your following distance in bad\nweather or poor visibility.\n\u2022 Know what the traffic signals mean and obey them at all times.\n\u2022 Always use the proper lane. Turn from the correct lane into the correct lane.\n\u2022 Signal for all lane changes and turns.\n\u2022 Always scan for potential hazards and check your mirrors frequently.\n\u2022 Always look over the proper shoulder (head check/traffic check) before making lane changes,\npulling away from the curb, or making turns.\n\u2022 Drive defensively. Anticipate another driver\u2019s errors.\n\n26\n\nSECTION 7: Preparing Your Vehicle\nA. ADJUSTING YOUR SEAT:\n\u2022 Sit straight with your back against the seat and feet on the floor.\n\u2022 Adjust your seat and mirrors so you can see clearly.\n\u2022 You should be able to reach the foot pedals.\n\u2022 You should leave 10 inches between your chest and the steering wheel. Do not lean the seat\nback.\n\u2022 You should be able to move your foot easily from the brake to the gas pedal and keep your\nheel on the floor.\n\u2022 The top of the steering wheel should be no higher than your shoulders. It should be below\nchin level.\n\u2022 Your headrest should contact the back of your head above the level of your ears.\n\nB. ADJUSTING YOUR MIRRORS\nAdjust the inside mirror so that it frames the rear window. If you have a day/night mirror, ensure it is\nset for the time of day you drive.\nAdjust outside mirrors to give maximum view to the side and rear. How to adjust your outside mirrors:\n\u2022 To set the left side mirror, rest your head against the closed left window. Set the mirror so you\ncan barely see the rear left edge of your vehicle.\n\u2022 To set the right side mirror, lean to the right so your head is directly below the rearview mirror.\nSet the mirror so you can barely see the right side of your vehicle.\n\nC. SAFETY BELTS\nAlways fasten your safety belt. Everyone in your vehicle must have a fastened safety belt or child\nseat. Safety belts reduce injuries and deaths in crashes. They keep you from being thrown from the\nvehicle. They help you keep control of your vehicle. To wear the safety belt correctly:\n\u2022 Pull the shoulder harness across your shoulder and chest until it is snug; the lap belt should fit\nacross the hips, not your stomach.\n\u2022 The shoulder harness should not be under your arm or behind your back.\n\u2022 Fasten the buckle securely.\nMotor vehicle crashes continue to be a major cause of death and injury to individuals in Utah.\nSAFETY BELT FACTS:\n\u2022 Buckle up, It\u2019s the law. All passengers must wear safety belts, and children ages eight and\nyounger must be properly restrained in a car or booster seat.\n\u2022 Your chances of being killed are 23 times greater if you are thrown from a car. Ejection from\nthe vehicle is one of the most severe events that can happen in a crash. Safety belts help\nkeep you in the car.\n\n27\n\n\u2022 70% of crashes occur at speeds under 40 mph. A safety belt should be worn at any speed,\nregardless of how slow you are moving.\n\u2022 In a crash, the forces exerted on your body equal your weight multiplied by the car\u2019s speed.\nFor example, if you weigh 150 pounds and crash while traveling 30 mph, there would be 4,500\npounds of force on your body. There is no way you can brace yourself against that much\nforce.\n\u2022 Three out of four crashes resulting in death are within 25 miles of home. Not using a safety\nbelt because you are just going to the store is a poor excuse\u2014and dangerous.\n\u2022 Less than half of one percent of all injury-producing collisions involve fire or submersion. If fire\nor submersion does occur, a safety belt may keep you from being injured or knocked unconscious, thus increasing your chances of escape.\n\u2022 Drivers wearing safety belts have more control over their vehicles in emergencies and are\nmore likely to avoid a crash.\n\u2022 In Utah, approximately two out of three motor vehicle deaths would not happen if safety belts\nwere worn.\nSAFETY BELT VIOLATIONS\nRemember, safety belts save lives. If you or anyone in your vehicle isn\u2019t properly restrained, you can\nbe issued a citation for each unrestrained passenger. The fine may be waived upon completing an\nonline, 30-minute safety belt safety course. You may be stopped and cited if anyone under 16 years\nof age is unrestrained, and occupants of the vehicle 16 years and older may be cited for a safety belt\nviolation if stopped for another reason.\nFor proper safety belt and car seat usage, visit clickitutah.org.\n\nD. CAR SEATS\nMake sure child safety seats are used correctly:\n\u2022 All children aged eight and under must be properly secured in an approved child safety seat\nunless they are 57 inches tall.\n\u2022 Children must be rear-facing in the back seat until at least two years of age and 30 pounds or\nlonger if the car seat allows.\n\u2022 Children must be forward facing with a harness in the back seat until at least four years of age\nand 40 pounds, or longer if the car seat allows.\n\u2022 Children from approximately four years of age and 40 pounds need to be in a booster seat until\nthe safety belt fits correctly and they are 57 inches tall.\n\u2022 Children between eight and 12 years old must be properly restrained in an appropriate child\nrestraint device or by a safety belt. Children 12 years of age and younger should continue to\nride in the back seat.\nCHILD CAR SEAT FACTS:\n\u2022 Approximately 500 Utah children under the age of five are injured, and as many as 10 are\nkilled each year in motor vehicle crashes.\n\u2022 Authorized emergency vehicles, mopeds, motorcycles, school buses, and vehicles not\nequipped with safety belts by the manufacturer are exempt from the motor vehicle safety belt\nusage act.\n\n28\n\n\u2022 Child car seats must be crash-tested to be approved for use. Check the labels on your child\u2019s\ncar seat to be sure it meets Federal Motor Vehicle Safety Standards.\nPROTECTION OF CHILDREN\nIt is an infraction to be stopped for smoking in a vehicle while transporting children 15 years of age or\nyounger.\n\nE. AIR BAGS\nAir bags work! They save lives. Air bags are designed to work with safety belts, not replace them.\nThey do their job best when everyone is buckled, and children are properly restrained in the back\nseat.\nAn air bag is not a soft, billowy pillow. To do its important job, an air bag comes out of the dashboard\nat up to 200 mph\u2014faster than the blink of an eye. The force of an air bag can hurt those who are too\nclose to it. Drivers can eliminate any danger to children from a deploying air bag by properly restraining children in the back seat. With or without an air bag, the back seat is the safest for children to\nride.\nAir bag related injuries can be prevented by following these critical safety points:\n\u2022 Children twelve and under should ride buckled up in a rear seat, and child car seats should be\napproved for their age and size.\n\u2022 Infants should never ride in the front seat of a vehicle with a passenger-side air bag.\n\u2022 Everyone should buckle up with both lap and shoulder belts on every trip.\n\u2022 Driver and front seat passengers should be moved as far back as practical.\n\u2022 If a child must ride in a seating position with an air bag, move the vehicle seat as far back as\npossible and ensure they are correctly secured in an appropriate child car seat. Many vehicles\ncan also turn off the air bag when a child is present.\nNote: It is a Class B misdemeanor if you remove, fail to have repaired, or modify your vehicle\u2019s air\nbag passive restraint system to render the air bag inoperable.\n\n29\n\nSECTION 8: Basic Driving\nA. STARTING THE ENGINE\nBe sure the vehicle is in \u201cP\u201d (park) or the clutch is engaged if operating a vehicle with manual gears.\nTo start the engine, apply the brake, turn the ignition on and check the lights and gauges (fuel level,\nABS, air bags, etc.)\nMOVING FORWARD:\n\u2022 Put the vehicle in gear.\n\u2022 Perform a traffic check and head check.\n\u2022 Signal if needed.\n\u2022 Smoothly accelerate.\nWhen performing the following maneuvers, you are expected to perform required head checks, signals, and traffic checks.\n\nB. BACKING (Reverse)\nSTEPS TO SAFELY BACK YOUR MOTOR VEHICLE:\n\u2022 Check behind the vehicle before you get in. You cannot see children or small objects from the\ndriver\u2019s seat.\n\u2022 Start the vehicle.\n\u2022 Apply the brake and shift to reverse.\n\u2022 Grasp the steering wheel with your left hand.\n\u2022 Put your right arm on the back of the seat and look through the rear window. Your mirrors do\nnot show the area right behind your vehicle.\n\u2022 Back slowly. It is hard to steer while backing. Steer in the direction you want the rear of the\nvehicle to move. If turning while backing, make quick checks to the front and sides. Keep\nlooking to the rear until you are stopped. Do not ba
