ck up on a freeway or interstate.\n\u2022 Keep your vehicle on the right-hand side of the road, and do not\nback unnecessarily long distances.\n\nC. LANE CHANGES\nDuring the driving skills test, you will be asked to complete multiple lane changes. You should make\nthe necessary traffic checks first by:\n\u2022 Checking your mirrors.\n\u2022 Signal for at least two seconds in the direction you intend to move.\n\u2022 Check your \u201cblind spot\u201d by turning your head and looking over your shoulder in the same direction.\n\u2022 Drive defensively by making sure your lane change can be completed safely.\n\u2022 Merge when safe.\n\n30\n\n\u2022 Maintain or adjust your speed to go with the flow of traffic.\n\u2022 Cancel your turn signal.\n\nPROPER LANE USAGE\nDo not put the vehicle over curbs, sidewalks, or lane markings. Complete a turn in the proper lane on\na multiple-lane road (vehicle should finish a left turn in the left-most lane, the one directly to the right\nof the centerline.) Finish a right turn in the right-most (curb) lane. Move to or remain in the right-most\nlane unless the lane is blocked. Do not attempt lane changes at intersections.\nMERGING AND GORE AREA\nIf you are merging into a lane of traffic, you must yield the right-of-way to all\nvehicles traveling the continuing traffic lane that are close enough to be an\nimmediate threat. It is against the law to cross over or to drive in the \u201cgore\narea.\u201d The gore area is between the solid white lines of a lane of traffic and\na lane used to either enter or exit from that traffic lane. The gore area can\nalso appear when two highways merge or split. Do not cross over the solid\nwhite line.\nMerge like a zipper. The ZIPPER METHOD is the idea of alternating when merging at a congested\nmerge point (i.e., construction zone.) Use both lanes of traffic until the vehicles reach the merge\npoint, and once the vehicles reach the merge point, alternate, yielding the right-of-way into the single-traffic lane. A violation of this section is an infraction.\nREGULAR TRAFFIC CHECKS/HEAD CHECKS\nCheck traffic and mirrors regularly. Check traffic and mirrors before, during, and after an intersection,\nturn, or lane change. Watch for hazards by searching left and right at intersections, driveways, store\nentrances, railroad tracks, or other areas where traffic intersects. Scan and check traffic in high-volume areas and areas where pedestrians are expected to be present. Check traffic by looking over\nyour shoulder (head check) when necessary (i.e., lane change, merging.)\nSTOPPING AT STOP LINE, CROSSWALK, OR GAP\nDo not stop over a marked stop line, pedestrian crosswalk, sidewalk, or other markers when stopping\nat a stop sign or traffic signal. Do not stop the vehicle in the intersection. When stopping behind another vehicle, ensure you can see the rear wheels of the vehicle in front of you.\nUSE OF TURN SIGNALS\nUse turn signals when required. Do not signal too early or too late. Cancel turn signals upon completion of a turn or lane change.\n\nD. PARKING\nYou must ensure that your vehicle is not a hazard when parked. Always park in a marked parking\narea. When parking along the road, park your vehicle as far from traffic as possible. If there is a\ncurb, park close to it. In the interest of public safety, there are several places where you are not allowed to park:\n\u2022 On a sidewalk.\n\n31\n\n\u2022 In front of a public or private driveway.\n\u2022 In an intersection.\n\u2022 Within 15 feet of a fire hydrant.\n\u2022 On a crosswalk, or within 20 feet of a crosswalk.\n\u2022 Within 20 feet of the driveway entrance to any fire station, if signs are posted, you may not\npark on the opposite side of the road if you are within 75 feet of the fire station entrance.\n\u2022 Within 30 feet of any flashing beacon, stop sign, yield sign, or traffic control signal.\n\u2022 In an area posted for pedestrian use or within 30 feet of the edges of that area.\n\u2022 On any railroad track or within 50 feet of the nearest rail of a railroad crossing.\n\u2022 Alongside or opposite any street excavation or obstruction when stopping or parking would\nblock traffic.\n\u2022 On the roadway side of any vehicle stopped or parked at the edge or curb of a street (no double parking.)\n\u2022 On any bridge or other elevated highway structure or in a highway tunnel.\n\u2022 At any place where official signs prohibit stopping.\n\u2022 On the shoulder of any interstate highway\u2014these areas may be used only if your vehicle\nbreaks down or you are in physical distress.\n\u2022 Red-painted curbs or red zones.\n\nHILL PARKING\nTo downhill park:\n\u2022 Signal to the right as you approach the curb.\n\u2022 Perform a head check over your right shoulder and pull parallel to the curb.\n\u2022 Turn your wheel toward the curb, ensuring your front tire touches the curb to secure the vehicle\u2019s position.\n\u2022 Put the vehicle in park and set the parking brake.\nTo uphill park:\n\u2022 Signal to the right as you approach the curb.\n\u2022 Perform a head check over your right shoulder and pull parallel to the curb.\n\u2022 Turn your wheel away from the curb while ensuring vehicle\u2019s front tire touches the curb to secure the vehicle\u2019s position (without a curb turn the wheel to the right.)\n\u2022 Put the vehicle in park and set the parking brake.\nNever leave your vehicle until you have set the parking brake, stopped the motor, and locked the\ndoors. Pull as far off the road as reasonable to park. If parking next to a curb, the back wheel of your\ncar must be no further than 12 inches away from the curb. If your parking would block the flow of\ntraffic, find another place to park.\n\n32\n\nNO PARKING ZONES\nCheck for signs or painted curbs that may ban or limit parking. Colored curb markings\nindicate some no-parking zones.\n\nPARALLEL PARKING\nWhen initiating a parallel park:\n\u2022 Find a parking space. Check traffic, signal, and head check.\n\u2022 Pull up parallel to the vehicle you are parking behind.\n\u2022 When traffic is clear, shift to reverse and look to the rear.\n\u2022 Back slowly while turning the steering wheel quickly. Continue backing until your front bumper\nis in line with the rear bumper of the vehicle you are parking behind.\n\u2022 Keep backing slowly while turning the steering wheel rapidly. Center your vehicle in the space\nand stop before touching the vehicle\u2019s bumper behind you. Shift to drive and adjust your position in the space. The vehicle should be no more than 12 inches from the curb.\n\u2022 Ensure that your vehicle\u2019s front bumper will clear the vehicle ahead. If not, shift to reverse and\nadjust.\n\u2022 Put the vehicle in park and set the parking brake.\nWhen exiting:\n\u2022 Check traffic and apply the brake. Shift to reverse and back up close to the vehicle parked\nbehind you.\n\u2022 Check for traffic and signal. Shift to drive and move forward slowly.\n\u2022 Move into the traffic lane when your vehicle clears the rear bumper of the vehicle ahead of\nyou.\nPERPENDICULAR AND ANGLE PARKING\nEntering a perpendicular or angle parking space:\n\u2022 Identify the space in which you will park and check traffic.\n\u2022 Signal your intentions.\n\u2022 Move forward slowly, turning the steering wheel left or right as appropriate until the vehicle reaches the middle of the space.\n\u2022 Center the vehicle in the space.\n\u2022 Move to the front of the parking space, stop, and secure the vehicle.\nExiting a perpendicular or angle parking space:\n\u2022 Check for traffic in all directions.\n\u2022 Continue to check traffic and move straight back until your front bumper clears the vehicle\nparked beside you.\n\u2022 Turn the steering wheel sharply in the direction that the rear of your vehicle should move.\n\u2022 Stop and shift to drive when the vehicle clears the parking area space.\n\u2022 Accelerate smoothly, steering as needed to straighten wheels.\n\n33\n\nE. PASSING\nOn multi-lane roads, the left lane is for passing slower vehicles. Never pass on the shoulder. Pass\nas quickly and safely as possible. Do not stay alongside the other vehicle any longer than you have\nto. How to pass:\n\u2022 Check for oncoming traffic.\n\u2022 Check your mirrors and do a head check for vehicles following\nor passing you.\n\u2022 Signal and steer into the passing lane.\n\u2022 Adjust speed and move entirely into the left lane.\n\u2022 Return to the right-hand lane no less than 200 feet from oncoming vehicles.\n\u2022 Wait until you can see the passed vehicles in your rearview mirror.\n\u2022 Signal before returning to the lane, steer into the lane, and adjust speed.\n\u2022 When passing on the right, it is illegal to leave the roadway.\nIf you are being passed, stay in your lane and keep your speed steady to allow the driver to pass.\nNever pass:\n\u2022 If there is an oncoming vehicle.\n\u2022 If a curve or hill blocks your view.\n\u2022 At intersections, or another car when stopped at a crosswalk.\n\u2022 Before a railroad crossing or bridge.\n\u2022 In a no-passing zone.\n\u2022 Slow down when passing bicyclists to give them as much space as possible.\nIf a snowplow displays flashing yellow lights, an individual operating a vehicle near the snowplow\nmay not pass or overtake a snowplow on the side of the snowplow where a plow blade is deployed.\nIf three or more snowplows operate in echelon formation, an individual operating a vehicle may not\npass or overtake the snowplows on either side.\n\nF. SIGNALING\nThe use of turn signals, stoplights, or your hand and arm shall give signals. Good drivers always\nsignal their intentions well in advance. Signals are required:\n\u2022 For two seconds before turning.\n\u2022 For two seconds before beginning any lane change.\n\u2022 Any time you pull to or from a curb.\n\u2022 When you intend to slow down or stop, your brake lights will accomplish this if they operate\ncorrectly and can readily be seen.\n\u2022 In addition, most cars have an emergency flasher system for use when your car is disabled on\nthe highway. Use it!\n\nG. STEERING\n34\n\nKeep both hands on the outside of the steering wheel at all times unless using other controls. Once\nyou have completed using other controls, return both hands to the steering wheel. All steering methods are acceptable (i.e., hand-over-hand and push/pull) as long as both hands are on the outside of\nthe wheel.\nAlways turn the steering wheel in the direction you want to go. This works whether you are going\nforward or in reverse.\nPlace your hands on the steering wheel; grip the steering wheel firmly but gently. Use your fingers,\nnot the palms of your hands. Keep your thumbs up along the face of the steering wheel. Never hold\nthe inside of the wheel.\nHAND-OVER-HAND STEERING\nUse hand-over-hand steering when steering is critical, such as when parking, performing sharp right\nturns, or correcting a skid.\nPULL-PUSH STEERING:\n\u2022 Use pull-push steering when turning.\n\u2022 Pull down with one hand and push up with the other. This results in smooth steering and reduces the potential for oversteering, which can lead to loss of control.\n\u2022 Keep your hands and thumbs on the outside of the wheel.\n\nH. STOPPING\nApply the brake smoothly and use steady pressure. Come to a complete stop at traffic signs and\nsignals.\nCheck your mirrors for traffic to the rear. Move your foot to the brake pedal. Press steadily until your\nvehicle comes to a stop.\nMany people seem to feel that a rolling stop is adequate when required to stop. The following situations are times when you must make a complete stop:\n\u2022 Steady (non-flashing) red light or at a flashing red light.\n\u2022 All stop signs.\n\u2022 Railroad crossings are controlled by flashing signals, gates, a watchman, or stop signs. Stop\nmore than 15 feet (but not more than 50 feet) away from the nearest rail until it is safe to continue. If there is a gate, wait for it to be raised.\n\u2022 At the scene of any crash in which you may be involved as a driver. You must meet all legal\nrequirements before leaving the crash scene.\n\u2022 When a police or other officer requests you to stop.\n\u2022 Before a sidewalk area or street, when coming onto a street or highway from an alley, private\ndriveway, private road, or a building.\n\n35\n\nSCHOOL BUS STOPPING:\n\u2022 If a school bus displays alternating flashing red light signals visible from the front or rear. Stop\nimmediately before reaching the bus. Do not proceed until the flashing red light signal ceases\nto stop.\n\u2022 Traveling on a two-lane roadway, traffic in both directions must stop.\n\u2022 If traveling on a divided highway with four or more lanes with a median separating the traffic,\nit is only necessary for the vehicles in both lanes behind the school bus to stop, not the traffic\ntraveling in the opposite direction.\n\u2022 Traveling on a four-lane roadway without a median, traffic in both directions is required to stop.\n\u2022 Traveling on a highway with five or more lanes and a shared center turn lane is only required\nfor the vehicle\u2019s in both lanes behind the school bus to come to a complete stop. Vehicles traveling in the opposite direction are not legally required to stop.\nIt is important to note that although you may not be required by law to stop when you see a stopped\nschool bus, you should be aware that students will be getting on and off the bus. Children are unpredictable and could run into the road at any time. Use caution while driving near school buses and\nadjust your speed accordingly.\nSchool bus drivers may report vehicles that improperly pass school buses. The report may be forwarded to the local law enforcement agency for investigation. Fines can run up to $3000; remember,\na conviction for passing a school bus illegally usually means an increase in insurance rates.\n\nI. TURNS\nDuring the driving skills test, you will be asked to make turns; you should:\n\u2022 Approach the turn and check traffic in all directions.\n\u2022 Use the correct turn signal.\n\u2022 Brake smoothly and evenly.\n\u2022 Safely get into the correct lane needed for the turn.\nIf you must stop before turning because of traffic, signal, or signs, smoothly come to a complete stop\nwithout skidding behind the stop line, crosswalk, or stop sign (whichever comes first.) A safe gap\nwhen stopping behind another vehicle is to stop where you can see the vehicle\u2019s rear tires ahead of\nyou. Keep the front wheels aimed straight ahead.\nAfter turning, ensure you complete the turn in the correct lane and your turn signal has been cancelled. Accelerate to the speed of traffic, use your turn signal, check your blind spots by looking over\nyour shoulder (head check), check your mirrors, and move into the right-most lane when it is safe to\ndo so (if you are not already there.)\nRIGHT TURNS\n\u2022 Signal right for two seconds.\n\u2022 Perform a head check over your right shoulder.\n\u2022 While turning perform a traffic check looking for pedestrians and other objects.\n\u2022 Do not cut the corner or make a wide turn.\n\n36\n\n\u2022 Maintain a safe speed while turning.\n\u2022 As you complete the turn, accelerate smoothly up to the posted speed.\nLEFT TURNS\n\u2022 Signal left for two seconds.\n\u2022 Perform a head check over your left shoulder.\n\u2022 While turning, perform a traffic check by looking for pedestrians and other objects.\n\u2022 Do not cut the corner or make a wide turn.\n\u2022 Maintain a safe speed while turning. As you complete the turn, accelerate smoothly up to the\nposted speed.\nMULTIPLE LANES\n\u2022 Identify and enter the lane from which you will turn.\n\u2022 Stay in that lane until the turn is completed.\nA person may not operate a vehicle over, across, or within any part of an island.\nTWO-POINT TURN\nA street alley or driveway can be used to turn around when you cannot drive around the block.\nFORWARD TWO-POINT TURN\n\u2022 Check that there is no oncoming traffic and signal a left turn.\n\u2022 Move close to the center of the road and turn into the driveway or alley.\n\u2022 Turn as near as possible to the right side of the drive.\n\u2022 Stop as the vehicle\u2019s rear clears the curb or edge of the driveway.\n\u2022 Check for traffic, signal a right turn, and shift to reverse.\n\u2022 When path is clear, back up while turning the steering wheel quickly to the right.\n\u2022 Straighten your wheels and stop when you are centered in the lane.\n\u2022 Shift to drive, cancel your signal, and drive away.\nREVERSE TWO-POINT TURN\n\u2022 Check that there are no vehicles behind you.\n\u2022 Signal a right turn.\n\u2022 Drive one car length past the driveway or alley.\n\u2022 Put your right arm on the seat and look back over your right shoulder.\n\u2022 Back into the driveway.\n\u2022 Shift to drive and check traffic.\n\u2022 When clear, signal left, turn left into the proper lane, and drive away.\nTHREE-POINT TURN\nUse this only if the road is too narrow for a U-turn. It\u2019s best to go around the block if you can. This\nshould only be used on a two-lane road.\n\n37\n\n\u2022 Check the mirrors, head check, and signal a right turn.\n\u2022 Stop on the right side of the road.\n\u2022 Turn on left turn signal, check traffic, and head check over your left shoulder.\n\u2022 When traffic is clear, turn hard left, drive to the other side of the road, and stop.\n\u2022 Shift to reverse.\n\u2022 Check traffic and head check over both shoulders.\n\u2022 When traffic is clear, turn hard right and back up.\n\u2022 Put your foot on the brake and shift to drive.\n\u2022 Check traffic and head check.\n\u2022 When traffic is clear, merge into the traffic flow and accelerate smoothly.\nU-TURNS\nNever make a U-turn on any curve near the top of a hill where you cannot see or be seen from both\ndirections for 500 feet, where prohibited by an official traffic control device, on a railroad track, railroad\ngrade crossing, or a freeway.\nEach city has its laws concerning U-turns. Be sure you know the specific law of the city in which you\nare driving. A U-turn should only be made on a street or highway sufficiently wide enough to allow a\nturn to be made from the left-hand lane or just right of the center line or center of the street.\n\u2022 Signal in the direction you are going to initiate the U-turn.\n\u2022 Perform a head check over your shoulder in that direction.\n\u2022 When traffic is clear, perform a traffic check while completing the turn.\n\u2022 Continue down the road in the new direction.\n\u2022 Cancel signal.\n\n38\n\nSECTION 9: Rules of the Road\nA. FLEX LANES\nA flex lane may be used during rush hours. The lanes may have double-dashed\nyellow lines to either side. Signals above the lanes show which lane is safe to travel. Some travel lanes are designed to carry traffic in one direction at certain times\nand in the opposite direction at other times. Before entering the lane, check to see\nwhich lanes can be used at that time. A green arrow means you can use the lane.\nA red X means you cannot use the lane.\n\nB. FREEWAY DRIVING\n\nA freeway gets us where we are going faster\nand safer than ever. However, freeway driving is a skill in itself. People drive faster, and\nconditions are not the same as when driving\nnormally.\nWHEN DRIVING ON THE FREEWAY:\n\u2022 You should always maintain at least two\nseconds following distance behind the vehicle ahead of you. Under adverse conditions, the\ntime needs to be increased.\n\u2022 Do not make U-turns on the freeway\u2014it is illegal.\n\u2022 Do not drive in the emergency lane\u2014the area of the freeway on the outside of the solid white\nline is for emergency use only. Passing another vehicle or stopping to pick up passengers in\nthis lane is illegal.\n\u2022 You should generally drive at a speed similar to that of other cars around you. However, you\nmay not legally drive faster than the posted speed limit. This also applies to getting off of the\nfreeway.\n\u2022 Do not use an entrance ramp to exit the freeway\u2014it is illegal, even in a traffic jam.\n\u2022 Do not pass unless it is safe.\n\u2022 A vehicle traveling in the left lane must move safely to the right when approached from behind\nto prevent impeding traffic.\n\u2022 Change lanes only to pass, get off the freeway or enter the correct lane for an upcoming route\nseparation in the freeway.\nNote: You can be issued a citation for impeding traffic if a vehicle is following behind you in the left\nlane of travel on a multi-lane highway and you do not change lanes and allow the other vehicle to\npass.\n\n39\n\nCARPOOL (EXPRESS) LANE\nExpress lanes are travel lanes on I-15 dedicated for high-occupancy vehicles. The\nexpress lanes may be used as a carpool lane for those vehicles with two or more\npersons for free. Motorcycles, buses, and vehicles with registered clean fuel vehicle\ndecal (C decal) may also use the express lane free of charge.\nIt is illegal to cross a double white line. Moving in and out of the carpool lane is not\nallowed except in specific locations (called access points) with white dotted striping\nrather than solid lines. Access points are about 3,000 feet long and located at nearly\nevery interchange along the express lanes. Vehicles are recommended to exit the\nexpress lanes one interchange before the desired exit.\nNote: When being followed by an emergency or police vehicle with flashing lights, it is permissible,\nwhen safe to do so, to make a right-hand lane change out of the express lane.\nDrivers of single-occupant vehicles must purchase an express pass through UDOT and have an\nactive account connected to a credit or debit card to utilize the express lanes. Express pass transponders mounted to the windshield are read at various locations throughout the I-15 express lanes\ncorridor. These readers automatically charge users\u2019 accounts based on the current express lanes\nrate and distance traveled.\nC DECALS\nC decals allow limited single-occupant clean fuel vehicles to use the express lanes without paying a\ntoll after a one-time $10 registration fee. The decals are small stickers placed inside the windshield\nto the right of the rearview mirror. Only certain clean fuel vehicles are eligible for C decals. For a\nlist of qualifying vehicles and information on how to apply for a C decal, visit the Utah Department of\nTransportation (UDOT) website.\nENTERING A MULTI-LANE HIGHWAY\nWhen on a multi-lane highway, you should use the acceleration\nlane to match your speed with other vehicles before pulling onto\nthe roadway. Find a gap in traffic, merge with the traffic, and cancel your turn signal.\nEXITING A ROADWAY\nWhen exiting a roadway, you should plan ahead to make a safe\nexit. Move to the exit lane early to avoid making a quick lane\nchange, and keep a steady speed as long as you are on the main\nroad. Signal, move to the exit or deceleration lane, and slow the\nexit speed. Check for posted speed in the exit or deceleration\nlane and cancel your signal.\nRAMP METERS\nThe population growth in Utah has increased the number of vehicles using our freeways, creating\nmore frequent congestion and unpredictable travel times. Ramp meters help prevent slowdowns\nand \u201cstop-and-go\u201d conditions that freeway travelers frequently encounter at certain times of the day.\nThere are currently some ramp meters along the Wasatch front.\nRamp meters look almost like traffic signals you see at intersections, except they only have red and\ngreen lights that alternate. Ramp meters are placed on the freeway on-ramps, and allow only one\n\n40\n\n(unless posted differently) vehicle to pass each time the green light comes on.\nRamp metering occurs only when many vehicles are attempting to enter the freeway. A lighted \u201cmeter on\u201d sign at the entrance to an on-ramp will indicate when ramp metering is in effect. If the \u201cmeter\non\u201d sign is not illuminated, drivers can enter the freeway as usual. Because the \u201cmeter on\u201d sign is at\nthe entrance to the freeway on-ramp, drivers will be able to decide whether to enter the on-ramp or\ntake an alternate route and avoid having to stop for the ramp meter.\nRUNAWAY VEHICLE RAMPS\nYou may NOT use a runaway vehicle ramp unless you are in an emergency requiring the use of the\nramp to stop your vehicle. You are prohibited from stopping, standing, or parking on a runaway vehicle ramp or in the pathway of a runaway vehicle ramp.\nSINGLE-POINT URBAN INTERCHANGE\nSingle-point urban interchanges are becoming more common\nin constructing freeway interchanges today. It is a type of interchange located either above or underneath the freeway. It is\ndesigned so that the intersecting off-ramps and on-ramps are\ndiagonally adjacent to each other.\nThese interchanges can be confusing. However, some things\nmay help drivers when passing through a single-point urban interchange. Dash lines have been added to these interchanges to guide drivers into the proper lanes.\nThere are also \u201cwrong way\u201d signs on the off-ramps and on-ramps to help drivers avoid entering a\nramp against traffic.\nIt is legal to make a U-turn from the off-ramp at a single-point urban interchange and re-enter the\nfreeway as long as you face a green arrow when you begin the maneuver. When you re-enter the\nfreeway on the on-ramp, you will face a red arrow. The red arrow is intended for the traffic adjacent\nto the light. Do not stop your vehicle in the middle of the intersection; complete the maneuver once\ninitiated.\nIf a power outage occurs, the single-point urban interchange is not handled like a four-way stop. It is\nimportant to proceed with extreme caution and courtesy. Most single-point urban interchanges will be\nsupported by battery backup. However, if there is no a battery backup, an officer will be dispatched\nto the scene as soon as possible for traffic control.\n\nC. INTERSECTIONS\nAt all intersections, slow down and search for traffic controls, oncoming traffic and cross traffic, pedestrians and bicyclists, road conditions, and objects that block your view.\nDo not rely on others to obey traffic signals or signs. They may not yield the right-of-way. Be prepared to avoid a crash.\nBefore moving after a stop, check for traffic and bicyclists. Look left, right, and then left again before\nentering the intersection. When a light turns green, make sure your path of travel is clear and there is\nno cross traffic.\nNever think that another driver will give you any extra space. Do not turn into a lane just because an\n\n41\n\noncoming vehicle has a turn signal on. The driver may plan to turn after they pass you, or they may\nhave forgotten to turn their signal off.\nAs you approach an intersection\u2014check traffic thoroughly in all directions. Brake smoothly and\nevenly and maintain lane position.\nWhen stopping at an intersection\u2014come to a complete stop behind any stop signs, signals, sidewalks, or stop lines. If stopping behind another vehicle, maintain a safe gap. You should be able to\nsee the vehicle\u2019s rear tires ahead of you.\nDriving through an intersection\u2014check traffic thoroughly in all directions. Keep both hands on the\nwheel, slow down, and yield to any pedestrians or traffic in the intersection. Do not change lanes\nwhile proceeding through the intersection.\nOnce through the intersection\u2014continue checking mirrors and traffic behind you. Accelerate\nsmoothly. If there are multiple lanes of traffic, accelerate to the speed of traffic, use your turn signal,\ncheck your blind spots by looking over your shoulder (head check), check your mirrors, and move into\nthe right-most lane when it is safe to do so (if not already there.)\nCONTINUOUS FLOW INTERSECTION LEFT TURN\nWhen making a left turn, watch for signs and a signal directing you\nto turn on the left-hand side of the road. Observe the first traffic\nsignal direction, and proceed when green by crossing the oncoming lanes of traffic. Observe the direction of the second signal,\nwhich will be on the far left of the intersection, and proceed when\ngreen by making your left-hand turn at the intersection.\nWhen traveling through a continuous flow intersection, proceed as\nyou normally would, but watch for another light just past the intersection. It\u2019s possible to encounter a red light here, which allows left-turning cars to cross in front of\nyou.\nCONTINUOUS FLOW INTERSECTION RIGHT TURN\nWhen turning right, yield to traffic, cyclists, and pedestrians. Make\nyour turn, merge with traffic, and keep going. In most intersections, motorists have free-right turn access or can make a righthand turn on a red light after stopping and yielding to oncoming\ntraffic. Free-right turns during a red light are restricted in this\ncontinuous flow intersection, along with a traditional right-on-red.\nMotorists should watch for traffic control signs to know when right\nturns are permitted.\nCONTINUOUS FLOW INTERSECTION FOUR-LEGGED\nA four-legged continuous flow intersection functions as a regular,\ncontinuous flow intersection configuration, but with each leg of the\nintersection operating with displaced left turns instead of only two\nlegs of the intersection. Follow all directions as with a typical continuous flow intersection on all four legs.\n\n42\n\nDIVERGING DIAMOND INTERSECTION\nA particular type of highway interchange is one in which two directions of traffic on the non-freeway road cross to the opposite side\nof the bridge over or under the freeway. It requires traffic on the\nfreeway overpass (or underpass) to briefly drive on the opposite\nside of the road from what they are accustomed to. Eliminating\nmany of the left-turn conflicts at the ramps, improves interchange\nefficiency.\nTHRU-UTURN INTERSECTION\nIt helps to alleviate traffic congestion and improve traffic flow by\neliminating left turn movements at the intersection. Instead, motorists travel through the intersection, make a signalized U-turn at a location removed from the intersection, and return to the intersection,\nwhere they will make a right turn.\n\nD. PAVEMENT MARKINGS\n\nMarks painted on the road give you directions or warnings. They divide lanes and show where you\nmay pass other vehicles or change lanes. They also mark turn lanes and crosswalks. They show\nwhere to stop for signs or traffic signals.\nYELLOW LANE MARKINGS\n\nTwo direction roadway\nTwo direction roadway,\npassing permitted\t\t\npassing permitted when\n\t\t\t\t\ndashed line is on your\n\t\t\t\tside\n\nTwo direction roadway,\npassing prohibited in\nboth directions\n\nWHITE LANE MARKINGS\n\nOne direction roadway\nOne direction roadway,\npassing permitted\t\t\nseparating express lane\n\t\t\t\t\nor carpool lane from general\n\t\t\t\tlanes - crossing prohibited\n\n43\n\nCROSSWALKS AND STOP LINES\nCrosswalks show where pedestrians may cross the road. At a stop sign or signal, you must stop behind the stop line or crosswalk. If crosswalks are not marked, you must stop before the intersection\nor stop sign. You must yield to pedestrians entering or in a crosswalk, even if it is not marked.\n\nSHARED CENTER LEFT TURN LANE\nThere is a shared left turn lane in the middle of the roadway on many\nstreets where making a left turn safely is hard. When using a shared\nleft turn lane, check your mirrors; for vehicles ahead, signal left and\ncheck your left blind spot. Steer smoothly into the shared left turn lane;\nwhen traffic is clear, make your left turn.\nWhen making a left turn from a shared turn lane, you may not enter the\nlane more than 500 feet before making the turn unless the last car is\nmore than 500 feet from the intersection.\n\nE. SPEED\nIn Utah, the basic speed law states that you may never drive faster than is reasonably safe. However, when there is no sign and where no special hazards exist, the following speeds are permitted:\n20 miles per hour:\n\u2022 When passing a school building or grounds during school recess.\n\u2022 While children are going to or leaving school during opening or closing hours or when flashing\nlights are operating.\n25 miles per hour:\n\u2022 In any business or residential area.\n55 miles per hour:\n\u2022 On major highways, as posted.\n65/70/75/80 miles per hour:\n\u2022 On rural interstate highways.\n\u2022 The transition zones in Utah are indicated with pavement markings and additional signs.\nIn addition to the above speed limits, there are times when the law requires that you slow down.\nSome of those times include:\n\n44\n\n\u2022 When approaching and crossing an intersection or railroad crossing.\n\u2022 When approaching and going around a curve.\n\u2022 When approaching the top of a hill.\n\u2022 When traveling on any narrow or winding road.\n\u2022 When special hazards such as people walking beside the road, heavy traffic, or dangerous\nroad conditions exist.\n\u2022 During poor weather conditions. Driving on an icy road at 10 miles per hour or on an open\nhighway on a rainy night at 25 miles per hour may be too fast.\n\u2022 Any time when you cannot see clearly.\n\u2022 In any highway work zone construction, maintenance, or utility work is done.\n\u2022 When approaching any authorized vehicle flashing red, red and white, or red and blue lights.\n\u2022 When speed causes the person to fail to maintain control of the vehicle or stay within a single\nlane of travel.\nOn the other hand, do not drive so slowly that you become a source of danger on the road. Peace\nofficers are allowed to issue you a citation if you are impeding the normal flow of traffic.\n\nF. ROUNDABOUTS\n\u2022 Slow down as you approach the roundabout.\n\u2022 Yield to oncoming traffic, and pedestrians enter when it is clear.\n\u2022 Proceed through the roundabout and signal your intention to exit at the desired street.\n\nG. TRAFFIC CONTROLS\nTraffic controls include traffic signals, signs, and road markings. They also include directions from law\nenforcement, highway workers, and school crossing guards.\n\nH. TRAFFIC SIGNALS\nTraffic lights are usually at intersections. They are red, yellow, and green from top to\nbottom. If traffic lights are horizontal, the red light is on the left, the yellow light is in the\nmiddle, and the green light is on the right. Some locations have single green, yellow, or\nred lights.\nGREEN TRAFFIC LIGHT\u2014you may go through with caution if the way is clear.\nGREEN ARROW LIGHT\u2014vehicles may proceed only in the direction of the arrow after yielding to\nvehicles and pedestrians still in the intersection at the time of the light change.\nYELLOW TRAFFIC LIGHT\u2014the light is about to change to red.\nFLASHING YELLOW TRAFFIC LIGHT\u2014slow down and proceed with caution. Be prepared to stop\nfor any traffic.\n\n45\n\nFLASHING YELLOW ARROW LIGHT\u2014turns are permitted, but first you must yield to oncoming\ntraffic and pedestrians. Oncoming traffic has a green light. Proceed with caution.\nRED TRAFFIC LIGHT\u2014you must stop before entering the intersection. You must wait behind the\nstop line, crosswalk, or intersection until the light turns green. You may turn right on a red light after\ncoming to a complete stop unless posted otherwise.\nFLASHING RED TRAFFIC LIGHT\u2014stop and look both ways before entering the intersection.\nRED ARROW LIGHT (RIGHT TURN)\u2014right turns are prohibited. Stop and remain stopped until an\nindication to proceed is shown.\nRED ARROW LIGHT (LEFT TURN)\u2014left turns are prohibited. Stop and remain stopped until an\nindication to proceed is shown. If, for some reason, the light does not change and you have been\nstranded by the red arrow light (left turn), and it is safe to do so, you may make a left turn from a oneway street onto a one-way street.\n\nI. TRAFFIC SIGNS\nTraffic signs tell you about rules, hazards, and road locations. They also give highway directions and\nshow where road services are.\nRegardless of what the traffic lights may indicate, always obey the instructions of a police officer at\nan intersection. For example, if the light is green and an officer tells you to stop, YOU MUST STOP.\nAlso, even if you want to go straight and an officer indicates that you must turn, you are required to\nturn.\nIf you approach an intersection where the traffic lights are not working, you must first come to a complete stop before entering the intersection and yield the right-of-way to any vehicle on the right unless\notherwise directed by a peace officer.\nA driver turning left may see either the green arrow (protected), the solid green light (permitted), or a\nflashing yellow arrow (permitted) signal.\nGUIDE SIGNS\nSquare or rectangular and are green, brown, or blue. They advise you about intersecting roads and\ndirect you to cities and towns. They mark points of interest and help you find hospitals, service stations, restaurants, and hotels.\nNote: Vandalism and destruction of road signs cost taxpayers thousands of dollars each year and\ncause confusion and unsafe conditions for you and other travelers.\n\n46\n\nRAILROAD CROSSING SIGNS\nMost railroad crossings have signs or signals. A round yellow warning sign with an \u201cX\u201d\nsymbol and black \u201cRR\u201d cautions you to slow down, look, and listen for a train or railroad\nvehicle. Be prepared to stop.\nA white, X-shaped sign with \u201cRailroad Crossing\u201d cautions that a train or railroad vehicle is\ncoming and that you must stop behind the stop line or before the intersection.\nThe number of tracks may be posted at crossings with more than one track. Not all crossings with more than one track have these signs. Always look for multiple tracks, trains, or\nrailroad vehicles at each crossing.\nWhen crossing railroad tracks, look both ways and cross the tracks quickly. Do not stop on the railroad tracks. If a train is crossing, wait until the train is well down the track before you drive ahead.\nIf there are lights and gates, wait until they show it is safe to cross. If you must stop for traffic or a\nsignal, wait at the stop line before the tracks.\nREGULATORY SIGNS\nSquare, rectangular, or may have a unique shape. They are white with black, red, or green letters\nor symbols. These signs tell you about traffic directions, lane use, turning, speed, parking, and other\nspecial situations. Some signs have a red circle with a red slash across the symbol. This means you\ncannot do certain things. Here are a few common regulatory signs that we see.\n\nNo Left Turn\n\nNo Right Turn\n\nNo U-Turn\n\nDo Not Enter\n\nStraight or Turn\nRight\n\nPosted Speed\nLimit\n\nLeft Turn Only\n\nStop\n\nROUTE NUMBER SIGNS\nThe shape and color of route number signs indicate the type of roadway: interstate, U.S., state, city,\ncounty, or local. When planning a trip, use a map to determine the route. During the trip, follow the\nroute signs to avoid getting lost in an unfamiliar area.\n\nInterstate Route\n\nU.S. Route\n\nState Route\n\n47\n\nWARNING SIGNS\nThese signs warn of possible danger ahead. They are usually diamond shaped and yellow with black\nlettering or symbols. Some common signs are.\n\nLane Ends\nMerging Traffic\nAdded Lane\n\t\t\t\t\t\t\t\n\t\t\n\nSharp Curve \t\t\nAhead\t\t\n\nCurvy Road\nAhead\n\nRight Curve\n\t\t\n\nDivided Highway Divided Highway\nBegins \t\t\nEnds\t\t\t\n\nIntersection\nAhead\t\t\n\nSide Road\nAhead\n\nT-Intersection\nNo Passing Zone\nStop Sign Ahead\n\t\t\t\t\t\t\t\t\n\nTraffic Signal\nAhead\t\t\n\nAdvisory Speed\nAround Curve\n\nSchool Crossing\n\t\t\n\nPedestrain\nCrossing\n\nShare the Road Bicycle Crossing\nwith Bicycles\t\t\t\n\nSlippery When\nWet\n\nA yield sign means you must slow down and yield to traffic that has the right-of-way.\n\nThis sign marks a lane that is only for left turning vehicles. It is not for through traffic or\nfor passing other vehicles.\n\n48\n\nTraffic moves only in the direction of the arrow. Do not turn in the opposite direction of\nthe arrow. Never drive the wrong way on a one-way street.\nWORK ZONE SIGNS\nDiamond or rectangular and orange with black letters or symbols. These signs warn you of work\nzones and people working on or near the road. The warnings include: workers ahead, reduced\nspeed, detours, slow-moving road machinery, or surface changes.\nBarriers keep you from entering closed roads or other areas with danger. If there is a short-term signal, stop at the white line (if there is one.)\nSlow down in work zones and be ready to stop quickly. Do not tailgate. Fines for speeding in a work\nzone are doubled.\n\nFlagger Ahead\nWorkers Ahead\n\t\t\t\t\t\n\nRoad Construction\nAhead\n\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\nOne Lane\t\t\nRoad Ahead\n\nDetour\n\nA flagger may direct traffic in a\nwork zone. You must do as the\nflagger directs.\n\nJ. YIELDING RIGHT-OF-WAY\nRight-of-way rules tell you and other drivers what to do. These rules say who has right-of-way when\n\n49\n\ntwo or more streets come together. They also cover different situations.\nNever think that you have the right of way. Always look at the situation and think about safety.\nYield the right-of-way to:\n\u2022 A driver who is at the intersection before you.\n\u2022 Drivers in the opposite lane when you are making a left turn.\n\u2022 The driver on your right at a four-way stop if both of you arrive at the same time.\n\u2022 Drivers on a public road if you are coming from a driveway or a private road.\n\u2022 Drivers already on an interstate highway if you are on the entrance ramp.\n\u2022 Pedestrians, bicyclists, and others that are still in the intersection.\nRemember, courtesy is the key.\n\n50\n\nSECTION 10: Alcohol/Drugs & Driving\nAlcohol and other impairing drugs are involved in approximately 40% of all traffic crashes in which\nsomeone is killed yearly. If you drink alcohol or use other impairing drugs and drive even a little, your\nchances of being in a crash are much greater than if you did not drink any alcohol or use any other\ndrugs.\n\nA. EFFECTS OF ALCOHOL AND DRUGS\nAlcohol and other impairing drugs reduce the following:\n\u2022 Judgment\u2014a brain-centered activity that stores your experiences and knowledge to be used\nquickly when facing a new problem.\n\u2022 Vision\u2014blurs your vision, slows your ability to focus, causes double vision, and reduces the\nability to judge distance, speed, and the movement of other vehicles. Vision is impacted at\n0.02 blood alcohol content (BAC) for all drivers. The most important sense you use in driving\nis vision.\n\u2022 Color distinction\u2014reduces your ability to distinguish colors.\n\u2022 Reaction time\u2014slows your ability to process information and respond to the driving task.\nThe best advice is not to drive a vehicle if you have consumed alcohol or other drugs. Impairment\nstarts with the first drink. Even one drink of alcohol can affect a person\u2019s ability to operate a motor\nvehicle. With one or more drinks in the bloodstream, a person is visibly impaired and could be arrested for driving under the influence of alcohol or other drugs. Never let a friend or relative drive if they\nhave been drinking.\nDrugs and alcohol should not be taken at the same time. Alcohol can have an unpredictable effect on\ndrugs, which will react much differently in your body.\nIMPAIRING DRUGS AND DRIVING\nDrugs can impact your driving and affect your reflexes, judgment, vision, and alertness, like alcohol.\nThese can include:\n\u2022 Illegal\n\u2022 Over the counter\n\u2022 Prescribed drugs\nEMOTIONS\nEmotions can increase your risk by interfering with your thinking ability, creating a lack of attention,\nand interrupting your ability to process information. You may not be able to drive well if you are overly\nworried, excited, afraid, angry, or depressed.\nThere are ways of dealing with your emotions:\n\u2022 If you are angry or worried, give yourself time to cool off. Take a short walk or nap, but stay off\nthe road until the symptoms have passed.\n\u2022 Give yourself extra time for your driving trip. Leave a few minutes early.\n\u2022 Have someone else drive.\n\n51\n\nB. 21 AND UNDER\nIf you are under the age of 21, it is illegal to purchase, possess, and drink alcoholic beverages. Alcohol and other impairing drugs affect people\u2019s ability to perceive their surroundings, react to emergencies, and skillfully operate a motor vehicle. For new drivers learning complex skills, the effects of\nalcohol and other impairing drugs are greater. All states have \u201czero tolerance\u201d laws (no alcohol in the\ncirculatory system) or similar laws for drivers under the age of 21.\nAn individual between the ages of 13 and 20 who are convicted in court for possession or consumption of alcohol or for being in a bar and being underage will have their driver license suspended for\none year for the first offense and two years for the second or subsequent offense as ordered by the\ncourt. If the court orders suspension for a driver under the age of 16, the suspension time will begin\non the date of conviction and extend for one to two years from the 16th birthday.\nNot-a-Drop Act provides that a person under 21 years of age driving with any measurable amount of\nalcohol in their body will have all driving privileges denied for six months for a first offense. A second\nor subsequent offense within 10 years of a prior denial will result in losing driving privileges for two\nyears or until they reach 21, whichever is longer. An individual who has yet to be issued a license will\nbe denied or suspended even though they have yet to obtain a license.\nIf suspended for a Not-a-Drop arrest, the individual must obtain an assessment and recommendation\nfor appropriate action from a substance abuse program to reinstate their driver license. An individual\ncan request an assessment through the local substance abuse authority programs. The division will\nalso accept evidence of completion of a Prime For Life DUI class instead of an assessment and completion from the local substance abuse authority.\n\nC. ALCOHOL AND THE LAW\nIf you are over 0.05 BAC (0.04 for CDL), you violate the law. Utah law also states that driving is a\nviolation if you are impaired to the degree that it is unsafe to operate a vehicle, even if you are under\nthe legal limit.\nOn the first conviction of a DUI for a driver 21 and older, the driver license will be suspended for 120\ndays and two years for a second or subsequent offense.\nUtah\u2019s law allows a peace officer to confiscate your Utah driver license upon arrest, and the division\nwill suspend the license beginning on the 45th day after the date of arrest.\nA plea of \u201cguilty\u201d or \u201cno contest\u201d for a criminal charge of DUI that is held in abeyance by the court will\nnot appear on the Motor Vehicle Report (MVR) unless you hold a CDL license or were operating a\ncommercial motor vehicle at the time you were cited. Although a plea held in abeyance for the DUI\nviolation will not result in suspension or revocation of your regular operator privilege, it will disqualify\nyour CDL privilege. In addition, the abeyance will be considered a \u201cprior offense\u201d in combination with\nsubsequent offenses. This law applies to the following convictions:\n\u2022 Driving under the influence of alcohol or drugs.\n\u2022 Reckless driving.\n\u2022 Automobile homicide.\n\n52\n\nIMPLIED CONSENT LAW\nWhen you drive a vehicle or a motorboat in Utah, it is implied that you will submit to a chemical test of\nyour breath, blood, urine, or oral fluids to determine the alcohol or drug content if asked to do so by a\npeace officer. This is called the implied consent law.\nUtah accepts the results of the chemical tests to help determine whether an individual has been driving or in actual physical control of a vehicle or a motorboat while under the influence of alcohol, drugs,\nor both if an officer arrests you for driving. At the same time, in such a condition, you must submit to\nthe chemical tests selected or designated by the officer.\nIf you refuse to do so, your driver license would be revoked for 18 months for the first offense and 36\nmonths for the second or subsequent offenses. If under 21, the license will be revoked for two years\nfor the first offense, and for the second or subsequent offenses, it would be 36 months or until the age\nof 21, whichever is longer.\nAny time your driver license is suspended/revoked for an alcohol-related offense, you may apply for a\nnew driver license after the suspension/revocation period by paying the reinstatement and the regular\nlicense fees and by taking the required examinations. An additional administrative fee may be required in some cases. If a driver does not comply with the court orders, the court will notify the Driver\nLicense Division, suspending the driver license until the driver has done all that the court ordered.\nMore information regarding DUI license suspensions can be found at dld.utah.gov/dui.\n\nD. ALCOHOL-RESTRICTED DRIVER\nWhen action is taken against a driving privilege for an alcohol-related offense, the driver is placed under an alcohol-restricted status for 2, 3, 5, or 10 years, depending on the number and type of offenses. A lifetime alcohol-restricted status will result when a driver is convicted of automobile homicide or\na felony DUI.\nThe alcohol-restricted status begins on the effective date of revocation or suspension for DUI, alcohol-related reckless driving, impaired driving, homicide, per se arrest, refusal to submit to a chemical\ntest, driving with alcohol in the body while on an alcohol-restricted status, or driving without an ignition\ninterlock device installed in the vehicle while on an ignition interlock restricted device.\nOnce a driver has reinstated the driving privilege following an applicable alcohol offense, the alcohol-restricted status remains in effect for a 2, 3, 5, or 10-year period or lifetime from the effective\ndate of the original suspension or revocation action. Following the reinstatement of the driving privilege, the driver will retain full driving privileges; however, if convicted of driving with any measurable\namount of alcohol during the alcohol-restricted period, the driver license will be revoked for one year.\n\nE. BOATING WHILE UNDER THE INFLUENCE\nIf you operate a motorboat while under the influence of alcohol/drugs, the same laws apply as if you\nwere operating a motor vehicle while under the influence of alcohol/drugs.\nIf you have been drinking any alcoholic beverages, don\u2019t take a chance. Let someone who has not\nbeen drinking alcoholic beverages do the driving.\n\nF. IGNITION INTERLOCK RESTRICTED DRIVER\n53\n\nYour driving privilege will be suspended when you are an ignition interlock-restricted driver. The\nsuspension may be reinstated by installing an ignition interlock device (IID) in your vehicle and paying\nthe required reinstatement fee to the Driver License Division. If the IID is removed from the vehicle\nbefore your ignition interlock driver restriction period ends, your driving privilege will be re-suspended.\nFor a list of certificated ignition interlock system providers, visit dld.utah.gov/IID.\nWhen an individual has been convicted of a first DUI, they are automatically restricted to driving a\nvehicle that has an IID installed for 18 months from the date of conviction or the effective date of the\nlicense suspension or three years if they are under the age of 21 when they are arrested.\nWhen an individual has been convicted of a second or subsequent DUI impaired driving or alcohol-related reckless driving violation, or they have been revoked for refusal to submit to a chemical\ntest after being arrested for driving under the influence, they are automatically restricted to driving a\nvehicle that has an IID installed for two years from the date of conviction or the effective date of the\nrevocation.\nFelony DUI carries a three-year IID restriction, and automobile homicide carries a 10-year IID restriction.\nIf an individual drives a vehicle without an IID installed when restricted, the vehicle may be impounded. In addition, the driver may be cited for violating the interlock-restricted driver (IRD) law. A conviction for violating the IRD law will result in the driver license revocation for one year and an additional\ntwo-year IID restriction from the date of conviction.\nIgnition interlock-restricted drivers are required to have the device monitored at least every 60 days.\nIf a driver fails to have the device monitored or if they attempt to start the vehicle with a measurable\namount of alcohol, the ignition interlock requirement will be extended by 60 days for each occurrence.\n\nG. IMPOUND OF VEHICLE\nIf a driver is arrested for DUI, the officer may have the vehicle or motorboat impounded. If a vehicle\nis impounded, the DMV will notify the owner of the vehicle and provide information on what must be\ndone to get the vehicle out of impound. The impounded vehicle will be released to the owner once\nall requirements have been met and all fees paid. Fees the owner must pay include towing, storage\ncharges, and administrative costs. If an impounded vehicle is not claimed within the allowed time, it\nshall be sold.\nThe court may order the arrested person to pay all fees associated with the impound or reimburse\nanyone who may have paid the fees.\nIf a driver is convicted in court for a violation of DUI, driving with a controlled substance in the body,\nor automobile homicide, and was previously convicted for a felony DUI, a felony drug-related driving\nviolation, or automobile homicide for a violation that occurred after May 1, 2009, and had their license\nsuspended or revoked in connection with the violation, their impounded vehicle may be subject to\ncriminal forfeiture, and may be sold.\nMore information regarding DUI license suspensions can be found at dld.utah.gov/dui.\n\n54\n\nSECTION 11: Distractions and Driving Challenges\nA distraction is anything that takes your mind or body away from driving. Distractions can cause\ncrashes, injuries, and deaths. Not looking at the road or taking your hands off the steering wheel is\ndangerous. Anything that takes your mind away from driving is a hazard.\nAvoid distractions before driving by turning off mobile devices, setting navigation systems, eating and\ngrooming before you leave, and securing all loose items.\nWhen driving:\n\u2022 Do not talk on the phone, and do not text.\n\u2022 Don\u2019t argue with passengers.\n\u2022 Do not eat while driving.\n\u2022 Be sure children are safely buckled up.\n\u2022 Keep pets in a pet carrier, not loose in a vehicle.\n\u2022 Eliminate things that take your mind away from driving.\nSometimes, while driving, you may drop something, lose a contact lens, be stung by a bee, or be distracted in another way. Some people panic when something like this happens. They become more\nconcerned with the problem than about their driving and often run off the road or into the car in front\nof them. Don\u2019t let this happen to you. If you have a problem or there is a distraction, immediately pull\nover to the side of the roadway and take care of the problem.\n\nA. AGGRESSIVE/ROAD RAGE DRIVING\nAggressive driving is when you commit moving traffic offenses so as to endanger other persons or\nproperty; an assault with a motor vehicle or other dangerous weapon by the operator or passenger\nof one motor vehicle on the operator or passengers of another motor vehicle. Don\u2019t get angry when\nother drivers make mistakes or act rudely. Be patient and courteous to others.\nRoad rage is on the rise in Utah. Utah law defines road rage as the commission of a criminal offense\nby:\n\u2022 An operator of a vehicle;\n\u2022 In response to an incident that occurs or escalates upon a roadway; and\n\u2022 With the intent to endanger or intimidate an individual in another vehicle\nThe court may order that your license be suspended for one year on the first conviction.\n\nB. AVOIDING COLLISIONS WITH ANIMALS\nYou can reduce your chances of colliding with an animal by:\n\u2022 Using caution when driving at dawn and dusk when animals are most active.\n\u2022 Being alert when driving on roadways marked with animal crossing signs. These signs are\n\n55\n\nplaced in areas with many animal/vehicle collisions.\n\u2022 Look well down the road and at the sides of the road. Slow down and use caution when approaching animals standing near the roadway; they may bolt or change direction at the last\nminute, and other animals may follow.\n\u2022 Do not swerve to avoid the animal; your risk of personal injury may be greater if you do.\n\u2022 Keep your vehicle under control and in the travel lane.\n\u2022 Watch for dogs and cats in residential areas and try to avoid hitting them.\nIf you need help pull, to the side of the road, turn on your emergency flashers, raise your hood, and\ntie something white or orange on the antenna or left door handle.\n\nC. DESERT DRIVING\nDesert driving is generally done on reasonably good roads with gas, food, water, and accommodations available at convenient intervals. Unless you go off-road, most roads will be paved or gravel.\nExcept during the summer, deserts get hot, with daily temperatures in the 100 degrees Fahrenheit\nrange and low to zero humidity. Some tips to use when driving in the desert:\n\u2022 If you are not used to high temperatures, do not drive through the desert in the summer. If you\nmust drive through the desert in the summer, stay on the freeways and use a vehicle with air\nconditioning.\n\u2022 Always carry enough water for you and your passengers to survive in the desert if your vehicle\nbreaks down.\n\u2022 Carry water for your vehicle\u2019s radiator. The vehicle\u2019s cooling system can be affected, so watch\nthe radiator temperature and coolant levels.\n\u2022 If your vehicle breaks down in the desert, stay with it. Do not wander away from the vehicle\nunless it is to get help from a visible call box on the road or an inhabited building within a few\nminutes\u2019 walk.\n\u2022 When off the freeways or major highways, ensure you have enough gas and water. You can\nnever have enough water and gas while driving in the desert.\n\u2022 Do not take side roads off the freeway or highway unless you know where they go.\n\nD. FATIGUE\nWhen you are physically or mentally tired, that is called fatigue. It can be caused by physical or\nmental strain, illness, or lack of sleep. Fatigue can make you see less clearly. Fatigue can also make\nyour mind and body slow down. When your mind and body slow down, you cannot do things as\nquickly. You may not stop as fast as you need to if a car suddenly stops in front of you. Do not drive\nif you are tired. You do not want to fall asleep while you are driving.\nTAKING A ROAD TRIP\nBefore you take a trip, do the following:\n\u2022 Get enough sleep\u2014most people need 7 to 9 hours to stay awake during the day.\n\u2022 Plan to stop every two hours during long trips to take a break from driving.\n\u2022 Have another person go with you to watch your driving.\n\u2022 Check the labels on your medicine; some will make you sleepy.\n\n56\n\n\u2022 Do not drink alcohol and drive.\n\u2022 Do not take other drugs when you drive.\nWays to avoid fatigue:\n\u2022 If you start to feel tired, stop driving, pull off at an exit or rest area and take a 20-minute power\nnap, or find a place to sleep for the night.\n\u2022 Do not drive late at night.\n\u2022 Driving is hard mental work; you will have a much better trip if you are rested and ready.\nWarning signs of drowsiness:\n\u2022 Can\u2019t remember the last few miles driven.\n\u2022 Hit a rumble strip or drift from your lane.\n\u2022 Keep pulling the vehicle back into the lane.\n\u2022 Thoughts are wandering and disconnected.\n\u2022 Yawn repeatedly.\n\u2022 Have difficulty focusing or keeping your eyes open and your head up.\n\u2022 Tailgate or miss traffic signs.\n\u2022 Narrowly missed crashing.\n\nE. FLOODING\nFlooding can occur when streams and rivers flow over their banks, dams or levees break, runoff from\ndeep snow, or heavy rainfall. Floodwaters can be found on roads, bridges, and low areas. Flash\nfloods can come rapidly and unexpectedly. They can occur within a few minutes or hours of excessive rainfall.\nDo not drive through flooded areas:\n\u2022 If you see a flooded roadway ahead, turn around and find another route to get to your destination.\n\u2022 Be cautious, especially at night, when visibility is limited.\n\u2022 Six inches of water will reach the bottom of most passenger cars, causing loss of control or\npossible stalling.\n\u2022 Two feet of moving water can carry away most vehicles, including sport utility vehicles and\npick-up trucks.\n\u2022 If the water appears shallow enough to cross, do not attempt to cross a flooded roadway. Water can hide dips, or worse, floodwaters can damage roadways by washing away the underlying road surface.\n\u2022 If there is no other route, proceed to higher ground and wait for the waters to subside.\n\nF. HANDHELD WIRELESS COMMUNICATION DEVICE (HWC)\nA person may not use an HWC device while operating a moving motor vehicle on a highway in this\nstate to manually write, send, or read a written communication, including: a text message, instant\nmessenger, electronic email, dial a phone number, access the internet, view or record a video, take a\n\n57\n\nphotograph, or enter data into a wireless communication device.\nUtah law allows drivers over 18 years of age to talk on an HWC device while driving as long as voice\ncommands are used to connect to a call. When using hands-free and voice-activated technology, the\nlaw allows using GPS functions, reporting safety hazards, criminal activity, and medical emergencies.\nDrivers under the age of 18 may only use an HWC device while operating a motor vehicle during a\nmedical emergency, reporting a safety hazard, reporting criminal activity, or communicating with a\nparent or legal guardian.\nA person convicted of a texting violation is guilty of a Class C misdemeanor with a maximum fine of\n$100 or a Class B misdemeanor if they inflict bodily injury or have a previous violation for this offense.\nOfficers may pull a driver over if they observe a driver texting, etc.\n\nG. HIGHWAY WORK ZONES\nHighway work zones are those portions of a street or highway where\nconstruction, maintenance, or utility work is being done to the road, its\nshoulders, or any other items related to the roadway. This includes\nunderground and overhead utility work, tree trimming, and surveying\nactivities. Highway work zones are easily recognized by the presence\nof orange signs and other orange traffic control devices, flashing lights on equipment, and workers dressed in highly visible clothing.\nEach year, nearly a thousand people are killed, and thousands are injured as a result of crashes in highway work zones. Some of these are highway workers, flaggers, or law enforcement officials. However, over 80% of the fatalities and injuries are suffered by drivers, passengers,\nand pedestrians. Many of these work zone crashes are preventable.\nHighway workers are trained to set up safe work zones with directional traffic\nsigns and devices. Motorists and pedestrians are responsible for knowing how\nto read and react to these directions. Paying attention and driving cautiously and\ncourteously are the most critical steps in preventing crashes while driving through\nhighway work zones.\nWork zones may involve lane closings, detours, and heavy equipment moving on\nor near the road. Watch out for signs, cones, barrels, large vehicles, and workers\nin work zones. Work zone signs have an orange background and black letters\nor symbols. Always slow down even if there are no workers. Narrow lanes and\nrough pavement can be dangerous.\nThe courts are required to fine a driver who speeds in a highway construction zone at least twice the\namount of the regular fine for speeding.\nSlow down in a work zone, increase your following distance, and be prepared to stop. Be careful\nwhen driving through a work zone at night, even if no workers are there. Stay well away from workers and construction vehicles. Obey the posted work zone signs until you see \u201cend road work.\u201d Expect delays, plan to leave early, and finish your trip on time. If possible, use a different route to avoid\nwork zones.\n\n58\n\nH. LIGHTNING\nOnly a hard-topped vehicle will protect you in a lightning storm. Make sure all doors are closed\nand windows are up. Do not touch any metal surfaces. Do not use radios connected to an external antenna mounted on the vehicle. Otherwise, the safest place during a thunderstorm is inside a\nwell-constructed building with plumbing and electric wiring.\n\nI. MOUNTAIN DRIVING\nMountain driving can be very different from normal driving conditions. Some hazards you should be\naware of are steep hills, wildlife, rocks in the roadway, and changing weather conditions. Gravity\nplays a significant role in mountain driving because it slows your vehicle down on an upgrade. You\nneed to use lower gears to drive up hills and steep mountains. When coming down steep hills or\nmountains, gravity causes the speed of your vehicle to increase. Therefore, you must select a safe\nspeed, use proper braking techniques, and use a low gear.\nYou should try to plan and obtain information about any long steep grades along your planned travel\nroute. If possible, speak to other drivers familiar with the grades to determine safe speeds. Here are\nsome more tips to use when driving up hills or mountains:\n\u2022 If your vehicle experiences difficulty traveling up steep roadways, pull off the road at a safe\nplace or stay in the right lane to allow other vehicles to pass.\n\u2022 Pay special attention to speed limit signs and warning signs, such as warnings about curves,\nsteep hills, or other hazards.\n\u2022 If a speed limit is posted or a sign indicates maximum safe speed, never exceed the speed\nshown.\n\u2022 You must yield to vehicles going uphill if traveling downhill on a narrow road.\n\u2022 Do not coast downhill by shifting into neutral or disengaging the clutch.\n\u2022 Stay close to the right edge of the road to avoid oncoming traffic.\n\u2022 Sound the horn when approaching any sharp curve on a narrow road where the view is obstructed.\n\nJ. NIGHT DRIVING\nDriving at night is more complex and dangerous than driving in daylight. The distance you can see is\nlimited:\n\u2022 Ensure the headlights and taillights of the vehicle are illuminated.\n\u2022 If your vehicle is being operated on a highway at any time from sunset to sunrise, or when persons and vehicles on the highway are not clearly discernible at a distance of 1,000 feet ahead\ndue to insufficient light or unfavorable atmospheric conditions.\n\u2022 If your vehicle\u2019s high beam lights are on and a car is coming toward you, dim your lights before\nyou get within 500 feet of the oncoming car.\n\u2022 Dim your high beams for oncoming traffic. If an oncoming vehicle does not dim, look at the\nright side of the road. This helps avoid being blinded by the headlights.\n\u2022 If you are following a car, dim your lights when you are within 300 feet of the vehicle ahead of\nyou.\n\n59\n\n\u2022 Use your lights any time conditions keep you from seeing 1,000 feet ahead.\n\u2022 Avoid looking directly into headlights.\n\u2022 Keep your eyes searching the road in front of your vehicle and look for dark shapes on the\nroadway. Glance to the right and left to check for the edge of the pavement and hazards on\nthe sides.\n\u2022 Do not wear sunglasses or colored lenses at night. Tinted or colored lenses reduce the light\nyou need for good vision.\n\u2022 Increase your following distance at night by at least two seconds.\n\u2022 The law requires that you drive at a reasonable and prudent speed. That means, especially at\nnight, if you drive the posted speed limit, it may be too fast.\n\nK. RURAL ROADS\nDriving on rural roads can be dangerous. Stay alert, watch for warning signs, and obey the speed\nlimit. Some problems and driving hazards are unique to rural roads.\nGRAVEL OR DIRT\u2014there is less traction on gravel or dirt roads. Slow down and increase your following distance. You may skid when stopping your vehicle.\nNARROW ROADS\u2014rural roads are narrower and may have ditches or drop-offs instead of shoulders. Slow down and center your vehicle in your lane. Look out for oncoming traffic that may be in\nyour lane.\nNARROW BRIDGES AND SINGLE-LANE BRIDGES\u2014the first driver to the bridge has the rightof-way. Take turns crossing the bridge.\nOPEN BRIDGE GRATINGS OR STEEL BRIDGES\u2014reduce your speed, increase your following\ndistance, and keep a firm grip on the steering wheel.\nLIMITED VIEW\u2014wooded areas, crops growing in fields, and steep hills can block your view. In\nthese areas, slow down and be ready to stop.\nUNCONTROLLED INTERSECTIONS\u2014these intersections can be very dangerous. Approach them\nwith caution. Slow down and be ready to stop for crossing or oncoming traffic.\n\nL. SKIDDING\nMost of us think of ice and snow when we think of skidding. Remember that skidding can also happen on wet roads. Your car may start to hydroplane at speeds over 35 mph. Hydroplaning occurs\nwhen your front tires ride on water instead of the road. As you go faster, the problem worsens, and\nyou will lose control of your steering.\nIn Utah, we also have a particular problem with black ice. Black ice is difficult to see on the roadway\nand appears more like a wet spot than a patch of ice.\nUnfortunately, many crashes occur each year from skids caused by black ice.\nThe best policy is to keep a skid from happening:\n\n60\n\n\u2022 Slow down to a speed at which you can control the car.\n\u2022 If you do skid, slowly take your foot off the gas pedal.\n\u2022 If your rear wheels skid to the right, turn your front wheels to the right.\n\u2022 If your rear wheels skid to the left, turn your front wheels to the left.\n\u2022 Do not steer too far, though, as that will make the car skid in the other direction.\n\u2022 Do not slam on your brakes.\n\u2022 Once your car regains traction, straighten out your wheels.\n\nM. TRIP PLANNING\nTo prepare a vehicle for any trip, check the important mechanical components such as windshields\nand windows, lights, tires, all fluid levels, belts, hoses, and brakes. Get a good night\u2019s sleep the night\nbefore the start of the trip.\nBefore going on a trip, consider the time of day to avoid congestion in city areas. Have a plan for the\nroute, including the route number and entrance and exit numbers of the final destination. Consider\nrest stops, fuel stops, food stops, and potential construction areas.\n\nN. VEHICLE SUBMERGED UNDERWATER\nIf you are in a crash and your vehicle enters a pond, lake, river, or other body of water, you should\nremain calm and assess the situation:\n\u2022 If your vehicle enters water, it will only float on the surface for 30 to 60 seconds so immediately\nattempt to get out of the vehicle.\n\u2022 First, remove your safety belt.\n\u2022 Lower the window, and climb onto the vehicle\u2019s top.\n\u2022 Before trying to swim away, assess the current of the water.\nIf the vehicle is sinking quickly and you cannot open the door or window, you will have to wait for the\npressure to equalize:\n\u2022 Take off heavy clothing that will cause you to sink, but keep your shoes on in case you have to\nkick the window to escape.\nIf you cannot open the door or window, there will be a small air pocket near the part of the vehicle that\nis highest in the water. If you can\u2019t get a side window open, take a breath and kick the window out.\nGo to the air pocket for one more breath and then escape.\n\nO. WEATHER\nHOT WEATHER\nWhen driving in very hot weather, pay special attention to these items:\nTIRES\u2014check the tire mounting and air pressure. Inspect the tires every two hours or every 100\nmiles. Air pressure increases with the temperature. Do not let the air out; the pressure will be too low\nwhen the tires cool off.\n\n61\n\nENGINE OIL\u2014the engine oil helps keep the engine cool. Make sure there is enough oil. If you have\nan oil temperature gauge, ensure the temperature is within the proper range while driving.\nENGINE COOLANT\u2014ensure the engine cooling system has enough water and antifreeze before\ndriving. When driving, check the water temperature or coolant temperature gauge occasionally.\nMake sure that it remains in the normal range. If the gauge goes above the highest safe temperature,\nsomething wrong may lead to engine failure and possibly fire. Stop driving as soon as safely possible\nto find out what is wrong.\nWATCH FOR BLEEDING TAR\u2014tar in the road pavement frequently rises to the surface in hot\nweather. Spots where tar bleeds to the surface can be slippery, so use caution when you see them.\nCOLD WEATHER\nWinter is the most challenging driving season. There are fewer hours of daylight and you can encounter conditions such as: fog, stormy weather, snow, or ice. Use your low beams to avoid glare in\nfog, rain, or snow. Before winter weather arrives, make sure your vehicle is in good condition and has\ngood snow tires. Put them on the vehicle before the first snowfall. For front-wheel drive vehicles, it is\nbest to put snow or \u201call-season\u201d tires on all four wheels, not just the front. Snow tires with metal studs\nmay be used from October 15 through March 31 of each year.\nDuring ice or snowstorms, especially when a weather advisory is issued, do not drive unless it is\nessential. If you must drive, first clear the ice and snow from your vehicle, including the headlights,\ntaillights, windshield wipers, and all windows. Use a freeze-resistant cleaning solution for the wipers\nand that the reservoir is filled adequately.\nEven if your vehicle has good traction in ice and snow, drive slowly. Other drivers will be traveling\nwith caution. Do not disrupt the traffic flow by driving faster than everyone else. When sleet, freezing rain or snow starts to fall, remember that bridges, ramps, and overpasses are likely to freeze first.\nAlso, be aware that slippery spots may remain after road crews have cleared the roadways.\nAn emergency on the road can happen at any time. Be prepared with a survival kit that should always remain in the vehicle and replenished after each use. Supplies include a properly inflated spare\ntire, a shovel, jumper cables, tow and tire chains, a bag of salt or sand, and a tool kit. Working flashlight and extra batteries, reflective triangles and brightly colored cloth, compass, first aid kit, exterior\nwindshield cleaner, ice scraper, snow brush, matches in a waterproof container, blankets, woolen\ngloves, socks, hat, water, and non-perishable foods that give you energy such as unsalted canned\nnuts, dried fruits, and hard candy.\nIf you become stranded while traveling in cold weather, stay with your vehicle. Do not leave your\nvehicle unless you know exactly where you are and how far it is to help. Most deaths under these circumstances occur when people get out of their vehicles, become lost, and suffer prolonged exposure\nto the cold. Stay calm, wait for help to arrive, and use the following tips:\n\u2022 Turn on your hazard warning lights.\n\u2022 To attract attention, light two flares and place one at each end of the vehicle a safe distance\naway. Hang a brightly colored cloth from your driver-side window, mirror, or door handle.\n\u2022 Keep the exhaust pipe clear of snow and debris. Fumes from the exhaust can leak into the\nvehicle and can cause you to black out or even cause death.\n\u2022 Run the engine and heater until the vehicle is reasonably warm, then turn it off. Repeat this\nprocess as long as fuel is available. Running the engine for approximately 10 minutes each\n\n62\n\nhour to charge the battery and warm the interior is recommended.\n\u2022 Even in frigid temperatures, leave at least one window open to let fresh air in. Occupants of\nan idling vehicle can suffer carbon monoxide poisoning if ventilation is inadequate, and heavy\nsnow and ice can seal a vehicle shut.\n\u2022 At least one person in the vehicle should remain awake at all times.\n\u2022 To protect yourself from frostbite and hypothermia, use blankets to keep warm.\nIn freezing weather, several things can happen to your brakes:\n\u2022 They may be ineffective for several hundred feet, then suddenly grab as the friction dries out\nthe brakes.\n\u2022 All moving parts can freeze solid, resulting in the complete loss of brakes.\n\u2022 The brakes may not release once they are applied.\n\u2022 To help prevent problems from occurring, lightly touch your brakes occasionally.\n\n63\n\nSECTION 12: Crashes and Insurance\nIf you are involved in a crash\u2014stop immediately. You may be penalized severely for not remaining at\nthe scene of a crash in which you are involved. Your driver license may be suspended or revoked for\nup to one year. In addition, you may receive a jail sentence of up to one year, a fine of up to $2500,\nor both.\nYou are required to render reasonable assistance to any person injured in the crash, including transporting or making arrangements for transporting the injured person to a physician or hospital for\nmedical treatment if it is apparent that treatment is necessary or the injured person requests transportation. Avoid moving anyone who appears to be seriously injured unless such action is necessary to\nprevent further injury.\nNote: It is a third-degree felony for a person to fail to stop at the scene of an injury crash.\nIf the crash results in property damage only and there are no injuries, the law allows for the operator\nof a vehicle with knowledge that the operator was involved in, or who has reason to believe that the\noperator may have been involved in, an accident resulting only in damage to another vehicle or other\nproperty; may move the vehicle as soon as possible out of the travel lanes on any roadway to an adjacent shoulder, the nearest suitable cross street, or other suitable location that does not obstruct traffic; or off the freeway main lines, shoulders, medians, or adjacent areas to the nearest safe location\non an exit ramp shoulder, a frontage road, the nearest suitable cross street, or other suitable location\nthat does not obstruct traffic; and shall remain at the scene of the accident or the location described\nuntil all other requirements are fulfilled.\nIf the crash results in injuries, death, or at least $2500 in total property damage, you must notify law\nenforcement (911) immediately. This rule applies to all crashes, regardless of whether another driver\nwas involved. You may also be requested to provide insurance information to the Financial Responsibility Section, Driver License Division.\nThe following information must be exchanged between drivers or other persons involved in the crash:\n\u2022 Your name and address.\n\u2022 Vehicle registration number.\n\u2022 Your insurance information, including the agent or provider\u2019s name and phone number.\nIf the owner of an unattended vehicle is not available or cannot be found, leave a note providing this\ninformation:\n\u2022 Name and address of the driver of your vehicle.\n\u2022 Vehicle plate number of the vehicle that caused the crash.\nNote: The operator of a vehicle that provides the information required to a police officer at the scene\nof the crash is exempt from providing the information to other persons involved.\n\nA. DEFENSIVE DRIVING\nJust knowing the rules of the road is not enough. You need to develop particular skills for special\nsituations. One skill that is useful in all situations; however, is defensive driving. D
