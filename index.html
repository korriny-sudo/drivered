<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utah Driver's Test Prep</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1923; color: #f0f0f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  #root { display: flex; flex-direction: column; align-items: center; padding: 0 16px 48px; }

  .hdr { width: 100%; max-width: 720px; padding: 22px 0 10px; border-bottom: 3px solid #f5c518; margin-bottom: 22px; }
  .eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #f5c518; font-weight: 700; margin-bottom: 3px; }
  .page-title { font-size: 22px; font-weight: 800; color: #fff; }
  .hdr-row { display: flex; justify-content: space-between; align-items: center; }

  .card { background: #1c2a38; border-radius: 12px; padding: 22px 18px; width: 100%; max-width: 720px; margin-bottom: 13px; }
  .card-dark { background: #131f2c; }
  .card-darker { background: #111e2b; border: 1px solid rgba(245,197,24,0.16); cursor: pointer; }

  .btn-yellow { background: #f5c518; color: #0f1923; border: none; border-radius: 8px; padding: 11px 24px; font-size: 14px; font-weight: 800; cursor: pointer; }
  .btn-ghost { background: transparent; color: #f5c518; border: 2px solid #f5c518; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-exit { background: none; border: none; color: #6a7f94; cursor: pointer; font-size: 13px; }
  .btn-muted { background: transparent; color: #6a7f94; border: 2px solid #3a5060; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 700; cursor: pointer; }

  .topic-chip { padding: 7px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
  .chip-active { background: #f5c518; color: #0f1923; }
  .chip-inactive { background: #263545; color: #8a9bb0; }

  .badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 9px; border-radius: 4px; margin-bottom: 13px; }

  .progress-bar { width: 100%; max-width: 720px; margin-bottom: 14px; }
  .progress-track { background: #263545; border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: #f5c518; border-radius: 4px; transition: width 0.3s; }
  .progress-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 12px; color: #5a7090; }

  .q-text { font-size: 16px; font-weight: 700; line-height: 1.5; margin-bottom: 14px; color: #fff; }

  .option-btn { width: 100%; background: #263545; border: 2px solid #263545; border-radius: 8px; padding: 11px 13px; text-align: left; cursor: pointer; color: #c0d0e0; font-weight: 400; font-size: 14px; line-height: 1.4; display: flex; gap: 9px; margin-bottom: 8px; font-family: inherit; }
  .option-btn:hover:not(:disabled) { border-color: #4a6070; }
  .option-correct { background: #172917 !important; border-color: #5cb85c !important; color: #7ee87e !important; font-weight: 700 !important; }
  .option-wrong { background: #291717 !important; border-color: #e05c5c !important; color: #e87e7e !important; font-weight: 700 !important; }
  .option-dim { color: #3a5060 !important; }
  .option-selected { background: #162640 !important; border-color: #f5c518 !important; color: #f5c518 !important; font-weight: 700 !important; }

  .opt-letter { min-width: 18px; font-weight: 800; opacity: 0.5; }

  .explain-btn { background: #1a2f4a; border: 2px solid #4a7ab5; border-radius: 8px; padding: 9px 16px; color: #7ab5f5; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 7px; font-family: inherit; margin-bottom: 14px; }
  .explain-loading { background: #1a2f4a; border-radius: 8px; padding: 12px 14px; border: 2px solid #4a7ab5; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .explain-box { background: #111e2b; border-radius: 8px; padding: 13px 15px; border: 2px solid #4a7ab5; border-left: 4px solid #f5c518; margin-bottom: 14px; }
  .explain-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #f5c518; margin-bottom: 7px; }
  .explain-text { font-size: 14px; color: #c0d8f0; line-height: 1.7; }
  .explain-hint { margin-top: 10px; font-size: 12px; color: #5a7090; font-style: italic; }

  .feedback-box { margin-top: 16px; border-radius: 8px; padding: 11px 13px; }
  .feedback-correct { background: #132013; border-left: 3px solid #5cb85c; }
  .feedback-wrong { background: #201313; border-left: 3px solid #e05c5c; }
  .feedback-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .feedback-text { font-size: 13px; color: #a0b4c8; line-height: 1.6; }

  .dot-nav { width: 100%; max-width: 720px; display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 13px; }
  .dot { width: 27px; height: 27px; border-radius: 5px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; }
  .dot-active { background: #f5c518; color: #0f1923; }
  .dot-done { background: #1e3d1e; color: #5cb85c; }
  .dot-empty { background: #1c2a38; color: #5a7090; }

  .score-big { font-size: 64px; font-weight: 900; line-height: 1; }
  .score-pass { color: #5cb85c; }
  .score-fail { color: #e05c5c; }

  .topic-bar { margin-bottom: 13px; }
  .topic-bar-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .topic-bar-track { background: #263545; border-radius: 4px; height: 5px; }
  .topic-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

  .missed-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #1c2a38; }
  .missed-topic { font-size: 10px; color: #5a7090; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .missed-q { font-weight: 700; font-size: 14px; margin-bottom: 7px; color: #e0eaf4; }
  .missed-wrong { font-size: 12px; color: #e05c5c; margin-bottom: 3px; }
  .missed-right { font-size: 12px; color: #5cb85c; margin-bottom: 6px; }
  .missed-exp { font-size: 12px; color: #8a9bb0; line-height: 1.6; background: #111e2b; padding: 8px 11px; border-radius: 6px; }

  /* Ask page */
  .ask-wrap { width: 100%; max-width: 720px; }
  .msg-user { align-self: flex-end; background: #f5c518; color: #0f1923; border-radius: 16px 16px 4px 16px; padding: 11px 15px; max-width: 85%; font-size: 14px; font-weight: 600; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .msg-ai { align-self: flex-start; background: #1c2a38; color: #d0e4f4; border-radius: 4px 16px 16px 16px; padding: 11px 15px; max-width: 85%; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .msgs { display: flex; flex-direction: column; gap: 11px; min-height: 180px; margin-bottom: 14px; }
  .msgs-empty { text-align: center; padding: 36px 0; color: #3a5060; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #f5c518; animation: blink 1.2s infinite; }
  .typing-wrap { align-self: flex-start; background: #1c2a38; border-radius: 4px 16px 16px 16px; padding: 13px 16px; display: flex; gap: 5px; }

  .input-row { display: flex; gap: 9px; border-top: 1px solid #1c2a38; padding-top: 13px; }
  .ask-input { flex: 1; background: #1c2a38; border: 2px solid #2f3f52; border-radius: 9px; padding: 10px 13px; color: #e0eaf4; font-size: 14px; outline: none; font-family: inherit; }
  .ask-input:focus { border-color: #4a7ab5; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .suggest-chip { background: #1c2a38; border: 1px solid #2f3f52; border-radius: 20px; padding: 6px 13px; font-size: 12px; color: #8a9bb0; cursor: pointer; font-family: inherit; }
  .suggest-chip:hover { border-color: #4a7ab5; color: #7ab5f5; }

  .btn-row { display: flex; gap: 9px; flex-wrap: wrap; }
  .btn-row-center { justify-content: center; }

  @keyframes blink { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// After uploading handbook.txt to GitHub, update this URL to the raw file URL:
// e.g. https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/handbook.txt
const HANDBOOK_URL = "handbook.txt";

// ── DATA ────────────────────────────────────────────────────────────────────
const QUESTIONS = [
  {t:"Motorcycles",q:"To operate a motorcycle on Utah highways, your license must have:",o:["A CDL endorsement","A motorcycle endorsement","A Class A license","A provisional license"],a:1,e:"You must have a motorcycle endorsement on your driver license to legally ride on Utah highways."},
  {t:"Motorcycles",q:"Who must wear a DOT-approved helmet on a motorcycle in Utah?",o:["All riders regardless of age","Only passengers","Anyone under 21","Only riders without an endorsement"],a:2,e:"Any motorcycle operator or passenger under 21 years of age must wear a DOT-approved helmet."},
  {t:"Motorcycles",q:"When following a motorcycle, you should stay at least how far back?",o:["One second","Two seconds","Three seconds","Four seconds"],a:1,e:"Stay at least two seconds behind a motorcycle. Increase distance on wet roads — riders may change speed or direction suddenly to avoid hazards."},
  {t:"Motorcycles",q:"A motorcycle's turn signal is flashing. You should assume:",o:["It is definitely turning","The signal may not have been cancelled — don't assume it's turning","It is slowing down","It is about to stop"],a:1,e:"Many motorcycle turn signals do not self-cancel. Never assume a motorcycle is turning just because the signal is flashing."},
  {t:"Motorcycles",q:"For lane filtering to be legal, the motorcycle must be traveling:",o:["Under 25 mph","15 mph or less","Under 35 mph","Under 20 mph"],a:1,e:"Lane filtering requires: 2+ lanes same direction, speed limit 45 mph or less, motorcycle at 15 mph or less, the passed vehicle completely stopped, and the move can be made safely."},
  {t:"Motorcycles",q:"Is lane filtering permitted on an on-ramp?",o:["Yes at any speed","Yes if under 15 mph","No — not permitted on on-ramps","Only if speed limit is under 35 mph"],a:2,e:"Lane filtering is NOT permitted on an on-ramp. It is allowed on roadways and off-ramps only."},
  {t:"Motorcycles",q:"When sharing the road with a motorcycle you should give them:",o:["Half a lane","An entire lane","At least 3 feet","A full lane only on highways"],a:1,e:"Always give motorcycles an entire lane. Never share the lane — they need the full space to react to road hazards."},
  {t:"Motorcycles",q:"After waiting at a red light 90 seconds with no signal detection, a motorcyclist 16+ may:",o:["Proceed only if waved through","Run the light at any time","Proceed if no vehicles or pedestrians are near","Make a U-turn"],a:2,e:"After a complete stop and 90-second wait with no detection, a rider 16+ may proceed if no vehicles or pedestrians are near."},
  {t:"DUI & Chemical Testing",q:"What is the legal BAC limit for most Utah drivers?",o:["0.08","0.06","0.05","0.04"],a:2,e:"Utah's legal BAC limit is 0.05 for most drivers. CDL holders have a limit of 0.04."},
  {t:"DUI & Chemical Testing",q:"Utah's Implied Consent Law means:",o:["You can choose whether to take a chemical test","By driving in Utah you agree to submit to a chemical test if asked by a peace officer","Officers need a warrant to test your BAC","You only have to test if involved in a crash"],a:1,e:"By driving a vehicle or motorboat in Utah, you automatically agree to submit to a chemical test of breath, blood, urine, or oral fluids if requested by a peace officer."},
  {t:"DUI & Chemical Testing",q:"Who decides which type of chemical test you take?",o:["You do","The peace officer does","Your attorney","The court"],a:1,e:"You must submit to the chemical test selected or designated by the officer — you do not get to choose."},
  {t:"DUI & Chemical Testing",q:"Chemical tests under Utah's Implied Consent Law can be:",o:["Breath or blood only","Blood or urine only","Breath, blood, urine, or oral fluids","Breath, blood, or hair follicle"],a:2,e:"Utah's Implied Consent Law covers chemical tests of breath, blood, urine, or oral fluids."},
  {t:"DUI & Chemical Testing",q:"A driver 21+ refuses a chemical test — first offense. Their license is:",o:["Suspended 90 days","Suspended 120 days","Revoked 18 months","Revoked 36 months"],a:2,e:"Refusing a chemical test results in license revocation for 18 months on the first offense for drivers 21+."},
  {t:"DUI & Chemical Testing",q:"A driver under 21 refuses a chemical test — first offense. License revoked for:",o:["6 months","1 year","2 years","18 months"],a:2,e:"Drivers under 21 who refuse a chemical test on the first offense have their license revoked for 2 years."},
  {t:"DUI & Chemical Testing",q:"After a first DUI conviction (21+), the license is suspended for:",o:["30 days","90 days","120 days","180 days"],a:2,e:"A first DUI conviction results in a 120-day license suspension for drivers 21 and older."},
  {t:"DUI & Chemical Testing",q:"A DUI license suspension begins on what day after arrest?",o:["Immediately","30th day","45th day","60th day"],a:2,e:"Utah law allows an officer to confiscate your license at arrest, but the suspension begins on the 45th day after the date of arrest."},
  {t:"DUI & Chemical Testing",q:"After a first DUI conviction, an IID is required for:",o:["6 months","1 year","18 months","2 years"],a:2,e:"After a first DUI conviction, the driver must drive a vehicle with an IID for 18 months from conviction (or 3 years if under 21 at time of arrest)."},
  {t:"DUI & Chemical Testing",q:"Ignition interlock-restricted drivers must have the device monitored:",o:["Every 30 days","Every 60 days","Every 90 days","Every 6 months"],a:1,e:"Ignition interlock-restricted drivers must have the device monitored at least every 60 days."},
  {t:"DUI & Chemical Testing",q:"The Not-a-Drop law means:",o:["No alcohol allowed in vehicles","Drivers under 21 cannot drive with any measurable alcohol in their body","Spilling alcohol is a fineable offense","CDL drivers cannot drink 8 hours before driving"],a:1,e:"The Not-a-Drop Act: a person under 21 driving with any measurable alcohol will have driving privileges denied — 6 months for a first offense."},
  {t:"DUI & Chemical Testing",q:"Automobile homicide carries what alcohol-restricted status?",o:["3-year restriction","5-year restriction","10-year restriction","Lifetime restriction"],a:3,e:"Automobile homicide results in lifetime alcohol-restricted status, as does a felony DUI conviction."},
  {t:"DUI & Chemical Testing",q:"Felony DUI carries what IID restriction?",o:["18 months","2 years","3 years","10 years"],a:2,e:"Felony DUI = 3-year IID restriction. Automobile homicide = 10-year IID restriction."},
  {t:"DUI & Chemical Testing",q:"Driving while suspended for DUI — your vehicle may be:",o:["Given a citation only","Impounded","Auctioned","Registered elsewhere"],a:1,e:"If you drive while suspended for DUI or refusal of a chemical test, your vehicle may be impounded."},
  {t:"Point System",q:"How many points does reckless driving add?",o:["50","60","75","80"],a:3,e:"Reckless driving adds 80 points — the highest single-violation amount in Utah's system."},
  {t:"Point System",q:"Running a red light adds how many points?",o:["40","50","60","80"],a:1,e:"Running a red light adds 50 points."},
  {t:"Point System",q:"Tailgating (following too closely) adds how many points?",o:["40","50","60","80"],a:2,e:"Following too closely (tailgating) adds 60 points."},
  {t:"Point System",q:"Texting while driving adds how many points?",o:["40","50","60","80"],a:1,e:"Texting while driving adds 50 points."},
  {t:"Point System",q:"A driver over 21 is called for a hearing after how many points in 3 years?",o:["100","150","200","250"],a:2,e:"Drivers over 21 who accumulate 200 or more points within 3 years are called for a hearing."},
  {t:"Point System",q:"A driver under 21 is called for a hearing after how many points in 3 years?",o:["50","70","100","150"],a:1,e:"Drivers under 21 who accumulate 70 or more points within 3 years are called for a hearing."},
  {t:"Point System",q:"Drive one full year with no violations — your points are:",o:["All removed","Cut in half","Reduced by 25","Unchanged until 3 years"],a:1,e:"One full year with no moving violations removes half your total points."},
  {t:"Point System",q:"Drive two full years with no violations — your points are:",o:["Cut in half","Reduced by 75","All removed","Your record is sealed"],a:2,e:"Two successive years without a conviction removes ALL points from your record."},
  {t:"Point System",q:"A defensive driving course can remove how many points?",o:["25","40","50","70"],a:2,e:"Completing a division-approved defensive driving course removes 50 points — allowed once per 3-year period."},
  {t:"Point System",q:"Individual conviction points are automatically removed after:",o:["1 year","2 years","3 years","5 years"],a:2,e:"Points for individual convictions are automatically removed 3 years after the date of violation."},
  {t:"Point System",q:"Speeding adds how many points depending on severity?",o:["20–50","35–75","40–80","50–80"],a:1,e:"Speeding adds 35–75 points depending on severity."},
  {t:"Point System",q:"At a point-system hearing the outcome could be:",o:["Automatic revocation only","Probation, defensive driving, or license denial/suspension","Fine only","Nothing — hearings are informational"],a:1,e:"Based on the hearing you may be placed on probation, required to complete a defensive driving course, or have your license denied/suspended for 1 month to 1 year."}
];

const TC = {
  "Motorcycles": {badge:"#dbeeff", bt:"#1a3a5c"},
  "DUI & Chemical Testing": {badge:"#fde8e8", bt:"#5a1a1a"},
  "Point System": {badge:"#e8fde8", bt:"#1a3a1a"}
};

const TOPICS = ["All Topics","Motorcycles","DUI & Chemical Testing","Point System"];
const LETTERS = ["A","B","C","D"];
const SUGGESTED = [
  "What is the speed limit in a school zone?",
  "When do I need to use my headlights?",
  "What are right-of-way rules at a 4-way stop?",
  "What should I do after a car accident?",
  "How close to a fire hydrant can I park?",
  "What does a flashing yellow light mean?",
  "When can I make a U-turn in Utah?",
  "What are the rules for passing on a two-lane road?"
];

// ── STATE ────────────────────────────────────────────────────────────────────
let state = {
  mode: "home",       // home | study | test | results | ask
  topic: "All Topics",
  questions: [],
  cur: 0,
  sel: null,
  showFeedback: false,
  answers: [],
  testAnswers: {},
  explain: null,
  explaining: false,
  askMsgs: [],
  askInput: "",
  askBusy: false,
  handbookText: "",
  handbookLoaded: false
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ── HANDBOOK FETCH ───────────────────────────────────────────────────────────
async function loadHandbook() {
  try {
    const res = await fetch(HANDBOOK_URL);
    const text = await res.text();
    state.handbookText = text;
    state.handbookLoaded = true;
  } catch(e) {
    state.handbookText = "Handbook text unavailable. Please check the handbook.txt file path.";
    state.handbookLoaded = true;
  }
  render();
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function filtered() {
  return state.topic === "All Topics" ? QUESTIONS : QUESTIONS.filter(q => q.t === state.topic);
}

function countFor(t) { return QUESTIONS.filter(q=>q.t===t).length; }

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function startStudy() {
  setState({mode:"study", questions:shuffle(filtered()), cur:0, sel:null, showFeedback:false, answers:[], explain:null, explaining:false});
}

function startTest() {
  const q = shuffle(filtered()).slice(0, Math.min(20, filtered().length));
  setState({mode:"test", questions:q, cur:0, sel:null, testAnswers:{}, explain:null});
}

function pickStudy(idx) {
  if (state.sel !== null) return;
  const correct = idx === state.questions[state.cur].a;
  setState({sel:idx, showFeedback:true, answers:[...state.answers, {ok:correct}]});
}

function nextStudy() {
  if (state.cur + 1 >= state.questions.length) {
    setState({mode:"results"});
  } else {
    setState({cur:state.cur+1, sel:null, showFeedback:false, explain:null, explaining:false});
  }
}

function pickTest(idx) {
  setState({testAnswers:{...state.testAnswers, [state.cur]:idx}});
}

function submitTest() {
  const ans = state.questions.map((q,i) => ({ok: state.testAnswers[i]===q.a, sel: state.testAnswers[i]??-1}));
  setState({answers:ans, mode:"results"});
}

async function explainQuestion() {
  if (state.explaining || state.explain) return;
  setState({explaining:true});
  const q = state.questions[state.cur];
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:400,
        system:`You are a friendly Utah driver's license exam tutor. Explain the concept behind a test question in plain simple English — like talking to a nervous friend. Short sentences. No jargon. Give a real-world analogy if it helps. Do NOT give away the answer. Just explain the rule or law so they can figure out the answer themselves. Under 120 words.\n\nHandbook:\n${state.handbookText}`,
        messages:[{role:"user", content:`Help me understand this so I can answer it:\n\n"${q.q}"\n\nOptions: ${q.o.join(", ")}`}]
      })
    });
    const d = await res.json();
    const text = d.content?.find(b=>b.type==="text")?.text || "Couldn't load — try again.";
    setState({explain:text, explaining:false});
  } catch(e) {
    setState({explain:"Connection error. Try again.", explaining:false});
  }
}

async function sendAsk(question) {
  if (!question.trim() || state.askBusy) return;
  const msgs = [...state.askMsgs, {r:"u", t:question.trim()}];
  setState({askMsgs:msgs, askInput:"", askBusy:true});
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        system:`You are a Utah driver's license exam tutor. Answer ONLY from the handbook excerpt below. Be clear and concise. If the topic isn't covered say so and suggest checking dld.utah.gov. Highlight key numbers and rules.\n\nUTAH DRIVER HANDBOOK EXCERPT:\n${state.handbookText}`,
        messages:[{role:"user", content:question.trim()}]
      })
    });
    const d = await res.json();
    const answer = d.content?.find(b=>b.type==="text")?.text || "Something went wrong — try again.";
    setState({askMsgs:[...msgs, {r:"a",t:answer}], askBusy:false});
  } catch(e) {
    setState({askMsgs:[...msgs, {r:"a",t:"Connection error. Please try again."}], askBusy:false});
  }
}

// ── RENDER HELPERS ───────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k === "className") e.className = v;
    else if (k.startsWith("on")) e[k.toLowerCase()] = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else e.setAttribute(k, v);
  }
  for (const child of children.flat()) {
    if (child == null) continue;
    if (typeof child === "string" || typeof child === "number") e.appendChild(document.createTextNode(child));
    else e.appendChild(child);
  }
  return e;
}

function div(cls, ...children) { return el("div", {className:cls}, ...children); }
function span(cls, text) { return el("span", {className:cls}, text); }
function btn(cls, text, onClick) { return el("button", {className:cls, onClick}, text); }

function header(eyebrow, title, exitFn) {
  return div("hdr",
    div("eyebrow", eyebrow),
    div("hdr-row",
      div("page-title", title),
      exitFn ? btn("btn-exit", "✕ Exit", exitFn) : el("span",{})
    )
  );
}

function typingDots() {
  const wrap = div("typing-wrap");
  [0,1,2].forEach(i => {
    const d = div("typing-dot");
    d.style.animationDelay = `${i*0.2}s`;
    wrap.appendChild(d);
  });
  return wrap;
}

// ── PAGE RENDERERS ───────────────────────────────────────────────────────────
function renderHome() {
  const filt = filtered();

  // Ask the Handbook card
  const askCard = div("card card-darker");
  askCard.onclick = () => setState({mode:"ask"});
  const askInner = el("div", {style:{display:"flex",alignItems:"center",gap:"13px"}},
    el("div", {style:{fontSize:"32px"}}, "📖"),
    el("div", {style:{flex:"1"}},
      el("div", {style:{fontWeight:"800",fontSize:"16px",color:"#fff",marginBottom:"3px"}}, "Ask the Handbook"),
      el("div", {style:{fontSize:"13px",color:"#5a7090",lineHeight:"1.5"}}, "Ask any driving question — answers come directly from your 2025–2026 Utah Driver Handbook.")
    ),
    el("div", {style:{color:"#f5c518",fontSize:"18px"}}, "→")
  );
  askCard.appendChild(askInner);

  // Topic selector card
  const topicCard = div("card");
  topicCard.appendChild(el("div", {style:{fontSize:"11px",color:"#6a7f94",marginBottom:"13px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "Choose a Topic"));
  const chipRow = div("chip-row");
  TOPICS.forEach(t => {
    const b = btn(`topic-chip ${state.topic===t?"chip-active":"chip-inactive"}`, t, () => setState({topic:t}));
    chipRow.appendChild(b);
  });
  topicCard.appendChild(chipRow);
  topicCard.appendChild(el("div", {style:{fontSize:"12px",color:"#6a7f94",marginBottom:"11px"}}, `${filt.length} questions ${state.topic!=="All Topics"?`on ${state.topic}`:"across all topics"}`));
  const btns = div("btn-row");
  btns.appendChild(btn("btn-yellow", "📖 Study Mode", startStudy));
  btns.appendChild(btn("btn-ghost", `📝 Mock Test (${Math.min(20,filt.length)} Qs)`, startTest));
  topicCard.appendChild(btns);

  // Coverage card
  const covCard = div("card card-dark");
  covCard.appendChild(el("div", {style:{fontSize:"11px",color:"#6a7f94",marginBottom:"13px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "What's Covered"));
  [["🏍","Motorcycles","Endorsements, helmets, lane filtering"],
   ["🚨","DUI & Chemical Testing","Implied consent, BAC, IID, suspensions"],
   ["📊","Point System","Violation points, thresholds, clearing"]
  ].forEach(([icon,label,desc]) => {
    const row = el("div", {style:{display:"flex",gap:"12px",marginBottom:"13px",paddingBottom:"13px",borderBottom:"1px solid #1c2a38"}},
      el("div", {style:{fontSize:"20px"}}, icon),
      el("div", {},
        el("div", {style:{fontWeight:"700",fontSize:"14px"}}, label),
        el("div", {style:{fontSize:"12px",color:"#5a7090",marginTop:"2px"}}, `${countFor(label)} questions · ${desc}`)
      )
    );
    covCard.appendChild(row);
  });

  return [askCard, topicCard, covCard];
}

function renderStudy() {
  const q = state.questions[state.cur];
  const tc = TC[q.t];
  const pct = state.cur / state.questions.length * 100;
  const correct = state.answers.filter(a=>a.ok).length;

  // Progress bar
  const prog = div("progress-bar");
  const track = div("progress-track");
  const fill = div("progress-fill");
  fill.style.width = pct + "%";
  track.appendChild(fill);
  prog.appendChild(track);
  prog.appendChild(el("div", {className:"progress-labels"},
    el("span",{}, `✓ ${correct} correct`),
    el("span",{}, `${state.questions.length - state.cur} left`)
  ));

  // Card
  const card = div("card");

  // Badge
  const badge = div("badge");
  badge.style.background = tc.badge;
  badge.style.color = tc.bt;
  badge.textContent = q.t;
  card.appendChild(badge);

  // Question
  card.appendChild(el("div", {className:"q-text"}, q.q));

  // Explain section (only before answering)
  if (state.sel === null) {
    if (!state.explain && !state.explaining) {
      const xBtn = el("button", {className:"explain-btn", onClick: explainQuestion},
        el("span", {}, "💡"), " Explain this to me first"
      );
      card.appendChild(xBtn);
    }
    if (state.explaining) {
      const xLoad = div("explain-loading");
      const dots = div("", ...([0,1,2].map(i => {
        const d = div("typing-dot"); d.style.animationDelay=`${i*0.2}s`; return d;
      })));
      dots.style.display = "flex"; dots.style.gap = "4px";
      xLoad.appendChild(dots);
      xLoad.appendChild(el("span", {style:{fontSize:"13px",color:"#7ab5f5"}}, "Getting explanation..."));
      card.appendChild(xLoad);
    }
    if (state.explain && !state.explaining) {
      const xBox = div("explain-box");
      xBox.appendChild(el("div", {className:"explain-label"}, "💡 Here's what you need to know"));
      xBox.appendChild(el("div", {className:"explain-text"}, state.explain));
      xBox.appendChild(el("div", {className:"explain-hint"}, "Now pick your answer below ↓"));
      card.appendChild(xBox);
    }
  }

  // Options
  q.o.forEach((opt, idx) => {
    let cls = "option-btn";
    if (state.sel !== null) {
      if (idx === q.a) cls += " option-correct";
      else if (idx === state.sel) cls += " option-wrong";
      else cls += " option-dim";
    }
    const b = el("button", {className:cls, onClick:()=>pickStudy(idx)},
      el("span", {className:"opt-letter"}, LETTERS[idx]),
      el("span", {}, opt)
    );
    if (state.sel !== null) b.disabled = true;
    card.appendChild(b);
  });

  // Feedback
  if (state.showFeedback) {
    const isCorrect = state.sel === q.a;
    const fb = div(`feedback-box ${isCorrect?"feedback-correct":"feedback-wrong"}`);
    fb.appendChild(el("div", {className:"feedback-label", style:{color:isCorrect?"#5cb85c":"#e05c5c"}}, isCorrect ? "✓ Correct!" : "✗ Incorrect"));
    fb.appendChild(el("div", {className:"feedback-text"}, q.e));
    card.appendChild(fb);

    const nextBtn = btn("btn-yellow", state.cur+1>=state.questions.length ? "See Results →" : "Next Question →", nextStudy);
    nextBtn.style.marginTop = "14px";
    nextBtn.style.width = "100%";
    card.appendChild(nextBtn);
  }

  return [prog, card];
}

function renderTest() {
  const q = state.questions[state.cur];
  const tc = TC[q.t];
  const allDone = Object.keys(state.testAnswers).length === state.questions.length;

  // Dot nav
  const dots = div("dot-nav");
  state.questions.forEach((_,i) => {
    let cls = "dot ";
    if (i === state.cur) cls += "dot-active";
    else if (state.testAnswers[i] !== undefined) cls += "dot-done";
    else cls += "dot-empty";
    const d = el("button", {className:cls, onClick:()=>setState({cur:i})}, String(i+1));
    dots.appendChild(d);
  });

  const card = div("card");
  const badge = div("badge");
  badge.style.background = tc.badge; badge.style.color = tc.bt;
  badge.textContent = q.t;
  card.appendChild(badge);
  card.appendChild(el("div", {className:"q-text"}, q.q));

  q.o.forEach((opt,idx) => {
    const isSel = state.testAnswers[state.cur] === idx;
    const b = el("button", {
      className:"option-btn" + (isSel?" option-selected":""),
      onClick:()=>pickTest(idx)
    }, el("span",{className:"opt-letter"}, LETTERS[idx]), el("span",{},opt));
    card.appendChild(b);
  });

  const btnRow = div("btn-row");
  btnRow.style.marginTop = "6px";
  if (state.cur > 0) btnRow.appendChild(btn("btn-ghost","← Back",()=>setState({cur:state.cur-1})));
  if (state.cur < state.questions.length-1) {
    btnRow.appendChild(btn("btn-yellow","Next →",()=>setState({cur:state.cur+1})));
  } else {
    const sub = btn("btn-yellow", allDone?"Submit Test →":`${state.questions.length-Object.keys(state.testAnswers).length} unanswered`, allDone?submitTest:null);
    if (!allDone) sub.style.opacity = "0.45";
    btnRow.appendChild(sub);
  }
  card.appendChild(btnRow);

  return [dots, card];
}

function renderResults() {
  const score = state.answers.filter(a=>a.ok).length;
  const pct = Math.round(score/state.questions.length*100);
  const passed = pct >= 80;

  const byT = {};
  state.questions.forEach((q,i) => {
    if (!byT[q.t]) byT[q.t]={c:0,n:0};
    byT[q.t].n++;
    if (state.answers[i]?.ok) byT[q.t].c++;
  });

  // Score card
  const scoreCard = div("card");
  scoreCard.style.textAlign = "center";
  const big = el("div", {className:`score-big ${passed?"score-pass":"score-fail"}`}, `${pct}%`);
  scoreCard.appendChild(big);
  scoreCard.appendChild(el("div",{style:{fontSize:"14px",color:"#6a7f94",marginTop:"4px"}}, `${score} of ${state.questions.length} correct`));
  scoreCard.appendChild(el("div",{style:{marginTop:"9px",fontSize:"13px",color:passed?"#5cb85c":"#e05c5c",fontWeight:"700"}}, passed?"✓ Passing score (80%+)":"✗ Need 80% to pass"));
  const rb = div("btn-row btn-row-center");
  rb.style.marginTop = "16px";
  rb.appendChild(btn("btn-yellow","Study Again",startStudy));
  rb.appendChild(btn("btn-ghost","Retake Test",startTest));
  rb.appendChild(btn("btn-muted","Home",()=>setState({mode:"home"})));
  scoreCard.appendChild(rb);

  // Topic bars
  const topicCard = div("card");
  topicCard.appendChild(el("div",{style:{fontSize:"11px",color:"#6a7f94",marginBottom:"13px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "Score by Topic"));
  Object.entries(byT).forEach(([t,d]) => {
    const tp = Math.round(d.c/d.n*100);
    const bar = div("topic-bar");
    bar.appendChild(el("div",{className:"topic-bar-row"},
      el("span",{style:{fontWeight:"600",fontSize:"13px"}},t),
      el("span",{style:{fontSize:"13px",color:tp>=80?"#5cb85c":"#e05c5c",fontWeight:"700"}},`${d.c}/${d.n} (${tp}%)`)
    ));
    const track = div("topic-bar-track");
    const fill = div("topic-bar-fill");
    fill.style.background = tp>=80?"#5cb85c":"#e05c5c";
    fill.style.width = tp+"%";
    track.appendChild(fill);
    bar.appendChild(track);
    topicCard.appendChild(bar);
  });

  const nodes = [scoreCard, topicCard];

  // Missed questions
  const missed = state.questions.filter((_,i)=>!state.answers[i]?.ok);
  if (missed.length > 0) {
    const missCard = div("card");
    missCard.appendChild(el("div",{style:{fontSize:"11px",color:"#6a7f94",marginBottom:"13px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "Missed Questions"));
    state.questions.forEach((q,i) => {
      if (state.answers[i]?.ok) return;
      const s = state.answers[i]?.sel;
      const item = div("missed-item");
      item.appendChild(div("missed-topic", q.t));
      item.appendChild(div("missed-q", q.q));
      if (s !== undefined && s !== -1) item.appendChild(div("missed-wrong", `✗ You answered: ${q.o[s]}`));
      item.appendChild(div("missed-right", `✓ Correct: ${q.o[q.a]}`));
      item.appendChild(div("missed-exp", q.e));
      missCard.appendChild(item);
    });
    nodes.push(missCard);
  }

  return nodes;
}

function renderAsk() {
  const wrap = div("ask-wrap");

  // Header
  const hdr = div("hdr");
  hdr.appendChild(div("eyebrow", "Handbook Assistant"));
  hdr.appendChild(el("div",{className:"hdr-row"},
    div("page-title","Ask the Handbook"),
    btn("btn-exit","← Back",()=>setState({mode:"home"}))
  ));
  hdr.appendChild(el("div",{style:{fontSize:"12px",color:"#5a7090",marginTop:"3px"}}, state.handbookLoaded ? "Answers from your 2025–2026 Utah Driver Handbook" : "Loading handbook..."));
  wrap.appendChild(hdr);

  // Suggested chips (only when no messages)
  if (state.askMsgs.length === 0) {
    const chipLabel = el("div",{style:{fontSize:"11px",color:"#5a7090",marginBottom:"9px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "Try asking:");
    wrap.appendChild(chipLabel);
    const chips = div("chip-row");
    SUGGESTED.forEach(s => {
      const c = el("button",{className:"suggest-chip", onClick:()=>sendAsk(s)}, s);
      chips.appendChild(c);
    });
    wrap.appendChild(chips);
  }

  // Messages
  const msgs = div("msgs");
  if (state.askMsgs.length === 0) {
    const empty = div("msgs-empty");
    empty.innerHTML = "<div style='font-size:36px;margin-bottom:8px'>📖</div><div style='font-size:14px'>Ask anything about Utah driving rules</div>";
    msgs.appendChild(empty);
  }
  state.askMsgs.forEach(m => {
    const bubble = div(m.r==="u"?"msg-user":"msg-ai", m.t);
    msgs.appendChild(bubble);
  });
  if (state.askBusy) msgs.appendChild(typingDots());
  wrap.appendChild(msgs);

  // Scroll to bottom after render
  setTimeout(()=>{ msgs.scrollTop = msgs.scrollHeight; }, 50);

  // Input row
  const inputRow = div("input-row");
  const input = el("input", {className:"ask-input", placeholder:"Ask about Utah driving rules...", value:state.askInput});
  input.oninput = e => { state.askInput = e.target.value; };
  input.onkeydown = e => { if(e.key==="Enter") sendAsk(state.askInput); };
  if (state.askBusy) input.disabled = true;

  const askBtn = el("button", {
    className: "btn-yellow",
    onClick: ()=>sendAsk(state.askInput)
  }, "Ask");
  if (state.askBusy || !state.askInput.trim()) { askBtn.style.opacity="0.4"; askBtn.disabled=true; }

  inputRow.appendChild(input);
  inputRow.appendChild(askBtn);
  wrap.appendChild(inputRow);

  return [wrap];
}

// ── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";

  // Add blink keyframe if not already
  if (!document.getElementById("blink-style")) {
    const s = document.createElement("style");
    s.id = "blink-style";
    s.textContent = "@keyframes blink{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}";
    document.head.appendChild(s);
  }

  let nodes = [];

  if (state.mode === "ask") {
    nodes = renderAsk();
  } else {
    // Add shared header for non-ask pages
    const eyebrows = {home:"Utah Driver License", study:"Study Mode", test:"Mock Test", results:"Results"};
    const titles = {
      home:"Test Prep — Study Guide & Mock Test",
      study:`Question ${state.cur+1} of ${state.questions.length}`,
      test:`Question ${state.cur+1} of ${state.questions.length}`,
      results: (()=>{const p=Math.round(state.answers.filter(a=>a.ok).length/state.questions.length*100)>=80; return p?"Great job! 🎉":"Keep at it — you've got this!";})()
    };
    const exitFns = {
      study:()=>setState({mode:"home"}),
      test:()=>setState({mode:"home"})
    };
    root.appendChild(header(eyebrows[state.mode], titles[state.mode], exitFns[state.mode]));

    if (state.mode === "home") nodes = renderHome();
    else if (state.mode === "study") nodes = renderStudy();
    else if (state.mode === "test") nodes = renderTest();
    else if (state.mode === "results") nodes = renderResults();
  }

  nodes.forEach(n => root.appendChild(n));
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadHandbook();
render();
</script>
</body>
