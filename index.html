<title>Utah Driver's Test Prep</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1923; color: #f0f0f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  #root { display: flex; flex-direction: column; align-items: center; padding: 0 16px 48px; }

  .hdr { width: 100%; max-width: 720px; padding: 22px 0 10px; border-bottom: 3px solid #f5c518; margin-bottom: 22px; }
  .eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #f5c518; font-weight: 700; margin-bottom: 3px; }
  .page-title { font-size: 22px; font-weight: 800; color: #fff; }
  .hdr-row { display: flex; justify-content: space-between; align-items: center; }

  .card { background: #1c2a38; border-radius: 12px; padding: 22px 18px; width: 100%; max-width: 720px; margin-bottom: 13px; }
  .card-dark { background: #131f2c; }
  .card-darker { background: #111e2b; border: 1px solid rgba(245,197,24,0.16); cursor: pointer; }

  .btn-yellow { background: #f5c518; color: #0f1923; border: none; border-radius: 8px; padding: 11px 24px; font-size: 14px; font-weight: 800; cursor: pointer; }
  .btn-ghost { background: transparent; color: #f5c518; border: 2px solid #f5c518; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-exit { background: none; border: none; color: #6a7f94; cursor: pointer; font-size: 13px; }
  .btn-muted { background: transparent; color: #6a7f94; border: 2px solid #3a5060; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 700; cursor: pointer; }

  .topic-chip { padding: 7px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
  .chip-active { background: #f5c518; color: #0f1923; }
  .chip-inactive { background: #263545; color: #8a9bb0; }

  .badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 9px; border-radius: 4px; margin-bottom: 13px; }

  .progress-bar { width: 100%; max-width: 720px; margin-bottom: 14px; }
  .progress-track { background: #263545; border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: #f5c518; border-radius: 4px; transition: width 0.3s; }
  .progress-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 12px; color: #5a7090; }

  .q-text { font-size: 16px; font-weight: 700; line-height: 1.5; margin-bottom: 14px; color: #fff; }

  .option-btn { width: 100%; background: #263545; border: 2px solid #263545; border-radius: 8px; padding: 11px 13px; text-align: left; cursor: pointer; color: #c0d0e0; font-weight: 400; font-size: 14px; line-height: 1.4; display: flex; gap: 9px; margin-bottom: 8px; font-family: inherit; }
  .option-btn:hover:not(:disabled) { border-color: #4a6070; }
  .option-correct { background: #172917 !important; border-color: #5cb85c !important; color: #7ee87e !important; font-weight: 700 !important; }
  .option-wrong { background: #291717 !important; border-color: #e05c5c !important; color: #e87e7e !important; font-weight: 700 !important; }
  .option-dim { color: #3a5060 !important; }
  .option-selected { background: #162640 !important; border-color: #f5c518 !important; color: #f5c518 !important; font-weight: 700 !important; }

  .opt-letter { min-width: 18px; font-weight: 800; opacity: 0.5; }

  .explain-btn { background: #1a2f4a; border: 2px solid #4a7ab5; border-radius: 8px; padding: 9px 16px; color: #7ab5f5; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 7px; font-family: inherit; margin-bottom: 14px; }
  .explain-loading { background: #1a2f4a; border-radius: 8px; padding: 12px 14px; border: 2px solid #4a7ab5; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .explain-box { background: #111e2b; border-radius: 8px; padding: 13px 15px; border: 2px solid #4a7ab5; border-left: 4px solid #f5c518; margin-bottom: 14px; }
  .explain-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #f5c518; margin-bottom: 7px; }
  .explain-text { font-size: 14px; color: #c0d8f0; line-height: 1.7; }
  .explain-hint { margin-top: 10px; font-size: 12px; color: #5a7090; font-style: italic; }

  .feedback-box { margin-top: 16px; border-radius: 8px; padding: 11px 13px; }
  .feedback-correct { background: #132013; border-left: 3px solid #5cb85c; }
  .feedback-wrong { background: #201313; border-left: 3px solid #e05c5c; }
  .feedback-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .feedback-text { font-size: 13px; color: #a0b4c8; line-height: 1.6; }

  .dot-nav { width: 100%; max-width: 720px; display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 13px; }
  .dot { width: 27px; height: 27px; border-radius: 5px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; }
  .dot-active { background: #f5c518; color: #0f1923; }
  .dot-done { background: #1e3d1e; color: #5cb85c; }
  .dot-empty { background: #1c2a38; color: #5a7090; }

  .score-big { font-size: 64px; font-weight: 900; line-height: 1; }
  .score-pass { color: #5cb85c; }
  .score-fail { color: #e05c5c; }

  .topic-bar { margin-bottom: 13px; }
  .topic-bar-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .topic-bar-track { background: #263545; border-radius: 4px; height: 5px; }
  .topic-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

  .missed-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #1c2a38; }
  .missed-topic { font-size: 10px; color: #5a7090; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .missed-q { font-weight: 700; font-size: 14px; margin-bottom: 7px; color: #e0eaf4; }
  .missed-wrong { font-size: 12px; color: #e05c5c; margin-bottom: 3px; }
  .missed-right { font-size: 12px; color: #5cb85c; margin-bottom: 6px; }
  .missed-exp { font-size: 12px; color: #8a9bb0; line-height: 1.6; background: #111e2b; padding: 8px 11px; border-radius: 6px; }

  /* Ask page */
  .ask-wrap { width: 100%; max-width: 720px; }
  .msg-user { align-self: flex-end; background: #f5c518; color: #0f1923; border-radius: 16px 16px 4px 16px; padding: 11px 15px; max-width: 85%; font-size: 14px; font-weight: 600; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .msg-ai { align-self: flex-start; background: #1c2a38; color: #d0e4f4; border-radius: 4px 16px 16px 16px; padding: 11px 15px; max-width: 85%; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .msgs { display: flex; flex-direction: column; gap: 11px; min-height: 180px; margin-bottom: 14px; }
  .msgs-empty { text-align: center; padding: 36px 0; color: #3a5060; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #f5c518; animation: blink 1.2s infinite; }
  .typing-wrap { align-self: flex-start; background: #1c2a38; border-radius: 4px 16px 16px 16px; padding: 13px 16px; display: flex; gap: 5px; }

  .input-row { display: flex; gap: 9px; border-top: 1px solid #1c2a38; padding-top: 13px; }
  .ask-input { flex: 1; background: #1c2a38; border: 2px solid #2f3f52; border-radius: 9px; padding: 10px 13px; color: #e0eaf4; font-size: 14px; outline: none; font-family: inherit; }
  .ask-input:focus { border-color: #4a7ab5; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .suggest-chip { background: #1c2a38; border: 1px solid #2f3f52; border-radius: 20px; padding: 6px 13px; font-size: 12px; color: #8a9bb0; cursor: pointer; font-family: inherit; }
  .suggest-chip:hover { border-color: #4a7ab5; color: #7ab5f5; }

  .btn-row { display: flex; gap: 9px; flex-wrap: wrap; }
  .btn-row-center { justify-content: center; }

  /* Handbook upload page */
  .upload-zone { border: 2px dashed #3a5060; border-radius: 12px; padding: 36px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
  .upload-zone:hover, .upload-zone.drag-over { border-color: #f5c518; }
  .upload-icon { font-size: 40px; margin-bottom: 10px; }
  .upload-status { margin-top: 14px; padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
  .status-ok  { background: #132013; border-left: 3px solid #5cb85c; color: #7ee87e; }
  .status-err { background: #201313; border-left: 3px solid #e05c5c; color: #e87e7e; }
  .status-loading { background: #1a2f4a; border-left: 3px solid #4a7ab5; color: #7ab5f5; }
  .progress-bar-upload { width: 100%; background: #1c2a38; border-radius: 4px; height: 8px; overflow: hidden; margin-top: 10px; }
  .progress-bar-upload-fill { height: 100%; background: #f5c518; border-radius: 4px; transition: width 0.2s; }
  .handbook-pill { display: inline-flex; align-items: center; gap: 6px; background: #1c2a38; border: 1px solid #3a5060; border-radius: 20px; padding: 5px 13px; font-size: 12px; color: #8a9bb0; cursor: pointer; margin-bottom: 14px; width: 100%; max-width: 720px; }
  .handbook-pill.uploaded { border-color: #5cb85c; color: #5cb85c; }
  .handbook-pill-arrow { margin-left: auto; color: #f5c518; font-size: 13px; }

  @keyframes blink { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
</style>
</head>

<script>
const HANDBOOK_EMBEDDED = "UTAH DRIVER LICENSE DIVISION\n2025 - 2026\n\nSTATE OF UTAH\nUTAH DRIVER HANDBOOK\nAAMVA MODEL NON-COMMERCIAL\nThis handbook is a collaborative effort between the American Association of Motor Vehicle Administrators (AAMVA) and the Utah Driver License Division. It contains the rules to be followed when\noperating any vehicle on Utah roads. A bicycle operator must obey the rules of the road and have the\nsame rights and duties as the operator of a motor vehicle or other vehicle.\nFor additional driver license information, forms, and to test your knowledge with our online written\nknowledge practice test, visit our website at dld.utah.gov.\nPlease be aware of imitator sites that do not end in .gov.\nDriver License Division (DLD) Services:\n• Driver License (Class D), Commercial Driver License (CDL), Driving Privilege Cards (DPC),\nLimited-Term Driver License, Identification Cards, Limited-Term Identification Cards, Endorsements (CDL, Taxi, Motorcycle)\n• Utah Driving Records (MVR)\n• Reinstatement Fees\n• Driver Review Exams\n• Driver Improvement Hearings\n• Voter Registration\n• Organ Donor Registration\nAppointments should be scheduled for all services to reduce your wait time. Walk-in service\nmay experience much longer wait times due to appointments taking priority. Visit our website\nat dld.utah.gov to schedule your appointment today!\n\nFront cover photo courtesy of Tiffany Daines\nBack cover photo courtesy of Savannah Riley\n\nNEW 2025 LAWS\nEffective May 7, 2025\nHB 234 Motorcycle Safety Amendments\nThis bill increases the fine for a person who operates a motorcycle without an endorsement. The\ncourt will waive the fine if the person obtains a motorcycle endorsement within in 30 days.\nHB 300 Amendments to Election Law\nVoter must request a ballot be mailed every eight years on the DL/IDC application. Requires voters\nto enter the last four digits of their social security number as an alternate of identification.\nHB 308 Driving by Minors Amendments\nAllows an individual with a learner permit younger than 18 years old to drive with an adult other than\na parent; if the parent or legal guardian is not a licensed driver. The individual occupying the seat beside the applicant must have in their immediate possession evidence that the individual is authorized\nby the parent or legal guardian.\nSB59 Commercial Driver License Revisions\nAmends provisions relating to disqualification of a CDL and requires DLD to utilize the Drug and Alcohol Clearinghouse as required by Federal law.\nSB260 Individual Digital Identity Amendments\nEstablishes guiding principles for the implementation of a state-endorsed digital identity program.\nEffective January 1, 2026\nHB 437 Interdicted Person Amendments\nThis bill:\n• A person convicted of DUI, the court may designate as an interdicted person who will be prohibited from purchasing alcohol for a certain time period. A person shall be designated as an\ninterdicted person when convicted for an extreme DUI.\n• The court may designate a person convicted of a DUI as an interdicted person. This would\nrequired the person to surrender their license or identification card to the court and apply for an\ninterdicted license or ID card.\n• An interdicted DL/IDC will have a red banner at the top of the card stating “NO ALCOHOL\nSALE.”\nHB 190 Motorcycle Amendments\nThis bill:\n• Requires DLD to suspend an individual’s motorcycle endorsement or driver license based on\nconviction of certain violations.\n• Failure to properly display license plate;\n• Performing a wheelie; or\n• Lane splitting.\n\nDRIVER LICENSE HISTORY\n• The Bureau of Driver License Services was created on January 1, 1934, when Utah officially\nadopted the “Uniform Operator’s and Chauffeurs’ License Act.” (Prior to this, the State of Utah\nhad no driver license law.)\n• This act required that “every operator of a motor vehicle shall not drive any motor vehicle upon\na highway in this state unless such person was licensed to do so.”\n• Originally, the Bureau of Driver License Services was an agency within the State Tax Commission.\n• The first license in Utah was issued on December 5, 1933. It cost 25¢ and was good until revoked. It was printed in blue on white paper.\n• The application card was 6” x 3½” and only asked for name, address, brief description, a few\nquestions and a signature.\n• No examination was given until January 1935, when the eye test, written knowledge test, and\nan occasional driving skills test was given.\n• The “good-until-revoked” licenses were issued until December 31, 1935.\n• Beginning January 1, 1936, the law was changed to have the driver license expire three years\nafter issuance (not on the birthdate.) The fee was still 25¢.\n• One of the biggest changes came in 1951 when the Bureau of Driver License Services moved\nfrom the State Tax Commission and became an agency within the Department of Public Safety.\n• In 1980, the state decided to reward “good drivers” by developing a system for the applicant to\nrenew their driver license through the mail.\n• The Driver License Division began issuing a commercial driver license in 1989.\n• The Driver License Division began offering more online services including MVRs and appointments in 2005.\n• January 2010, the citizens of Utah started a 5-year process that required all Utah drivers to\nbring in their identification documents once again. This process was a beginning step to meet\nthe licensing practices for the Federal REAL ID Act.\n• January 2010, the renewal-by-mail program was suspended.\n• February 13, 2013, the Driver License Division was notified by the Department of Homeland\nSecurity that Utah meets the licensing practices of the Federal REAL ID Act.\n• April 2013, the renewal-by-mail program was reinstated and renewal-by-internet was a new\nservice.\n• May 2015, the Driver License Division began offering online CDL MVR services to authorized\ndrivers and employers.\n• In 2016, the Driver License Division stopped conducting driving skills test on an enclosed\nrange. All driving skills tests are performed on public roads.\n• March 2017, tablets were implemented to score driving skills tests rather than paper.\n• December 2018, Utah is the first state in the country to have a blood alcohol concentrate of\n.05.\n• January 2020, driver license renewals extend from a 5-year renewal to an 8-year renewal.\n• July 2020, the division transitioned to an appointment based system. Until then appointments\nwere available but walk-in customers were the primary process when customers visited our\noffices.\n• October 2021, the division transitioned from a paper application for driver license/ID card to an\nelectronic application. This new process reduces repetitive input of data and decreases customer wait time.\n• December 2023 marks 90 years since the first Utah driver license was issued.\nDid you know the Driver License Division is not part of the DMV?\nOur friends at the DMV (Department of Motor Vehicles, under the Utah State Tax Commission) can\nassist you at 801.297.7780 or dmv.utah.gov with all of your vehicle (e.g., plate and title) needs.\n\nTHE TOP FIVE LEADING CAUSES OF ALL CRASHES ON UTAH HIGHWAYS\n1. Failed to Keep in Proper Lane 28%\n2. Failed to Yield Right-of-Way 12%\n3. Ran Off The Road 7%\n4. Too Fast for Conditions 7%\n5. Over-Correcting/Over-Steering 6%\nTHE TOP FIVE LEADING CAUSES OF DEATH ON UTAH HIGHWAYS\n1. Failed to Keep in Proper Lane 28%\n2. Failed to Yield Right-of-Way 12%\n3. Ran Off The Road 7%\n4. Too Fast for Conditions 7%\n5. Over-Correcting/Over-Steering 6%\nTHE TOP FIVE LEADING CAUSE OF CRASHES ON UTAH HIGHWAYS (TEENAGERS 15-19)\n1. Failed to Keep in Proper Lane 23%\n2. Disregard Traffic Signal 14%\n3. Reckless/Aggressive Driving 14%\n4. Failed to Yield Right-of-Way 12%\n5. Over-Correcting/Over-Steering 9%\nTHE TOP FIVE LEADING CAUSE OF CRASHES ON UTAH HIGHWAYS (Age 65+)\n1. Failed to Yield Right-of-Way 21%\n2. Failed to Keep in Proper Lane 21%\n3. Following Too Closely 7%\n4. Wrong Side/Wrong Way 7%\n5. Disregard Traffic Signal 5%\nInformation based on 2024 statistics provided by the Utah Department of Public Safety’s Highway\nSafety office. The percentages are for the top five causes. To see all causes for crashes and fatalities, please visit: highwaysafety.utah.gov.\n\nSECTION 1: Definitions\nThis handbook condenses or paraphrases the actual language of the Utah Code. Officers of the\ncourts are guided by the full text and exact language of the law rather than the Utah driver handbook.\nAssumption of Financial Responsibility—parent or guardian of the applicant or responsible adult\nwilling to assume the obligation.\nBicycle—a wheeled vehicle propelled by human power by feet or hands acting upon pedals or\ncranks, with a seat or saddle designed to be operated on the ground. Wheels are not less than 14\ninches in diameter. The bicycle includes an electric-assisted bicycle.\nBlind Spots—the area of roadway that can’t be seen with mirrors while operating a vehicle.\nCancellation—termination of a driver license issued through error, fraud, or upon application for a\nstate-issued driver license or ID card, or for which necessary consent has been withdrawn.\nCareless Driving—a person operating a motor vehicle is guilty of careless driving if the person commits two or more moving traffic violations within a single continuous period of driving or commits a\nmoving traffic violation while being distracted by one or more activities taking place within the vehicle\nthat are not related to the operation of a motor vehicle, including searching for an item in the vehicle\nor attending to personal hygiene, or grooming.\nCommercial Driver License (CDL)—a license that allows the holder to drive a vehicle with a GVWR\nof 26,001 lbs. or more, or designed to transport 16 or more passengers, hazardous materials, doubles/triples, bulk liquids (tankers), or school buses.\nDenied—withdrawal of driving privilege.\nDependent—a spouse and any unmarried children under the age of 21.\nDisqualification—a temporary or permanent withdrawal of a commercial driver license.\nDivision—the Driver License Division of the Department of Public Safety.\nDriving Privilege Card—the evidence of the privilege to drive a motor vehicle in Utah obtained without providing proof of lawful presence in the United States.\nFarm Tractor—every self-propelled vehicle designed and used primarily as a farm implement of husbandry.\nHead Checks—checking your blind spot by turning your head and looking over your shoulder in the\ndirection you plan on moving.\nHighway—the entire width between property lines of every way or place as a matter of right for vehicular travel.\nLicense—the privilege to drive a motor vehicle.\nLicense Certificate—the evidence of the privilege to drive a motor vehicle.\nLow-Speed Vehicle—a four-wheeled electric motor vehicle designed to be operated at speeds of not\nmore than 25 miles per hour and that has a capacity of not more than four passengers, including the\ndriver.\nMotor Vehicle—every self-propelled vehicle, except motorized wheelchairs, electric personal assistive mobility devices and vehicles moved solely by human power.\nMotorcycle—a motor vehicle, except farm tractors, that has a saddle for the rider and is designed to\ntravel with not more than three wheels in contact with the ground.\nOperator—a person in actual physical control of a motor vehicle.\nProvisional License—a Utah license issued to any person under 21 years of age.\nRevocation—termination of the privilege to drive a motor vehicle.\nRoundabout—a traffic roundabout is a circular intersection that flows counterclockwise.\nSchool Bus—commercial motor vehicle used to transport pre-primary, primary, or secondary school\nstudents to and from home and school or to and from school-sponsored events.\nSuspension—temporary withdrawal of the privilege to drive.\n\nSECTION 2: Licensing Requirements\nEvery resident of Utah who drives a motor vehicle on the highways must have a valid Utah driver license, learner permit, or temporary driver license.\nPersons become residents if they enter the state to make Utah home, remain in the state for six months or more during any calendar year, obtain a driver license or register a motor vehicle in Utah, obtain privileges not extended to non-residents, or are gainfully employed in Utah.\nVisitors with a valid out-of-state or out-of-country driver license may drive in Utah for up to six months.\n\nSECTION 3: Driver Education/Permits\nRequired driver education hours: 27 hours of high school classroom instruction, or 18 hours of commercial/private school, or 30 hours of Utah-approved online/home study; and 6 hours behind the wheel instruction.\nThe entry-level learner permit is valid for 18 months. You must be at least 15 years old.\nLearner permit holding periods: Age 16 and 17 - 6 months; Age 18 - no holding period but must complete approved driver education; Age 19+ - 90 days unless applicant completes approved driver education course.\nA student must complete 40 hours of driving (10 hours after sunset) with a parent or legal guardian.\n\nSECTION 4: Driver License Types\nRegular Class D Driver License: minimum age 16. Allows driving all personal vehicles up to 26,000 pounds.\nProvisional Class D license fee: $39.00. Regular Class D license (21 and over) fee: $52.00. Learner permit fee: $19.00. Renewal fee: $52.00. Renewal (65+): $27.00. Motorcycle endorsement: $18.00.\nVision requirement: 20/40 vision and peripheral fields of 90 degrees in at least one eye.\n\nSECTION 5: Vision and Health\nThe division requires 20/40 vision and peripheral fields (side vision) of 90 degrees in at least one eye to pass the vision test.\nEveryone age 65 and older is required to pass a vision test with every license application.\n\nSECTION 6: Examinations\nThe written knowledge test is not timed but generally takes 30 to 45 minutes. You must pass with a score of 80% or better.\nYou can take two written knowledge tests per day. The fee allows for not more than three attempts within 12 months.\nAll first-time driver license applicants must pass a Traffic Safety and Trends Exam with 100% to obtain their first-time regular Class D driver license.\nYou must be at least 16 years of age to take a driving skills test at the DLD. At least 15 to test with a Third-Party Tester or high school.\nAutomatic failures on driving skills test: receiving a traffic citation, not yielding to pedestrians, being involved in an avoidable crash, committing an unsafe act, driving over sidewalks or curbs unnecessarily, examiner taking control, driving too fast or too slow.\n\nSECTION 7: Preparing Your Vehicle\nSafety belt law: All passengers must wear safety belts. Children ages eight and younger must be properly restrained in a car or booster seat unless they are 57 inches tall.\nChildren must be rear-facing in the back seat until at least two years of age and 30 pounds.\nChildren must be forward facing with a harness until at least four years of age and 40 pounds.\nAir bags deploy at up to 200 mph. Infants should never ride in the front seat with a passenger-side air bag. Children 12 and under should ride in the back seat.\nLeave 10 inches between your chest and the steering wheel.\n\nSECTION 8: Basic Driving\nLane change procedure: Check mirrors, signal for at least two seconds, head check over shoulder, merge when safe, cancel signal.\nParking restrictions: Not within 15 feet of a fire hydrant; not within 20 feet of a crosswalk; not within 30 feet of a stop sign or traffic signal; not within 50 feet of a railroad crossing; not on a sidewalk; not in an intersection; not in front of a driveway.\nHill parking uphill: turn wheels away from curb (front tire touches curb). Downhill: turn wheels toward curb.\nParallel parking: vehicle must be no more than 12 inches from the curb.\nPassing: return to right-hand lane no less than 200 feet from oncoming vehicles. Never pass at intersections, before railroad crossings, in no-passing zones, on curves or hills.\nSignaling required for at least two seconds before turning or changing lanes.\nSchool bus stopping: Stop when alternating flashing red lights are displayed. On a divided highway with four or more lanes with a median, only vehicles behind the bus must stop.\nU-turns prohibited: on curves, near the top of a hill where you cannot see 500 feet in both directions, on railroad tracks, or on freeways.\nZipper method: alternate merging at a congested merge point.\nGore area: it is illegal to cross over or drive in the gore area between solid white lines.\n\nSECTION 9: Rules of the Road\nSpeed limits: 20 mph in school zones during school hours; 25 mph in business or residential areas; 55 mph on major highways; 65/70/75/80 mph on rural interstate highways.\nRoundabouts flow counterclockwise. Yield to oncoming traffic when entering.\nYellow lane markings indicate two-direction roadways. White lane markings indicate one-direction roadways.\nFlex lanes: green arrow means you can use the lane, red X means you cannot.\nCarpool (express) lane: requires two or more persons, motorcycles, buses, or clean fuel vehicle decal. Cannot cross double white line except at access points.\nIntersections: look left, right, then left again before entering. Do not change lanes while in an intersection.\nShared center left turn lane: may not enter more than 500 feet before making the turn.\nTraffic signals: Green - proceed with caution. Yellow - about to change to red. Red - stop, may turn right after complete stop unless posted otherwise. Flashing red - stop and look both ways. Flashing yellow - slow down and proceed with caution. Flashing yellow arrow - turns permitted but yield to oncoming traffic.\nRailroad crossings: stop between 15 and 50 feet from the nearest rail. Never drive through, around, or under crossing gates while down. After stopping if lights appear malfunctioning, may proceed only with clear line of sight of at least one mile in both directions.\nRight-of-way: yield to driver already at intersection, to oncoming traffic when turning left, to driver on your right at four-way stop, to drivers on a public road when coming from a driveway.\nSnowplow: may not pass on the side where a plow blade is deployed. If three or more snowplows in echelon formation, may not pass on either side.\n\nSECTION 10: Alcohol/Drugs and Driving\nAlcohol and other impairing drugs are involved in approximately 40% of all traffic crashes in which someone is killed yearly.\nUtah BAC limit: 0.05 for most drivers. CDL holders: 0.04.\nImplied Consent Law: by driving in Utah you agree to submit to a chemical test of breath, blood, urine, or oral fluids if requested by a peace officer. The officer selects the type of test.\nRefusal of chemical test - first offense: license revoked 18 months (driver 21+) or 2 years (under 21).\nRefusal of chemical test - second or subsequent offense: revoked 36 months, or until age 21 for those under 21, whichever is longer.\nFirst DUI conviction (21+): license suspended 120 days. Second or subsequent: 2 years.\nLicense suspension begins on the 45th day after the date of arrest.\nNot-a-Drop Act: driver under 21 with any measurable alcohol - driving privileges denied 6 months first offense, 2 years or until age 21 (whichever is longer) for second or subsequent offense within 10 years.\nIgnition Interlock Device (IID): First DUI conviction - IID required 18 months from conviction (3 years if under 21 at time of arrest). Second or subsequent DUI - IID required 2 years. Felony DUI - 3-year IID restriction. Automobile homicide - 10-year IID restriction.\nIID must be monitored at least every 60 days. Failing to monitor extends requirement by 60 days per occurrence.\nAlcohol-restricted status: 2, 3, 5, or 10 years depending on offense. Lifetime status for automobile homicide or felony DUI.\nFirst DUI conviction suspension begins on 45th day after arrest. d vehicles protect you. Do not touch metal surfaces.\nMountain driving: yield to vehicles going uphill when traveling downhill on a narrow road. Sound horn when approaching sharp curves on narrow roads.\n\nSECTION 12: Crashes and Insurance\nIf crash results in injuries, death, or at least $2,500 in total property damage, must notify law enforcement (911) immediately.\nFailure to stop at injury crash scene: third-degree felony.\nSR22 required for three years following suspension or revocation for financial responsibility violations.\nIf unsatisfied judgment not satisfied within 60 days, driving privilege suspended.\nInsurance: bodily injury and property damage liability is mandatory. Personal Injury Protection (PIP/no-fault) is mandatory. Uninsured motorist coverage available.\nDefensive driving: motor vehicle crashes are leading cause of death for ages 1-24. Time of day when most crashes happen: 2pm to 6pm. Highest crash rate occurs in shopping and business areas.\nBrake failure: use parking brake slowly. If parking brake fails, turn off engine and find safe place to stop.\nTire blowout: grip steering wheel firmly, steer straight, slow gradually, take foot off gas - do not brake hard.\nABS brakes: press brake pedal as hard as possible and maintain pressure - do not pump.\n\nSECTION 13: Suspensions and Your Record\nAlcohol/drug violations remain on driving record for 10 years. Other moving violations: past three years.\nDriving while suspended: jail up to 90 days plus fine. Original suspension period extended by same amount.\nPoint system:\n- Reckless driving: 80 points\n- Speeding (depending on severity): 35-75 points\n- Failure to yield right-of-way: 60 points\n- Following too closely (tailgating): 60 points\n- Wrong side of road: 60 points\n- Wrong way on one-way street: 60 points\n- Red light: 50 points\n- Stop sign: 50 points\n- Improper lookout: 50 points\n- Improper passing: 50 points\n- Texting while driving: 50 points\n- Other moving violations: 40 points\nOver 21: hearing if 200 or more points in 3 years.\nUnder 21: hearing if 70 or more points in 3 years.\nOne full year without violation: half of total points removed.\nTwo successive years without conviction: all points removed.\nPoints for individual convictions automatically removed 3 years after the violation date.\nDefensive driving course: removes 50 points, allowed once per 3-year period.\nLicense revocations: manslaughter or automobile homicide while driving; second or subsequent DUI; making false statement on license application; using vehicle to commit felony; failure to stop and give aid at injury crash; two reckless driving charges in one year; attempting to flee police; discharging firearm from vehicle; driving with alcohol while alcohol-restricted; driving without IID when interlock-restricted.\n\nSECTION 14: Sharing the Road\nBicycles are considered vehicles. Must follow same rules as motor vehicles. Utah law requires minimum three feet of distance when passing a bicyclist or vulnerable user of the highway.\nBicyclist may proceed through stop sign after slowing to reasonable speed and yielding right-of-way.\nDim headlights within 500 feet when approaching or overtaking bicyclists at night.\nEmergency vehicles: yield right-of-way, drive to right side of road and stop. Do not follow within 500 feet of any fire vehicle responding to an alarm.\nLarge trucks blind spots: up to 20 feet in front of cab, on either side (especially alongside cab), and up to 200 feet to the rear. If you can't see the truck driver in their side mirror, they can't see you.\nA fully loaded tractor-trailer at 55 mph needs more than 400 feet to stop.\nMotorcycle endorsement required to operate motorcycle on Utah highways.\nMotorcycle operators and passengers under 21 must wear a DOT-approved helmet.\nLane filtering permitted when: two or more lanes same direction, speed limit 45 mph or less (or off-ramp), motorcycle traveling 15 mph or less, vehicle being passed is completely stopped, movement can be made safely. NOT permitted on on-ramps.\nAfter 90-second wait at intersection with no signal detection, motorcyclist 16+ may proceed if safe.\nDo not share lane with motorcycles - give them an entire lane.\nMotor-assisted scooters: cannot operate on highway with four or more lanes, or posted speed limit greater than 25 mph. Person under 15 may not operate unless under direct supervision of parent or guardian.\nTrains always have right-of-way. Stop between 15 and 50 feet from nearest rail. Never drive around or under crossing gates.\nPedestrians: yield to all pedestrians even outside marked crosswalks. When pedestrian has guide dog or white cane, come to complete stop.\nSlowly moving vehicles display orange and red triangle - moving less than 25 mph.\n\nSECTION 15: Vehicle Equipment\nHeadlights: must shine 350 feet on high beams, 100 feet on low beams. Dim high beams within 500 feet of oncoming vehicle or within 300 feet when following another vehicle.\nHorn must be audible from at least 200 feet.\nSnow tires with metal studs may be used October 15 through March 31.\nA windshield is required on all vehicles except motorcycles.\nAll vehicles except motorcycles must have a functional parking brake.\nTurn signals required: two red/yellow/amber on rear, two white/yellow/amber on front, visible from 100 feet.\n\nSECTION 16: Towing\nDrawbar or connection between tow vehicles may not exceed 15 feet.\nWhen chain, rope, or cable used as connection, a red flag at least 12 inches square must be attached.\nWarning devices must be placed 100 feet to front and rear of disabled vehicle.\nOn a one-way street, rear flag should be placed 200 feet to the rear.\nIf breakdown within 500 feet of curve or hilltop, place warning device far enough to warn approaching motorists but not more than 500 feet away.\nFlares and fuses may not be carried in vehicles transporting explosives, flammable liquids, or compressed gas.";

// ── PDF EXTRACTION ───────────────────────────────────────────────────────────
async function extractPdf(file) {
  setState({uploadStatus:"loading", uploadMsg:`Reading ${file.name}…`, uploadPct:0});
  try {
    if (!window.pdfjsLib) throw new Error("PDF.js did not load. Please refresh and try again.");
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page    = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(s => s.str).join(" ") + "\n";
      setState({uploadPct: Math.round(i / pdf.numPages * 100), uploadMsg:`Extracting page ${i} of ${pdf.numPages}…`});
    }
    if (text.trim().length < 500) {
      throw new Error("Very little text found — this PDF may be image-only (scanned). Try a text-based PDF from dld.utah.gov.");
    }
    localStorage.setItem("handbook_text",   text);
    localStorage.setItem("handbook_source", file.name);
    state.handbookText   = text;
    state.handbookSource = file.name;
    setState({
      uploadStatus: "ok",
      uploadMsg: `✓ "${file.name}" loaded — ${pdf.numPages} pages, ${Math.round(text.length/1000)}K characters extracted. All Ask & Explain answers now use this PDF.`,
      uploadPct: 100
    });
  } catch(e) {
    setState({uploadStatus:"err", uploadMsg:`✗ ${e.message}`});
  }
}

function clearHandbook() {
  localStorage.removeItem("handbook_text");
  localStorage.removeItem("handbook_source");
  state.handbookText   = HANDBOOK_EMBEDDED;
  state.handbookSource = "built-in";
  setState({uploadStatus: null, uploadMsg: null, uploadPct: 0});
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function filtered() {

}

function countFor(t) { return QUESTIONS.filter(q=>q.t===t).length; }

async function explainQuestion() {
  if (state.explaining || state.explain) return;
  setState({explaining:true});
  const q = state.questions[state.cur];
  try {
    const res = await fetch("https://anthropic-proxy.arbopress.workers.dev", {
      method:"POST",
      headers: apiHeaders(),
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:400,
        system:`You are a friendly Utah driver's license exam tutor. Explain the concept behind a test question in plain simple English — like talking to a nervous friend. Short sentences. No jargon. Give a real-world analogy if it helps. Do NOT give away the answer. Just explain the rule or law so they can figure out the answer themselves. Under 120 words.\n\nHandbook:\n${state.handbookText.substring(0, 8000)}`,
        messages:[{role:"user", content:`Help me understand this so I can answer it:\n\n"${q.q}"\n\nOptions: ${q.o.join(", ")}`}]
      })
    });
    const d = await res.json();
    const text = d.content?.find(b=>b.type==="text")?.text || d.error?.message || "Couldn't load — try again.";
    setState({explain:text, explaining:false});
  } catch(e) {
    setState({explain:`Connection error: ${e.message}`, explaining:false});
  }
}

  setState({askMsgs:msgs, askInput:"", askBusy:true});
  try {
    const res = await fetch("https://anthropic-proxy.arbopress.workers.dev", {
      method:"POST",
      headers: apiHeaders(),
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        system:`You are a Utah driver's license exam tutor. Answer ONLY from the handbook excerpt below. Be clear and concise. If the topic isn't covered, say so and suggest checking dld.utah.gov. Highlight key numbers and rules.\n\nUTAH DRIVER HANDBOOK:\n${state.handbookText.substring(0, 300000)}`,
        messages:[{role:"user", content:question.trim()}]
      })
    });
    const d = await res.json();
    const answer = d.content?.find(b=>b.type==="text")?.text || d.error?.message || "Something went wrong — try again.";
    setState({askMsgs:[...msgs, {r:"a",t:answer}], askBusy:false});
  } catch(e) {
    setState({askMsgs:[...msgs, {r:"a",t:`Connection error: ${e.message}`}], askBusy:false});
  }
}

// ── DOM HELPERS ──────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k === "className") e.className = v;
    else if (k.startsWith("on")) e[k.toLowerCase()] = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else e.setAttribute(k, v);
  }
  for (const child of children.flat()) {
    if (child == null) continue;
    if (typeof child === "string" || typeof child === "number") e.appendChild(document.createTextNode(child));
    else e.appendChild(child);
  }
  return e;
}

function div(cls, ...children) { return el("div", {className:cls}, ...children); }
function span(cls, text)       { return el("span", {className:cls}, text); }
function btn(cls, text, onClick) { return el("button", {className:cls, onClick}, text); }

function header(eyebrow, title, exitFn) {
  return div("hdr",
    div("eyebrow", eyebrow),
    div("hdr-row",
      div("page-title", title),
      exitFn ? btn("btn-exit", "✕ Exit", exitFn) : el("span",{})
    )
  );
}

function typingDots() {
  const wrap = div("typing-wrap");
  [0,1,2].forEach(i => {
    const d = div("typing-dot");
    d.style.animationDelay = `${i*0.2}s`;
    wrap.appendChild(d);
  });
  return wrap;
}

// ── PAGE: STUDY ──────────────────────────────────────────────────────────────
function renderStudy() {
  const q = state.questions[state.cur];
  const tc = TC[q.t];
  const pct = state.cur / state.questions.length * 100;
  const correct = state.answers.filter(a=>a.ok).length;

  const prog = div("progress-bar");
  const track = div("progress-track");
  const fill = div("progress-fill");
  fill.style.width = pct + "%";
  track.appendChild(fill);
  prog.appendChild(track);
  prog.appendChild(el("div", {className:"progress-labels"},
    el("span",{}, `✓ ${correct} correct`),
    el("span",{}, `${state.questions.length - state.cur} left`)
  ));

  const card = div("card");

  const badge = div("badge");
  badge.style.background = tc.badge;
  badge.style.color = tc.bt;
  badge.textContent = q.t;
  card.appendChild(badge);

  card.appendChild(el("div", {className:"q-text"}, q.q));

  if (state.sel === null) {
    if (!state.explain && !state.explaining) {
      card.appendChild(el("button", {className:"explain-btn", onClick: explainQuestion},
        el("span", {}, "💡"), " Explain this to me first"
      ));
    }
    if (state.explaining) {
      const xLoad = div("explain-loading");
      const dots = el("div", {style:{display:"flex",gap:"4px"}},
        ...[0,1,2].map(i => { const d=div("typing-dot"); d.style.animationDelay=`${i*0.2}s`; return d; })
      );
      xLoad.appendChild(dots);
      xLoad.appendChild(el("span", {style:{fontSize:"13px",color:"#7ab5f5"}}, "Getting explanation…"));
      card.appendChild(xLoad);
    }
    if (state.explain && !state.explaining) {
      const xBox = div("explain-box");
      xBox.appendChild(el("div", {className:"explain-label"}, "💡 Here's what you need to know"));
      xBox.appendChild(el("div", {className:"explain-text"}, state.explain));
      xBox.appendChild(el("div", {className:"explain-hint"}, "Now pick your answer below ↓"));
      card.appendChild(xBox);
    }
  }

  q.o.forEach((opt, idx) => {
    let cls = "option-btn";
    if (state.sel !== null) {
      if (idx === q.a) cls += " option-correct";
      else if (idx === state.sel) cls += " option-wrong";
      else cls += " option-dim";
    }
    const b = el("button", {className:cls, onClick:()=>pickStudy(idx)},
      el("span", {className:"opt-letter"}, LETTERS[idx]),
      el("span", {}, opt)
    );
    if (state.sel !== null) b.disabled = true;
    card.appendChild(b);
  });

  if (state.showFeedback) {
    const isCorrect = state.sel === q.a;
    const fb = div(`feedback-box ${isCorrect?"feedback-correct":"feedback-wrong"}`);
    fb.appendChild(el("div", {className:"feedback-label", style:{color:isCorrect?"#5cb85c":"#e05c5c"}}, isCorrect ? "✓ Correct!" : "✗ Incorrect"));
    fb.appendChild(el("div", {className:"feedback-text"}, q.e));
    card.appendChild(fb);

    const nextBtn = btn("btn-yellow", state.cur+1>=state.questions.length ? "See Results →" : "Next Question →", nextStudy);
    nextBtn.style.marginTop = "14px";
    nextBtn.style.width = "100%";
    card.appendChild(nextBtn);
  }

  return [prog, card];
}

// ── PAGE: TEST ───────────────────────────────────────────────────────────────
function renderTest() {
  const q = state.questions[state.cur];
  const tc = TC[q.t];
  const allDone = Object.keys(state.testAnswers).length === state.questions.length;

  const dots = div("dot-nav");
  state.questions.forEach((_,i) => {
    let cls = "dot ";
    if (i === state.cur) cls += "dot-active";
    else if (state.testAnswers[i] !== undefined) cls += "dot-done";
    else cls += "dot-empty";
    dots.appendChild(el("button", {className:cls, onClick:()=>setState({cur:i})}, String(i+1)));
  });

  const card = div("card");
  const badge = div("badge");
  badge.style.background = tc.badge; badge.style.color = tc.bt;
  badge.textContent = q.t;
  card.appendChild(badge);
  card.appendChild(el("div", {className:"q-text"}, q.q));

  q.o.forEach((opt,idx) => {
    const isSel = state.testAnswers[state.cur] === idx;
    card.appendChild(el("button", {
      className:"option-btn" + (isSel?" option-selected":""),
      onClick:()=>pickTest(idx)
    }, el("span",{className:"opt-letter"}, LETTERS[idx]), el("span",{},opt)));
  });

  const btnRow = div("btn-row");
  btnRow.style.marginTop = "6px";
  if (state.cur > 0) btnRow.appendChild(btn("btn-ghost","← Back",()=>setState({cur:state.cur-1})));
  if (state.cur < state.questions.length-1) {
    btnRow.appendChild(btn("btn-yellow","Next →",()=>setState({cur:state.cur+1})));
  } else {
    const sub = btn("btn-yellow",
      allDone ? "Submit Test →" : `${state.questions.length-Object.keys(state.testAnswers).length} unanswered — keep going`,
      allDone ? submitTest : null
    );
    if (!allDone) sub.style.opacity = "0.45";
    btnRow.appendChild(sub);
  }
  card.appendChild(btnRow);

  return [dots, card];
}

// ── PAGE: RESULTS ─────────────────────────────────────────────────────────────
function renderResults() {
  const score  = state.answers.filter(a=>a.ok).length;
  const pct    = Math.round(score/state.questions.length*100);
  const passed = pct >= 80;

  const byT = {};
  state.questions.forEach((q,i) => {
    if (!byT[q.t]) byT[q.t]={c:0,n:0};
    byT[q.t].n++;
    if (state.answers[i]?.ok) byT[q.t].c++;
  });

  const scoreCard = div("card");
  scoreCard.style.textAlign = "center";
  scoreCard.appendChild(el("div", {className:`score-big ${passed?"score-pass":"score-fail"}`}, `${pct}%`));
  scoreCard.appendChild(el("div",{style:{fontSize:"14px",color:"#6a7f94",marginTop:"4px"}}, `${score} of ${state.questions.length} correct`));
  scoreCard.appendChild(el("div",{style:{marginTop:"9px",fontSize:"13px",color:passed?"#5cb85c":"#e05c5c",fontWeight:"700"}}, passed?"✓ Passing score (80%+)":"✗ Need 80% to pass"));
  const rb = div("btn-row btn-row-center");
  rb.style.marginTop = "16px";
  rb.appendChild(btn("btn-yellow","Study Again",startStudy));
  rb.appendChild(btn("btn-ghost","Retake Test",startTest));
  rb.appendChild(btn("btn-muted","Home",()=>setState({mode:"home"})));
  scoreCard.appendChild(rb);

  const topicCard = div("card");
  topicCard.appendChild(el("div",{style:{fontSize:"11px",color:"#6a7f94",marginBottom:"13px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "Score by Topic"));
  Object.entries(byT).forEach(([t,d]) => {
    const tp = Math.round(d.c/d.n*100);
    const bar = div("topic-bar");
    bar.appendChild(el("div",{className:"topic-bar-row"},
      el("span",{style:{fontWeight:"600",fontSize:"13px"}},t),
      el("span",{style:{fontSize:"13px",color:tp>=80?"#5cb85c":"#e05c5c",fontWeight:"700"}},`${d.c}/${d.n} (${tp}%)`)
    ));
    const track = div("topic-bar-track");
    const fill  = div("topic-bar-fill");
    fill.style.background = tp>=80?"#5cb85c":"#e05c5c";
    fill.style.width = tp+"%";
    track.appendChild(fill);
    bar.appendChild(track);
    topicCard.appendChild(bar);
  });

  const nodes = [scoreCard, topicCard];

  const missed = state.questions.filter((_,i)=>!state.answers[i]?.ok);
  if (missed.length > 0) {
    const missCard = div("card");
    missCard.appendChild(el("div",{style:{fontSize:"11px",color:"#6a7f94",marginBottom:"13px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "Missed Questions"));
    state.questions.forEach((q,i) => {
      if (state.answers[i]?.ok) return;
      const s = state.answers[i]?.sel;
      const item = div("missed-item");
      item.appendChild(div("missed-topic", q.t));
      item.appendChild(div("missed-q", q.q));
      if (s !== undefined && s !== -1) item.appendChild(div("missed-wrong", `✗ You answered: ${q.o[s]}`));
      item.appendChild(div("missed-right", `✓ Correct: ${q.o[q.a]}`));
      item.appendChild(div("missed-exp", q.e));
      missCard.appendChild(item);
    });
    nodes.push(missCard);
  }

  return nodes;
}

// ── PAGE: ASK ─────────────────────────────────────────────────────────────────
function renderAsk() {
  const wrap = div("ask-wrap");

  const hdr = div("hdr");
  hdr.appendChild(div("eyebrow", "Handbook Assistant"));
  hdr.appendChild(el("div",{className:"hdr-row"},
    div("page-title","Ask the Handbook"),
    btn("btn-exit","← Back",()=>setState({mode:"home"}))
  ));
  hdr.appendChild(el("div",{style:{fontSize:"12px",color:"#5a7090",marginTop:"3px"}},
    state.handbookLoaded
      ? (state.handbookSource === "built-in"
          ? "Using built-in 2025–26 handbook · Upload a PDF on the home screen for the latest edition"
          : `Using: ${state.handbookSource}`)
      : "Loading handbook…"
  ));
  wrap.appendChild(hdr);

  if (state.askMsgs.length === 0) {
    wrap.appendChild(el("div",{style:{fontSize:"11px",color:"#5a7090",marginBottom:"9px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "Try asking:"));
    const chips = div("chip-row");
    SUGGESTED.forEach(s => chips.appendChild(el("button",{className:"suggest-chip", onClick:()=>sendAsk(s)}, s)));
    wrap.appendChild(chips);
  }

  const msgs = div("msgs");
  if (state.askMsgs.length === 0) {
    const empty = div("msgs-empty");
    empty.innerHTML = "<div style='font-size:36px;margin-bottom:8px'>📖</div><div style='font-size:14px'>Ask anything about Utah driving rules</div>";
    msgs.appendChild(empty);
  }
  state.askMsgs.forEach(m => msgs.appendChild(div(m.r==="u"?"msg-user":"msg-ai", m.t)));
  if (state.askBusy) msgs.appendChild(typingDots());
  wrap.appendChild(msgs);
  setTimeout(()=>{ msgs.scrollTop = msgs.scrollHeight; }, 50);

  const inputRow = div("input-row");
  const input = el("input", {className:"ask-input", placeholder:"Ask about Utah driving rules…", value:state.askInput});
  input.oninput   = e => { state.askInput = e.target.value; };
  input.onkeydown = e => { if(e.key==="Enter") sendAsk(state.askInput); };
  if (state.askBusy) input.disabled = true;

  const askBtn = el("button", {className:"btn-yellow", onClick:()=>sendAsk(state.askInput)}, "Ask");
  if (state.askBusy || !state.askInput.trim()) { askBtn.style.opacity="0.4"; askBtn.disabled=true; }

  inputRow.appendChild(input);
  inputRow.appendChild(askBtn);
  wrap.appendChild(inputRow);

  return [wrap];
}

// ── PAGE: HANDBOOK ────────────────────────────────────────────────────────────
function renderHandbook() {
  const wrap = div("ask-wrap");
  const isUploaded = state.handbookSource !== "built-in";

  wrap.appendChild(header("Handbook", "Upload Handbook PDF", ()=>setState({mode:"home"})));

  // Current source card
  const sourceCard = div("card");
  sourceCard.appendChild(el("div", {style:{fontSize:"11px",color:"#6a7f94",marginBottom:"11px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "Currently Active"));
  sourceCard.appendChild(el("div", {style:{display:"flex",alignItems:"center",gap:"12px",marginBottom: isUploaded?"13px":"0"}},
    el("div", {style:{fontSize:"28px"}}, isUploaded ? "📄" : "📦"),
    el("div", {},
      el("div", {style:{fontWeight:"700",color:"#fff",fontSize:"14px"}}, isUploaded ? state.handbookSource : "Built-in 2025–26 Handbook"),
      el("div", {style:{fontSize:"12px",color:"#5a7090",marginTop:"3px"}}, isUploaded
        ? `${Math.round(state.handbookText.length/1000)}K characters extracted · Stored in your browser`
        : "Condensed 2025–26 handbook embedded in the app — upload the official PDF for complete coverage")
    )
  ));
  if (isUploaded) {
    const clearBtn = btn("btn-ghost", "✕ Remove uploaded PDF — revert to built-in", clearHandbook);
    clearBtn.style.fontSize = "12px";
    clearBtn.style.padding = "7px 14px";
    sourceCard.appendChild(clearBtn);
  }
  wrap.appendChild(sourceCard);

  // Upload zone card
  const uploadCard = div("card");
  uploadCard.appendChild(el("div", {style:{fontSize:"11px",color:"#6a7f94",marginBottom:"13px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}},
    isUploaded ? "Replace with a newer PDF" : "Upload the Official PDF"));

  const zone = div("upload-zone");
  zone.appendChild(div("upload-icon", "📂"));
  zone.appendChild(el("div", {style:{fontWeight:"700",fontSize:"15px",color:"#fff",marginBottom:"6px"}}, "Drop your PDF here"));
  zone.appendChild(el("div", {style:{fontSize:"13px",color:"#5a7090",marginBottom:"4px"}}, "or click to choose file"));
  zone.appendChild(el("div", {style:{fontSize:"11px",color:"#3a5060"}}, "Text is extracted in your browser · Nothing is uploaded to any server · PDF stays on your device"));

  const fileInput = el("input", {type:"file", accept:".pdf", style:{display:"none"}});
  fileInput.onchange = e => { if (e.target.files[0]) extractPdf(e.target.files[0]); };
  zone.appendChild(fileInput);
  zone.onclick    = () => fileInput.click();
  zone.ondragover = e => { e.preventDefault(); zone.classList.add("drag-over"); };
  zone.ondragleave= () => zone.classList.remove("drag-over");
  zone.ondrop     = e => {
    e.preventDefault();
    zone.classList.remove("drag-over");
    const f = e.dataTransfer.files[0];
    if (f?.type === "application/pdf") extractPdf(f);
  };
  uploadCard.appendChild(zone);

  if (state.uploadStatus) {
    uploadCard.appendChild(div(`upload-status status-${state.uploadStatus}`, state.uploadMsg || ""));
    if (state.uploadStatus === "loading" && state.uploadPct > 0) {
      const bar  = div("progress-bar-upload");
      const fill = div("progress-bar-upload-fill");
      fill.style.width = state.uploadPct + "%";
      bar.appendChild(fill);
      uploadCard.appendChild(bar);
    }
  }
  wrap.appendChild(uploadCard);

  // Tips card
  const tipCard = div("card card-dark");
  tipCard.appendChild(el("div", {style:{fontSize:"11px",color:"#6a7f94",marginBottom:"11px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "How it works"));
  [
    "Download the official PDF from dld.utah.gov each year when DLD publishes the new edition",
    "Drop or select it here — PDF.js extracts all the text right in your browser",
    "Once loaded, every Ask question and every Explain button uses your PDF's text",
    "Your PDF text is saved in browser localStorage — clearing site data will remove it",
    "Next year: just drop the new PDF here and it replaces the old one automatically"
  ].forEach(t => {
    tipCard.appendChild(el("div", {style:{fontSize:"13px",color:"#8a9bb0",marginBottom:"9px",paddingLeft:"12px",borderLeft:"2px solid #2f3f52",lineHeight:"1.55"}}, t));
  });

  // API key management
  tipCard.appendChild(el("div", {style:{borderTop:"1px solid #1c2a38",marginTop:"4px",paddingTop:"13px"}}));
  tipCard.appendChild(el("div", {style:{fontSize:"11px",color:"#6a7f94",marginBottom:"9px",textTransform:"uppercase",letterSpacing:"2px",fontWeight:"700"}}, "API Key"));
  const keyRow = div("btn-row");
  keyRow.appendChild(btn("btn-ghost", "🔑 Update API key", () => {
    localStorage.removeItem("anthropic_key");
    getApiKey();
    render();
  }));
  keyRow.appendChild(el("div", {style:{fontSize:"12px",color:"#3a5060",alignSelf:"center",marginLeft:"8px"}},
    localStorage.getItem("anthropic_key") ? "✓ Key saved in localStorage" : "No key saved yet"
  ));
  tipCard.appendChild(keyRow);

  wrap.appendChild(tipCard);
  return [wrap];
}

// ── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";

  if (!document.getElementById("blink-style")) {
    const s = document.createElement("style");
    s.id = "blink-style";
    s.textContent = "@keyframes blink{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}";
    document.head.appendChild(s);
  }

  // Pages that build their own headers
  if (state.mode === "ask") { renderAsk().forEach(n=>root.appendChild(n)); return; }
  if (state.mode === "handbook") { renderHandbook().forEach(n=>root.appendChild(n)); return; }

  // Shared header for quiz pages
  const eyebrows = {home:"Utah Driver License", study:"Study Mode", test:"Mock Test", results:"Results"};
  const titles = {
    home:    "Test Prep — Study Guide & Mock Test",
    study:   `Question ${state.cur+1} of ${state.questions.length}`,
    test:    `Question ${state.cur+1} of ${state.questions.length}`,
    results: (() => {
      const p = Math.round(state.answers.filter(a=>a.ok).length/state.questions.length*100) >= 80;
      return p ? "Great job! 🎉" : "Keep at it — you've got this!";
    })()
  };
  const exitFns = {
    study: ()=>setState({mode:"home"}),
    test:  ()=>setState({mode:"home"})
  };

  root.appendChild(header(eyebrows[state.mode], titles[state.mode], exitFns[state.mode]));

  let nodes = [];
  if (state.mode === "home")    nodes = renderHome();
  else if (state.mode === "study")   nodes = renderStudy();
  else if (state.mode === "test")    nodes = renderTest();
  else if (state.mode === "results") nodes = renderResults();

  nodes.forEach(n => root.appendChild(n));
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadHandbook();
render();
</script>
